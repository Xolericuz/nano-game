    <style>
        :root {
            --primary: #00ffff;
            --secondary: #ff00ff;
            --accent: #ffff00;
            --danger: #ff3366;
            --success: #00ff88;
            --bg-dark: #000000;
            --glow: 0 0 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg-dark);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(0, 255, 255, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 0, 255, 0.06) 0%, transparent 50%),
                linear-gradient(180deg, #000 0%, #050a15 50%, #000 100%);
        }

        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .screen.active {
            display: flex;
        }

        /* Loader */
        #loader {
            background: linear-gradient(135deg, #000 0%, #0a0a1a 100%);
            z-index: 1000;
        }

        .loader-title {
            font-family: 'Orbitron', monospace;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .loader-bar {
            width: 200px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 30px;
            overflow: hidden;
        }

        .loader-progress {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Menu */
        #menu {
            gap: 25px;
        }

        .game-logo {
            font-family: 'Orbitron', monospace;
            font-size: 2rem;
            font-weight: 900;
            text-align: center;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: rainbow 3s linear infinite;
            background-size: 200% 100%;
        }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .game-subtitle {
            font-size: 1rem;
            color: rgba(255,255,255,0.5);
            margin-top: 5px;
        }

        .high-score-display {
            font-size: 1.1rem;
            color: var(--accent);
            text-shadow: var(--glow) var(--accent);
        }

        .menu-btns {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 260px;
        }

        .btn {
            background: rgba(0, 40, 80, 0.6);
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 14px 28px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover, .btn:active {
            background: var(--primary);
            color: #000;
            box-shadow: var(--glow) var(--primary);
            transform: scale(1.02);
        }

        .btn.start {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
            color: #000;
        }

        /* Game */
        #game {
            padding: 10px;
            justify-content: flex-start;
            padding-top: 20px;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 420px;
            background: rgba(5, 15, 30, 0.95);
            padding: 10px 16px;
            border-radius: 14px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 4px 25px rgba(0, 255, 255, 0.1);
            margin-bottom: 10px;
        }

        .level-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Orbitron', monospace;
            font-size: 0.85rem;
            color: var(--accent);
        }

        .level-badge span {
            background: linear-gradient(135deg, #ff8800, #ffaa00);
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: 700;
        }

        .game-stats {
            display: flex;
            gap: 14px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .stat-icon { font-size: 1rem; }

        .score { color: var(--primary); text-shadow: 0 0 8px var(--primary); }
        .lives { color: var(--danger); text-shadow: 0 0 8px var(--danger); }

        .dash-indicator {
            width: 22px;
            height: 22px;
            border-radius: 5px;
            background: var(--primary);
            box-shadow: 0 0 12px var(--primary);
            transition: all 0.3s ease;
        }

        .dash-indicator.cooldown {
            background: #1a2a3a;
            box-shadow: inset 0 0 4px #001122;
            opacity: 0.5;
        }

        .dash-indicator.active {
            background: #fff;
            box-shadow: 0 0 25px #fff, 0 0 40px var(--primary);
        }

        #gameCanvas {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1;
            border-radius: 10px;
            background: #000;
            box-shadow: 
                0 0 25px rgba(0, 255, 255, 0.15),
                0 0 50px rgba(255, 0, 255, 0.08),
                inset 0 0 80px rgba(0, 0, 0, 0.8);
            border: 2px solid rgba(0, 255, 255, 0.25);
        }

        .mobile-controls {
            display: none;
            width: 100%;
            max-width: 420px;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding: 0 5px;
        }

        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(3, 50px);
            gap: 5px;
        }

        .dpad-btn {
            background: rgba(0, 20, 40, 0.8);
            border: 2px solid rgba(0, 255, 255, 0.4);
            border-radius: 10px;
            color: var(--primary);
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.5);
            transition: all 0.1s ease;
        }

        .dpad-btn:active, .dpad-btn.pressed {
            background: rgba(0, 255, 255, 0.25);
            box-shadow: 0 0 15px var(--primary);
            transform: scale(0.95);
        }

        .dpad-up { grid-column: 2; grid-row: 1; }
        .dpad-left { grid-column: 1; grid-row: 2; }
        .dpad-right { grid-column: 3; grid-row: 2; }
        .dpad-down { grid-column: 2; grid-row: 3; }

        .dash-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--secondary), #8800aa);
            border: 2px solid rgba(255, 255, 255, 0.7);
            color: #fff;
            font-family: 'Orbitron', monospace;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            box-shadow: 0 0 20px var(--secondary);

        .dash-btn:active {
            transform: scale(0.9);
            box-shadow: 0 0 35px var(--secondary), inset 0 0 12px rgba(0,0,0,0.5);

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 5, 12, 0.9);
            backdrop-filter: blur(8px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }

        .modal-card {
            background: rgba(5, 15, 30, 0.98);
            padding: 28px 35px;
            border-radius: 20px;
            border: 2px solid var(--primary);
            box-shadow: 0 0 40px var(--primary), inset 0 0 25px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 90%;
        }

        .modal-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.6rem;
            font-weight: 900;
            margin-bottom: 18px;

        .modal-title.victory {
            background: linear-gradient(90deg, var(--success), var(--primary));

            -webkit-text-fill-color: transparent;
        }

        .modal-title.gameover {

            text-shadow: 0 0 15px var(--danger);

        .modal-score {
            font-size: 1.1rem;
            margin-bottom: 22px;
            color: rgba(255,255,255,0.75);

            color: var(--primary);

        .version {
            position: absolute;
            bottom: 15px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.35);
        }

        @media (max-width: 420px) {
            .mobile-controls { display: flex; }
            .game-header { padding: 8px 12px; }
            .stat { font-size: 0.85rem; }
            .level-badge { font-size: 0.75rem; }
        }
    </style>
</head>

            ]

        class AudioSystem {
            constructor() {
                this.ctx = null;
                this.ready = false;
            }

            init() {
                if (this.ready) return;
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
                this.ready = true;
            }

            play(type) {
                if (!this.ctx) return;
                
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);

                const now = this.ctx.currentTime;

                switch(type) {
                    case 'eat':
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(750, now);
                        osc.frequency.exponentialRampToValueAtTime(1100, now + 0.07);
                        gain.gain.setValueAtTime(0.08, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.07);
                        osc.start(now);
                        osc.stop(now + 0.07);
                        break;
                    case 'power':
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(380, now);
                        osc.frequency.linearRampToValueAtTime(550, now + 0.18);
                        gain.gain.setValueAtTime(0.1, now);
                        osc.start(now);
                        osc.stop(now + 0.35);
                        break;
                    case 'dash':
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(140, now);
                        osc.frequency.exponentialRampToValueAtTime(550, now + 0.12);
                        gain.gain.setValueAtTime(0.15, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
                        osc.start(now);
                        osc.stop(now + 0.12);
                        break;
                    case 'die':
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(280, now);
                        osc.frequency.exponentialRampToValueAtTime(50, now + 0.45);
                        gain.gain.setValueAtTime(0.2, now);
                        gain.gain.linearRampToValueAtTime(0.01, now + 0.45);
                        osc.start(now);
                        osc.stop(now + 0.45);
                        break;
                    case 'ghost':
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(480, now);
                        osc.frequency.exponentialRampToValueAtTime(900, now + 0.12);
                        gain.gain.setValueAtTime(0.12, now);
                        osc.start(now);
                        osc.stop(now + 0.12);
                        break;
                    case 'level':
                        [523, 659, 784, 1047].forEach((f, i) => {
                            const o = this.ctx.createOscillator();
                            const g = this.ctx.createGain();
                            o.connect(g);
                            g.connect(this.ctx.destination);
                            o.type = 'sine';
                            o.frequency.setValueAtTime(f, now + i * 0.08);
                            g.gain.setValueAtTime(0.12, now + i * 0.08);
                            g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.08 + 0.12);
                            o.start(now + i * 0.08);
                            o.stop(now + i * 0.08 + 0.12);
                        });
                        break;
                }
            }
        }

        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.audio = new AudioSystem();

                this.width = CONFIG.MAP_WIDTH * CONFIG.TILE_SIZE;
                this.height = CONFIG.MAP_HEIGHT * CONFIG.TILE_SIZE;
                this.canvas.width = this.width;
                this.canvas.height = this.height;

                this.state = {
                    level: 1,
                    score: 0,
                    highScore: parseInt(localStorage.getItem('pacmanHighScore') || '0'),
                    lives: 3,
                    gameOver: false,
                    powerMode: false,
                    powerTimer: 0,
                    grid: [],
                    pellets: 0,
                    pacman: null,
                    ghosts: [],
                    deadGhosts: []
                };

                this.lastTime = 0;
            }

            start() {
                this.loadLevel(1);
                this.bindEvents();
                this.updateUI();
                requestAnimationFrame(t => this.loop(t));
            }

            loadLevel(level) {
                const mapIdx = (level - 1) % LEVEL_MAPS.length;
                this.state.grid = LEVEL_MAPS[mapIdx].map(row => [...row]);

                let pellets = 0;
                this.state.grid.forEach(row => row.forEach(c => {
                    if (c === 2 || c === 3) pellets++;
                }));
                this.state.pellets = pellets;

                const spd = 145 + level * 1.5;
                
                this.state.pacman = {
                    x: CONFIG.PACMAN_START.x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2,
                    y: CONFIG.PACMAN_START.y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2,
                    tx: CONFIG.PACMAN_START.x,
                    ty: CONFIG.PACMAN_START.y,
                    dir: { dx: 0, dy: 0 },
                    nextDir: { dx: 0, dy: 0 },
                    speed: spd,
                    dash: false,
                    dashTime: 0,
                    dashCooldown: 0
                };

                this.state.ghosts = CONFIG.GHOST_HOUSE.map((h, i) => ({
                    x: h.x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2,
                    y: h.y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2,
                    tx: h.x,
                    ty: h.y,
                    dir: { dx: i % 2 === 0 ? 1 : -1, dy: 0 },
                    speed: 85 + level * 1.2,
                    color: CONFIG.COLORS.ghosts[i],
                    scared: false,
                    type: ['chaser', 'ambush', 'random', 'timid'][i]
                }));

                this.state.level = level;
                this.state.powerMode = false;
                this.state.powerTimer = 0;
                this.state.gameOver = false;

                this.updateUI();
                this.audio.play('level');
            }

            bindEvents() {
                document.addEventListener('keydown', e => this.onKey(e, true));
                document.addEventListener('keyup', e => this.onKey(e, false));

                document.querySelectorAll('.dpad-btn').forEach(btn => {
                    const handle = (e, on) => {
                        e.preventDefault();
                        const [dx, dy] = btn.dataset.dir.split(',').map(Number);
                        if (on) {
                            btn.classList.add('pressed');
                            this.state.pacman.nextDir = { dx, dy };
                        } else {
                            btn.classList.remove('pressed');
                        }
                    };
                    btn.addEventListener('touchstart', e => handle(e, true), { passive: false });
                    btn.addEventListener('touchend', e => handle(e, false));
                    btn.addEventListener('mousedown', e => handle(e, true));
                    btn.addEventListener('mouseup', e => handle(e, false));
                    btn.addEventListener('mouseleave', e => handle(e, false));
                });

                document.getElementById('dashBtn').addEventListener('touchstart', e => { e.preventDefault(); this.doDash(); });
                document.getElementById('dashBtn').addEventListener('mousedown', e => { e.preventDefault(); this.doDash(); });
            }

            onKey(e, pressed) {
                const k = e.key.toLowerCase();
                
                if (pressed && !this.state.gameOver) {
                    if (['w','arrowup'].includes(k)) this.state.pacman.nextDir = { dx: 0, dy: -1 };
                    if (['s','arrowdown'].includes(k)) this.state.pacman.nextDir = { dx: 0, dy: 1 };
                    if (['a','arrowleft'].includes(k)) this.state.pacman.nextDir = { dx: -1, dy: 0 };
                    if (['d','arrowright'].includes(k)) this.state.pacman.nextDir = { dx: 1, dy: 0 };
                    if (k === 'shift' && !this.keysShift) this.doDash();
                }
                this.keysShift = k === 'shift' && pressed;
            }

            doDash() {
                if (this.state.gameOver || this.state.pacman.dash || this.state.pacman.dashCooldown > 0) return;
                this.audio.play('dash');
                this.state.pacman.dash = true;
                this.state.pacman.dashTime = 0.2;
                this.state.pacman.dashCooldown = 1;
                document.getElementById('dashIndicator').classList.add('active');
            }

            canMove(tx, ty) {
                if (tx < 0 || tx >= CONFIG.MAP_WIDTH || ty < 0 || ty >= CONFIG.MAP_HEIGHT) return false;
                return this.state.grid[ty]?.[tx] !== 1;
            }

            moveEntity(ent, delta, isPac) {
                const spd = ent.speed * (isPac && ent.dash ? 2.2 : 1);
                const step = spd * delta;

                if (isPac && ent.nextDir.dx !== 0 || ent.nextDir.dy !== 0) {
                    if (this.canMove(ent.tx + ent.nextDir.dx, ent.ty + ent.nextDir.dy)) {
                        ent.dir = { ...ent.nextDir };
                    }
                }

                if (ent.dir.dx === 0 && ent.dir.dy === 0) return;

                ent.x += ent.dir.dx * step;
                ent.y += ent.dir.dy * step;

                const ntx = Math.floor(ent.x / CONFIG.TILE_SIZE);
                const nty = Math.floor(ent.y / CONFIG.TILE_SIZE);
                const cx = ntx * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
                const cy = nty * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;

                const dist = ent.dir.dx !== 0 ? 
                    (ent.dir.dx > 0 ? cx - ent.x : ent.x - cx) :
                    (ent.dir.dy > 0 ? cy - ent.y : ent.y - cy);

                if (dist <= 1 && dist >= -step * 1.5) {
                    ent.x = cx;
                    ent.y = cy;
                    ent.tx = ntx;
                    ent.ty = nty;

                    if (isPac) {
                        if (ent.nextDir.dx !== ent.dir.dx || ent.nextDir.dy !== ent.dir.dy) {
                            if (this.canMove(ent.tx + ent.nextDir.dx, ent.ty + ent.nextDir.dy)) {
                                ent.dir = { ...ent.nextDir };
                            }
                        }
                        if (!this.canMove(ent.tx + ent.dir.dx, ent.ty + ent.dir.dy)) {
                            ent.dir = { dx: 0, dy: 0 };
                        }
                    } else {
                        const target = this.getGhostTarget(ent);
                        let best = null;
                        let bestD = Infinity;
                        
                        [[0,-1],[-1,0],[0,1],[1,0]].forEach(([dx, dy]) => {
                            if (dx === -ent.dir.dx && dy === -ent.dir.dy && !this.state.powerMode) return;
                            if (this.canMove(ent.tx + dx, ent.ty + dy)) {
                                const d = Math.hypot(target.x - (ent.tx + dx), target.y - (ent.ty + dy));
                                if (d < bestD) { bestD = d; best = { dx, dy }; }
                            }
                        });

                        if (best) ent.dir = best;
                        else ent.dir = { dx: -ent.dir.dx, dy: -ent.dir.dy };
                    }
                }

                ent.tx = Math.floor(ent.x / CONFIG.TILE_SIZE);
                ent.ty = Math.floor(ent.y / CONFIG.TILE_SIZE);
            }

            getGhostTarget(gh) {
                if (this.state.powerMode) {
                    return { x: Math.random() * CONFIG.MAP_WIDTH, y: Math.random() * CONFIG.MAP_HEIGHT };
                }
                
                const px = this.state.pacman.tx;
                const py = this.state.pacman.ty;

                switch(gh.type) {
                    case 'chaser': return { x: px, y: py };
                    case 'ambush': return { x: px + this.state.pacman.dir.dx * 4, y: py + this.state.pacman.dir.dy * 4 };
                    case 'random': return Math.random() > 0.5 ? { x: px, y: py } : { x: Math.random() * 16, y: Math.random() * 16 };
                    case 'timid': return Math.hypot(gh.tx - px, gh.ty - py) > 6 ? { x: px, y: py } : { x: 1, y: 1 };
                }
                return { x: px, y: py };
            }

            update(delta) {
                if (this.state.gameOver) return;

                const pac = this.state.pacman;

                if (pac.dash) {
                    pac.dashTime -= delta;
                    if (pac.dashTime <= 0) {
                        pac.dash = false;
                        pac.dashCooldown = 1;
                        document.getElementById('dashIndicator').classList.remove('active');
                    }
                }
                if (pac.dashCooldown > 0) pac.dashCooldown -= delta;

                this.moveEntity(pac, delta, true);

                const tile = this.state.grid[pac.ty]?.[pac.tx];
                if (tile === 2) {
                    this.state.score += 10;
                    this.state.grid[pac.ty][pac.tx] = 0;
                    this.state.pellets--;
                    this.audio.play('eat');
                } else if (tile === 3) {
                    this.state.score += 50;
                    this.state.grid[pac.ty][pac.tx] = 0;
                    this.state.pellets--;
                    this.state.powerMode = true;
                    this.state.powerTimer = 6;
                    this.audio.play('power');
                }

                if (this.state.powerMode) {
                    this.state.powerTimer -= delta;
                    if (this.state.powerTimer <= 0) this.state.powerMode = false;
                }

                this.state.ghosts.forEach(gh => {
                    gh.scared = this.state.powerMode;
                    this.moveEntity(gh, delta, false);

                    const dist = Math.hypot(gh.x - pac.x, gh.y - pac.y);
                    if (dist < CONFIG.TILE_SIZE - 3) {
                        if (this.state.powerMode) {
                            this.state.score += 200;
                            gh.x = CONFIG.GHOST_HOUSE[0].x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
                            gh.y = CONFIG.GHOST_HOUSE[0].y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
                            gh.tx = CONFIG.GHOST_HOUSE[0].x;
                            gh.ty = CONFIG.GHOST_HOUSE[0].y;
                            this.audio.play('ghost');
                        } else {
                            this.loseLife();
                        }
                    }
                });

                if (this.state.pellets === 0) {
                    this.nextLevel();
                }

                this.updateUI();
            }

            loseLife() {
                this.audio.play('die');
                this.state.lives--;
                
                if (this.state.lives <= 0) {
                    this.state.gameOver = true;
                    if (this.state.score > this.state.highScore) {
                        this.state.highScore = this.state.score;
                        localStorage.setItem('pacmanHighScore', this.state.highScore.toString());
                    }
                    document.getElementById('finalScore').textContent = this.state.score;
                    document.getElementById('modal').classList.add('active');
                } else {
                    setTimeout(() => {
                        const pac = this.state.pacman;
                        pac.x = CONFIG.PACMAN_START.x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
                        pac.y = CONFIG.PACMAN_START.y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
                        pac.tx = CONFIG.PACMAN_START.x;
                        pac.ty = CONFIG.PACMAN_START.y;
                        pac.dir = { dx: 0, dy: 0 };
                        
                        CONFIG.GHOST_HOUSE.forEach((h, i) => {
                            const gh = this.state.ghosts[i];
                            gh.x = h.x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
                            gh.y = h.y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
                            gh.tx = h.x;
                            gh.ty = h.y;
                        });
                    }, 500);
                }
            }

            nextLevel() {
                this.state.level++;
                if (this.state.level > CONFIG.TOTAL_LEVELS) {
                    this.state.level = 1;
                }
                this.loadLevel(this.state.level);
            }

            draw() {
                const ctx = this.ctx;
                const ts = CONFIG.TILE_SIZE;

                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, this.width, this.height);

                for (let y = 0; y < CONFIG.MAP_HEIGHT; y++) {
                    for (let x = 0; x < CONFIG.MAP_WIDTH; x++) {
                        const c = this.state.grid[y]?.[x];
                        if (c === 1) {
                            ctx.fillStyle = CONFIG.COLORS.wall;
                            ctx.fillRect(x * ts, y * ts, ts, ts);
                            ctx.strokeStyle = CONFIG.COLORS.wallGlow;
                            ctx.strokeRect(x * ts + 0.5, y * ts + 0.5, ts - 1, ts - 1);
                        } else if (c === 2) {
                            ctx.beginPath();
                            ctx.arc(x * ts + ts/2, y * ts + ts/2, 2.5, 0, Math.PI * 2);
                            ctx.fillStyle = CONFIG.COLORS.pellet;
                            ctx.fill();
                        } else if (c === 3) {
                            ctx.beginPath();
                            ctx.arc(x * ts + ts/2, y * ts + ts/2, 5, 0, Math.PI * 2);
                            ctx.fillStyle = CONFIG.COLORS.powerPellet;
                            ctx.shadowColor = CONFIG.COLORS.powerPellet;
                            ctx.shadowBlur = 8;
                            ctx.fill();
                            ctx.shadowBlur = 0;
                        }
                    }
                }

                this.state.ghosts.forEach(gh => {
                    ctx.fillStyle = gh.scared ? CONFIG.COLORS.ghostScared : gh.color;
                    ctx.shadowColor = ctx.fillStyle;
                    ctx.shadowBlur = 10;
                    
                    ctx.beginPath();
                    ctx.arc(gh.x, gh.y - 1.5, 9, Math.PI, 0);
                    ctx.lineTo(gh.x + 9, gh.y + 9);
                    ctx.lineTo(gh.x - 9, gh.y + 9);
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(gh.x - 3.5, gh.y - 2.5, 2.5, 0, Math.PI * 2);
                    ctx.arc(gh.x + 3.5, gh.y - 2.5, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                });

                const p = this.state.pacman;
                let ang = 0;
                if (p.dir.dx > 0) ang = 0;
                else if (p.dir.dx < 0) ang = Math.PI;
                else if (p.dir.dy > 0) ang = Math.PI / 2;
                else if (p.dir.dy < 0) ang = -Math.PI / 2;

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(ang);
                ctx.beginPath();
                ctx.fillStyle = p.dash ? CONFIG.COLORS.pacmanDash : CONFIG.COLORS.pacman;
                ctx.shadowColor = ctx.fillStyle;
                ctx.shadowBlur = p.dash ? 18 : 10;
                ctx.arc(0, 0, 9, 0.2 * Math.PI, 1.8 * Math.PI);
                ctx.lineTo(0, 0);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.restore();
            }

            updateUI() {
                document.getElementById('scoreDisplay').textContent = this.state.score;
                document.getElementById('livesDisplay').textContent = this.state.lives;
                document.getElementById('levelNum').textContent = this.state.level;
                document.getElementById('highScoreDisplay').textContent = `REKORD: ${this.state.highScore}`;

                const dashEl = document.getElementById('dashIndicator');
                if (this.state.pacman.dash) dashEl.classList.add('active', 'cooldown');
                else if (this.state.pacman.dashCooldown > 0) { dashEl.classList.add('cooldown'); dashEl.classList.remove('active'); }
                else dashEl.classList.remove('active', 'cooldown');
            }

            loop(time) {
                const delta = Math.min(0.033, (time - this.lastTime) / 1000);
                this.lastTime = time;

                this.update(delta);
                this.draw();

                requestAnimationFrame(t => this.loop(t));
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            const loadBar = document.getElementById('loadProgress');
            const loader = document.getElementById('loader');
            const menu = document.getElementById('menu');
            const game = document.getElementById('game');

            let progress = 0;
            const loadInt = setInterval(() => {
                progress += Math.random() * 12 + 8;
                if (progress >= 100) { progress = 100; clearInterval(loadInt); setTimeout(() => {
                    loader.classList.remove('active');
                    menu.classList.add('active');
                }, 250); }
                loadBar.style.width = progress + '%';
            }, 80);

            const g = new Game();

            document.getElementById('btnPlay').addEventListener('click', () => {
                menu.classList.remove('active');
                game.classList.add('active');
                g.audio.init();
                g.start();
            });

            document.getElementById('btnRestart').addEventListener('click', () => {
                document.getElementById('modal').classList.remove('active');
                g.state.score = 0;
                g.state.lives = 3;
                g.loadLevel(1);
            });

            document.getElementById('btnDownload').addEventListener('click', () => {
                alert('APKni yuklash uchun: GitHub > Releases > chiqing');
            });

            document.getElementById('highScoreDisplay').textContent = `REKORD: ${g.state.highScore}`;
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
