<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XOLƎRIƆ · NEON LINK</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Orbitron', sans-serif;
        }

        :root {
            --bg-deep: #020406;
            --primary: #00f0ff;
            --accent: #ff003c;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }

        body {
            background-color: var(--bg-deep);
            color: #fff;
            width: 100vw;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: fixed;
        }

        /* matrix bg */
        #bg-canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
            opacity: 0.15;
            pointer-events: none;
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            z-index: 10;
        }

        /* LOGIN SCREEN */
        #login-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #login-screen.hidden {
            opacity: 0;
            transform: scale(1.2) translateY(-100px);
            pointer-events: none;
        }

        .logo {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 900;
            letter-spacing: 12px;
            margin-bottom: 40px;
            text-shadow: var(--neon-shadow);
        }

        .rev { display: inline-block; transform: scaleX(-1); color: var(--primary); }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 80%;
            max-width: 320px;
        }

        input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--primary);
            padding: 18px;
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            text-align: center;
            outline: none;
            transition: 0.3s;
        }

        input:focus { box-shadow: var(--neon-shadow); }

        .btn-main {
            background: var(--primary);
            color: #000;
            padding: 18px;
            border-radius: 50px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: 0.3s;
        }

        .btn-main:active { transform: scale(0.95); opacity: 0.8; }

        /* GAME UI */
        #game-ui {
            flex: 1;
            display: grid;
            grid-template-rows: 80px 1fr 90px;
            padding: 15px;
            gap: 15px;
            opacity: 0;
            transition: 1s;
            z-index: 10;
        }

        .header, .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .stat-box { text-align: center; }
        .stat-label { font-size: 0.6rem; color: #888; text-transform: uppercase; margin-bottom: 4px; }
        .stat-value { font-size: 1.1rem; color: var(--primary); font-weight: bold; }

        #board-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-radius: 24px;
        }

        #grid {
            display: grid;
            gap: 5px;
            z-index: 20;
            padding: 10px;
            width: 100%;
            height: 100%;
            place-items: center;
        }

        .tile {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            aspect-ratio: 1/1;
            width: 100%;
            height: 100%;
            font-size: clamp(1.2rem, 5vw, 2rem);
        }

        .tile.selected {
            background: rgba(0, 240, 255, 0.15);
            border-color: var(--primary);
            box-shadow: var(--neon-shadow);
            transform: scale(1.05);
            z-index: 30;
        }

        .tile.matched {
            opacity: 0;
            transform: scale(0);
            pointer-events: none;
        }

        #svg-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 100;
            width: 100%;
            height: 100%;
        }

        .connection-line {
            fill: none;
            stroke: var(--primary);
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 8px var(--primary));
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: draw 0.4s ease-out forwards;
        }

        @keyframes draw { to { stroke-dashoffset: 0; } }

        .btn-shuffle {
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-shuffle:active { background: rgba(0,240,255,0.3); }

        @media (max-width: 500px) {
            .logo { font-size: 2.2rem; letter-spacing: 6px; }
        }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<!-- LOGIN -->
<div id="login-screen" class="glass-panel">
    <div class="logo">XOL<span class="rev">E</span>RI<span class="rev">C</span></div>
    <div class="input-group">
        <input type="text" id="player-name" placeholder="TIZIMGA KIRISH..." autocomplete="off">
        <button class="btn-main" onclick="startEngine()">INITIALIZE</button>
    </div>
</div>

<!-- GAME UI -->
<div id="game-ui">
    <div class="header glass-panel">
        <div class="stat-box">
            <div class="stat-label">System Level</div>
            <div class="stat-value" id="lvl-display">01</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Global Score</div>
            <div class="stat-value" id="score-display">00000</div>
        </div>
    </div>

    <div id="board-wrapper" class="glass-panel">
        <div id="grid"></div>
        <svg id="svg-layer"></svg>
    </div>

    <div class="footer glass-panel">
        <div class="stat-box" style="text-align: left;">
            <div class="stat-label">Authorized User</div>
            <div class="stat-value" id="user-display">---</div>
        </div>
        <button class="btn-shuffle" onclick="handleShuffle()">⟳ SHUFFLE</button>
    </div>
</div>

        "⌚","📱","📲","💻","⌨️","🖥️","🖨️","🖱️","🖲️","🕹️","🗜️","💽","💾","💿","📀","📼","📷","📸","📹","🎥",

        "🪫","💡","🔦","🕯️","🪔","🧯","🛢️","💸","💵","💴","💶","💷","💰","💳","💎","⚖️","🪤","🧰","🔧","🔨",
        "⚒️","🛠️","⛏️","🔩","⚙️","🧱","⛓️","🪓","🔪","🗡️","⚔️","🛡️","🚬","⚰️","🪦","⚱️","🏺","🔮","📿","🧿",
        "💈","⚗️","🔭","🔬","🕳️","🩻","🩹","🩺","💊","💉","🧥","👚","👕","👖","🩲","🩳","👔","👗","👘","🥻",
        "🩱","🩴","🥿","👠","👡","👢","👞","👟","🥾","🧦","🧤","🧣","🧢","🎩","👒","🎓","⛑️","👑","💍","👝",
        // music & art
        "🎵","🎶","🎼","🎤","🎧","🎸","🎷","🎺","🎻","🪕","🥁","🪘","🎹","🪗","🎬","🎨","🎭","🎪","🎟️","🎫",
        // extra modern
        "🫱","🫲","🫳","🫴","🫵","🫶","🫦","🫅","🫄","🫃","🧌","🪷","🪻","🫘","🫙","🛝","🛞","🛟","🪈","🪇",
        "🪉","🪊","🪋","🪏","🪑","🪒","🪓","🪔","🪕","🪖","🪗","🪘","🪙","🪚","🪛","🪜","🪝","🪞","🪟","🪠",
        "🪡","🪢","🪣","🪤","🪥","🪦","🪧","🪨","🪩","🪪","🪫","🪬","🪭","🪮","🦰","🦱","🦲","🦳","🦴","🦵",
        "🦶","🦷","🦸","🦹","🦺","🦻","🦼","🦽","🦾","🦿","🧀","🧁","🧂","🫓","🫔","🫕","🫖","🫗","🫘","🫙"
    ];

    // unique pool (some repeats removed, but fine)
    const EMOJI_POOL = [...new Set(RAW_EMOJI)]; 
    console.log('emoji pool size:', EMOJI_POOL.length); // > 1000

    // ---------- GAME STATE ----------
    let gameState = {
        level: 1,
        score: 0,
        rows: 6,
        cols: 5,
        grid: [],
        selected: null,
        isProcessing: false
    };

    // DOM elements
    const gridEl = document.getElementById('grid');
    const svgEl = document.getElementById('svg-layer');

    // ---------- MATRIX BACKGROUND ----------
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let cols, drops = [];
    function initMatrix() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        cols = Math.floor(canvas.width / 18);
        drops = new Array(cols).fill(1);
    }
    function drawMatrix() {
        ctx.fillStyle = 'rgba(2,4,6,0.05)';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = '#00f0ff';
        ctx.font = '16px monospace';
        for (let i=0; i<drops.length; i++) {
            const char = String.fromCharCode(0x30A0 + Math.random()*96);
            ctx.fillText(char, i*18, drops[i]*18);
            if (drops[i]*18 > canvas.height && Math.random()>0.975) drops[i]=0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 50);
    window.addEventListener('resize', initMatrix);
    initMatrix();

    // ---------- GAME LOGIC ----------
    window.startEngine = function() {
        const name = document.getElementById('player-name').value.trim() || "USER_X";
        document.getElementById('user-display').innerText = name.toUpperCase();
        try { document.documentElement.requestFullscreen(); } catch(e){}

        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('game-ui').style.opacity = '1';
        setupLevel();
    };

    function setupLevel() {
        // dynamic difficulty
        gameState.rows = Math.min(8, 5 + Math.floor(gameState.level / 2));
        gameState.cols = (window.innerWidth < 500) ? 5 : 6;
        if (gameState.level > 4) gameState.cols = 7;
        if (gameState.rows * gameState.cols % 2 !== 0) gameState.cols++; // keep even total
        
        generateData();
        renderGrid();
    }

    function generateData() {
        const totalCells = gameState.rows * gameState.cols;
        const pairCount = totalCells / 2;
        // pick random emojis from pool
        let shuffledPool = [...EMOJI_POOL].sort(() => Math.random() - 0.5);
        let selectedEmojis = [];
        for (let i=0; i<pairCount; i++) {
            selectedEmojis.push(shuffledPool[i % shuffledPool.length]);
        }
        // duplicate for pairs
        let items = [];
        selectedEmojis.forEach(e => { items.push(e, e); });
        // shuffle items
        for (let i=items.length-1; i>0; i--) {
            const j = Math.floor(Math.random()*(i+1));
            [items[i], items[j]] = [items[j], items[i]];
        }

        // grid with borders (null borders for BFS)
        gameState.grid = [];
        for (let r=0; r<gameState.rows+2; r++) {
            gameState.grid[r] = new Array(gameState.cols+2).fill(null);
        }
        let idx = 0;
        for (let r=1; r<=gameState.rows; r++) {
            for (let c=1; c<=gameState.cols; c++) {
                gameState.grid[r][c] = items[idx++];
            }
        }
    }

    function renderGrid() {
        gridEl.style.gridTemplateColumns = `repeat(${gameState.cols}, 1fr)`;
        gridEl.innerHTML = '';

        const wrapper = document.getElementById('board-wrapper');
        const wrapperW = wrapper.clientWidth - 20;
        const tileSize = Math.floor(wrapperW / gameState.cols);

        for (let r=1; r<=gameState.rows; r++) {
            for (let c=1; c<=gameState.cols; c++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.style.width = `${tileSize}px`;
                tile.style.height = `${tileSize}px`;
                tile.style.fontSize = `${Math.min(tileSize*0.5, 32)}px`;

                const val = gameState.grid[r][c];
                if (val) {
                    tile.innerText = val;
                    tile.onclick = () => handleTileClick(r, c, tile);
                } else {
                    tile.classList.add('matched');
                }
                tile.id = `t-${r}-${c}`;
                gridEl.appendChild(tile);
            }
        }
        // clear selection if any
        gameState.selected = null;
    }

    window.handleTileClick = function(r, c, el) {
        if (gameState.isProcessing) return;
        if (!gameState.grid[r][c]) return;

        if (gameState.selected) {
            // same tile?
            if (gameState.selected.r === r && gameState.selected.c === c) {
                document.getElementById(`t-${r}-${c}`).classList.remove('selected');
                gameState.selected = null;
                return;
            }

            const val1 = gameState.grid[gameState.selected.r][gameState.selected.c];
            const val2 = gameState.grid[r][c];
            if (val1 === val2) {
                const path = findLink(gameState.selected.r, gameState.selected.c, r, c);
                if (path) {
                    gameState.isProcessing = true;
                    executeMatch(gameState.selected, {r, c}, path);
                    return;
                }
            }

            // wrong pair: clear old selection and set new
            document.getElementById(`t-${gameState.selected.r}-${gameState.selected.c}`).classList.remove('selected');
            gameState.selected = {r, c};
            el.classList.add('selected');
        } else {
            gameState.selected = {r, c};
            el.classList.add('selected');
        }
    };

    function findLink(r1, c1, r2, c2) {
        const queue = [{r: r1, c: c1, dir: -1, turns: 0, path: [[r1, c1]]}];
        const visited = new Set();
        while (queue.length) {
            const cur = queue.shift();
            if (cur.turns > 2) continue;
            if (cur.r === r2 && cur.c === c2) return cur.path;

            const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
            for (let i=0; i<4; i++) {
                const nr = cur.r + dirs[i][0];
                const nc = cur.c + dirs[i][1];
                if (nr<0 || nr>=gameState.rows+2 || nc<0 || nc>=gameState.cols+2) continue;
                // can step if empty or target
                if (gameState.grid[nr][nc] === null || (nr===r2 && nc===c2)) {
                    const nextTurns = (cur.dir!==-1 && cur.dir!==i) ? cur.turns+1 : cur.turns;
                    const key = `${nr}-${nc}-${i}-${nextTurns}`;
                    if (!visited.has(key)) {
                        visited.add(key);
                        queue.push({r:nr, c:nc, dir:i, turns:nextTurns, path:[...cur.path, [nr,nc]]});
                    }
                }
            }
        }
        return null;
    }

    function executeMatch(p1, p2, path) {
        drawPath(path);
        setTimeout(() => {
            // remove from grid
            gameState.grid[p1.r][p1.c] = null;
            gameState.grid[p2.r][p2.c] = null;
            document.getElementById(`t-${p1.r}-${p1.c}`).classList.add('matched');
            document.getElementById(`t-${p2.r}-${p2.c}`).classList.add('matched');

            gameState.score += 150;
            document.getElementById('score-display').innerText = gameState.score.toString().padStart(5, '0');

            svgEl.innerHTML = '';
            gameState.selected = null;
            gameState.isProcessing = false;
            checkWin();
        }, 400);
    }

    function drawPath(path) {
        const wrapperRect = document.getElementById('board-wrapper').getBoundingClientRect();
        let points = [];
        for (let [r,c] of path) {
            const tile = document.getElementById(`t-${r}-${c}`);
            let x, y;
            if (tile) {
                const rect = tile.getBoundingClientRect();
                x = rect.left + rect.width/2 - wrapperRect.left;
                y = rect.top + rect.height/2 - wrapperRect.top;
            } else {
                // fallback
                const gridRect = gridEl.getBoundingClientRect();
                const cellW = gridRect.width / gameState.cols;
                const cellH = gridRect.height / gameState.rows;
                x = (c-0.5)*cellW + (gridEl.offsetLeft - wrapperRect.left);
                y = (r-0.5)*cellH + (gridEl.offsetTop - wrapperRect.top);
            }
            points.push(`${x},${y}`);
        }
        svgEl.innerHTML = `<polyline points="${points.join(' ')}" class="connection-line" />`;
    }

    window.handleShuffle = function() {
        if (gameState.isProcessing) return;
        let active = [];
        for (let r=1; r<=gameState.rows; r++) {
            for (let c=1; c<=gameState.cols; c++) {
                if (gameState.grid[r][c]) active.push(gameState.grid[r][c]);
            }
        }
        // reshuffle
        for (let i=active.length-1; i>0; i--) {
            const j = Math.floor(Math.random()*(i+1));
            [active[i], active[j]] = [active[j], active[i]];
        }
        let idx = 0;
        for (let r=1; r<=gameState.rows; r++) {
            for (let c=1; c<=gameState.cols; c++) {
                if (gameState.grid[r][c]) {
                    gameState.grid[r][c] = active[idx++];
                }
            }
        }
        renderGrid();
        svgEl.innerHTML = '';
        gameState.selected = null;
    };

    function checkWin() {
        const remaining = gameState.grid.flat().filter(v => v !== null).length;
        if (remaining === 0) {
            gameState.level++;
            document.getElementById('lvl-display').innerText = gameState.level.toString().padStart(2, '0');
            setTimeout(setupLevel, 800);
        }
    }

    // safety
    window.onbeforeunload = () => "Progress will be lost";
})();
</script>
