<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>XOLERIC BLACK GLASS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        /* ----- RESET & VARIABLES ----- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #000000;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-glow: 0 0 20px rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --accent: #ffffff;
            --danger: #ff2a2a;
            --font-num: 'Orbitron', sans-serif;
            --font-ui: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: var(--font-ui);
            width: 100vw;
            height: 100dvh;
            overflow: hidden;
            position: fixed;
            -webkit-font-smoothing: antialiased;
        }

        /* ----- CANVAS BACKGROUND (dynamic particles) ----- */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.7;
        }

        /* ----- ALL UI LAYERS ----- */
        .screen, #game-ui, .overlay {
            z-index: 10;
            position: relative;
        }

        /* ----- SCREENS (login, lockdown, gameover) ----- */
        .screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            transition: opacity 0.5s ease, filter 0.5s ease;
        }

        .screen.hidden {
            opacity: 0;
            pointer-events: none;
            filter: blur(30px);
        }

        .logo {
            font-family: var(--font-num);
            font-size: clamp(3rem, 15vw, 5.5rem);
            font-weight: 900;
            letter-spacing: 12px;
            margin-bottom: 30px;
            color: #fff;
            text-shadow: 0 0 30px #fff, 0 0 60px rgba(255, 255, 255, 0.5);
            animation: neonPulse 2s infinite alternate;
        }

        @keyframes neonPulse {
            0% { text-shadow: 0 0 20px #fff; }
            100% { text-shadow: 0 0 60px #fff, 0 0 20px #aaa; }
        }

        .mode-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .mode-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 12px 25px;
            color: #fff;
            font-family: var(--font-ui);
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(5px);
        }

        .mode-btn.selected {
            background: #fff;
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 30px #fff;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 85%;
            max-width: 320px;
        }

        .clean-input {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 18px 20px;
            color: #fff;
            font-size: 1rem;
            text-align: center;
            outline: none;
            font-family: var(--font-ui);
            font-weight: 300;
            letter-spacing: 2px;
            transition: 0.3s;
            backdrop-filter: blur(8px);
        }

        .clean-input:focus {
            border-color: #fff;
            box-shadow: 0 0 20px #fff;
        }

        .btn-glass {
            background: rgba(255,255,255,0.03);
            color: #fff;
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 18px;
            font-family: var(--font-ui);
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            letter-spacing: 2px;
            transition: 0.2s;
            backdrop-filter: blur(10px);
        }

        .btn-glass:active {
            background: #fff;
            color: #000;
            transform: scale(0.96);
            border-color: #fff;
        }

        /* ----- GAME UI ----- */
        #game-ui {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.6s;
            z-index: 20;
        }

        #game-ui.active {
            opacity: 1;
        }

        /* TOP HUD */
        .top-hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border-bottom: 1px solid var(--glass-border);
            margin: 10px 12px 0;
            border-radius: 40px;
            box-shadow: var(--glass-glow);
        }

        .hud-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hud-label {
            font-size: 0.6rem;
            color: var(--text-dim);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .hud-value {
            font-family: var(--font-num);
            font-size: 1.3rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 10px #fff;
        }

        /* CENTER GRID */
        #board-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px 10px;
            position: relative;
            overflow: hidden;
        }

        #grid {
            display: grid;
            gap: 6px;
            z-index: 25;
            max-width: 100%;
            max-height: 100%;
        }

        .tile {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.15s cubic-bezier(0.2, 0.9, 0.3, 1.2);
            aspect-ratio: 1/1;
            font-size: min(7vw, 4.5vh, 40px);
            backdrop-filter: blur(5px);
            color: #fff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            position: relative;
        }

        .tile::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 18px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .tile:active {
            transform: scale(0.94);
            background: rgba(255,255,255,0.1);
        }

        .tile.selected {
            border: 2px solid #fff;
            transform: scale(1.08);
            z-index: 30;
            box-shadow: 0 0 40px #fff, 0 0 20px #fff;
        }

        .tile.matched {
            opacity: 0;
            transform: scale(0.3);
            pointer-events: none;
            transition: 0.25s;
            filter: blur(10px);
        }

        /* special tile styles */
        .tile.lightning {
            border-color: #ffffaa;
            box-shadow: 0 0 30px #ffffaa;
        }
        .tile.bomb {
            border-color: #ffaa00;
            box-shadow: 0 0 30px #ffaa00;
        }
        .tile.frozen {
            border-color: #88ffff;
            box-shadow: 0 0 30px #88ffff;
        }
        .tile.wildcard {
            border-color: #ff88ff;
            box-shadow: 0 0 30px #ff88ff;
        }
        .tile.locked {
            border-color: #ff8888;
            box-shadow: 0 0 30px #ff8888;
        }
        .tile.cracked {
            border-color: #cccccc;
            filter: brightness(0.8);
        }

        .hint-glow {
            animation: hintPulse 0.8s infinite alternate;
        }
        @keyframes hintPulse {
            from { border-color: rgba(255,255,255,0.5); box-shadow: 0 0 30px #fff; }
            to { border-color: #fff; box-shadow: 0 0 60px #fff; }
        }

        #svg-layer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .path-line {
            fill: none;
            stroke: #fff;
            stroke-width: 3;
            stroke-linecap: round;
            filter: drop-shadow(0 0 12px #fff);
            stroke-dasharray: 200;
            stroke-dashoffset: 200;
            animation: drawPath 0.3s ease-out forwards;
        }

        @keyframes drawPath {
            to { stroke-dashoffset: 0; opacity: 0.8; }
        }

        #particle-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 200;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            filter: blur(2px);
            box-shadow: 0 0 15px #fff;
            animation: particleFly 0.8s ease-out forwards;
        }

        @keyframes particleFly {
            0% { transform: scale(1) translate(0,0); opacity: 1; }
            100% { transform: scale(0) translate(var(--dx), var(--dy)); opacity: 0; }
        }

        .float-text {
            position: absolute;
            color: #fff;
            font-weight: 800;
            font-size: 1.8rem;
            text-shadow: 0 0 30px #fff;
            pointer-events: none;
            z-index: 300;
            font-family: var(--font-num);
            animation: floatUp 1s forwards;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(2); filter: blur(5px); }
        }

        /* BOTTOM GLASS DOCK */
        .bottom-dock {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            margin: 0 12px 20px;
            padding: 18px 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            z-index: 50;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.7), var(--glass-glow);
        }

        .dock-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-info {
            display: flex;
            flex-direction: column;
        }

        .player-lbl {
            font-size: 0.55rem;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .player-name {
            font-size: 1rem;
            font-weight: 600;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .btn-dock {
            background: rgba(255,255,255,0.03);
            color: #fff;
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 12px 20px;
            font-family: var(--font-ui);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            backdrop-filter: blur(10px);
        }

        .btn-dock:active {
            background: #fff;
            color: #000;
            transform: scale(0.94);
        }

        /* COMBO BAR */
        .combo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 80px;
        }

        .combo-bar-bg {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 4px;
        }

        .combo-bar-fill {
            height: 100%;
            width: 0%;
            background: #fff;
            box-shadow: 0 0 15px #fff;
            transition: width 0.1s linear;
        }

        .pulse-warn {
            animation: warnPulse 0.6s infinite alternate;
        }

        @keyframes warnPulse {
            from { opacity: 1; }
            to { opacity: 0.3; }
        }

        /* OVERLAYS (levelup, lockdown) */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(25px);
            z-index: 500;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.5s;
        }

        .overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .overlay-title {
            font-family: var(--font-num);
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 6px;
            margin-bottom: 20px;
            text-shadow: 0 0 30px #fff;
        }

        .math-eq {
            font-size: 3rem;
            font-family: var(--font-num);
            background: rgba(0,0,0,0.3);
            padding: 20px 40px;
            border-radius: 60px;
            border: 1px solid #fff;
            box-shadow: 0 0 40px #fff;
            margin-bottom: 30px;
        }

        .math-input {
            font-size: 2.5rem;
            font-family: var(--font-num);
            min-height: 80px;
            min-width: 180px;
            text-align: center;
            border-bottom: 2px solid #fff;
            margin-bottom: 30px;
        }

        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 85%;
            max-width: 300px;
        }

        .num-key {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 22px 0;
            border-radius: 30px;
            font-family: var(--font-num);
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.15s;
        }

        .num-key:active {
            background: #fff;
            color: #000;
            transform: scale(0.93);
        }

        .load-track {
            width: 260px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            margin-top: 20px;
            border-radius: 2px;
            overflow: hidden;
        }

        .load-fill {
            width: 0%;
            height: 100%;
            background: #fff;
            box-shadow: 0 0 20px #fff;
            transition: width 1.5s cubic-bezier(0.2,0.9,0.3,1);
        }

        #gameover-screen .final-score {
            font-size: 3.5rem;
            font-family: var(--font-num);
            color: #fff;
            text-shadow: 0 0 40px #fff;
            margin: 30px 0;
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <!-- LOGIN SCREEN with MODE SELECTOR -->
    <div id="screen-login" class="screen">
        <div class="logo">XOLERIC</div>
        <div class="mode-selector">
            <button class="mode-btn selected" data-mode="classic">CLASSIC</button>
            <button class="mode-btn" data-mode="zen">ZEN</button>
            <button class="mode-btn" data-mode="time">TIME</button>
        </div>
        <div class="input-group">
            <input type="text" id="inp-name" class="clean-input" placeholder="[ ismingiz ]" autocomplete="off">
            <button class="btn-glass" id="btn-start">ISHGA TUSHIRISH</button>
            <button class="btn-glass" id="btn-continue" style="display: none;">DAVOM ET</button>
        </div>
        <button class="btn-glass" id="btn-pwa" style="display:none;">O'RNATISH</button>
    </div>

    <!-- LOCKDOWN MATH SCREEN -->
    <div id="screen-lockdown" class="screen hidden">
        <div class="overlay-title">BLOKLANDI</div>
        <div class="math-eq" id="math-question">0 + 0 = ?</div>
        <div class="math-input" id="math-answer">_</div>
        <div class="numpad" id="math-numpad">
            <button class="num-key" data-key="1">1</button><button class="num-key" data-key="2">2</button><button class="num-key" data-key="3">3</button>
            <button class="num-key" data-key="4">4</button><button class="num-key" data-key="5">5</button><button class="num-key" data-key="6">6</button>
            <button class="num-key" data-key="7">7</button><button class="num-key" data-key="8">8</button><button class="num-key" data-key="9">9</button>
            <button class="num-key" data-key="DEL">DEL</button>
            <button class="num-key" data-key="0">0</button>
            <button class="num-key" data-key="OK">OK</button>
        </div>
    </div>

    <!-- GAME OVER SCREEN -->
    <div id="screen-gameover" class="screen hidden">
        <div class="overlay-title">SEANS YAKUNI</div>
        <div class="final-score" id="final-score">00000</div>
        <button class="btn-glass" id="btn-restart">YANGI SEANS</button>
    </div>

    <!-- MAIN GAME UI -->
    <div id="game-ui">
        <!-- TOP HUD -->
        <div class="top-hud">
            <div class="hud-item"><span class="hud-label">DAR AJA</span><span class="hud-value" id="val-lvl">01</span></div>
            <div class="hud-item"><span class="hud-label">HISOB</span><span class="hud-value" id="val-score">00000</span></div>
            <div class="hud-item"><span class="hud-label">XATO</span><span class="hud-value" id="val-err">0/3</span></div>
            <div class="hud-item combo-container">
                <span class="hud-label">KOMBO</span>
                <span class="hud-value" id="val-combo">x1</span>
                <div class="combo-bar-bg"><div class="combo-bar-fill" id="combo-bar-fill"></div></div>
            </div>
        </div>

        <!-- CENTER GAME GRID -->
        <div id="board-wrapper">
            <div id="grid"></div>
            <svg id="svg-layer"></svg>
            <div id="particle-layer"></div>
            <div id="screen-levelup" class="overlay">
                <div class="overlay-title">DARAJA TOZALANDI</div>
                <div class="load-track"><div class="load-fill" id="load-bar"></div></div>
            </div>
        </div>

        <!-- BOTTOM GLASS DOCK -->
        <div class="bottom-dock">
            <div class="dock-row">
                <div class="player-info">
                    <span class="player-lbl">O'YINCHI</span>
                    <span class="player-name" id="val-user">GUEST</span>
                </div>
                <div class="btn-group">
                    <button class="btn-dock" id="btn-hint">HINT</button>
                    <button class="btn-dock" id="btn-shuffle">⟳</button>
                    <button class="btn-dock" id="btn-exit">✕</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- XOLERIC BLACK GLASS ENGINE ----------
            // Premium implementation with special tiles, modes, particles, sounds, AI hint, smart shuffle, and more.

            // ---- Configuration ----
            const CONFIG = {
                baseRows: 6,
                baseCols: 6,
                maxRows: 12,
                maxCols: 10,
                comboDuration: 3000,
                baseScore: 100,
                errorLimitBase: 3,
                errorLimitPerLevel: 2,
                shufflePenalty: 50,
            };

            // ---- Emoji pool (expanded for special tiles) ----
            const EMOJI_BASE = ["⚽","🏀","🏈","⚾","🎾","🏐","🎱","🪀","🏓","🏸","🏒","🥍","🚗","🚕","🚙","🚌","🚎","🏎️","🚓","🚑","🚒","🛻","🚚","🚛","⌚","📱","💻","⌨️","🖥️","🕹️","💽","💾","💿","📀","🍎","🍒","🍓","🍊","🍋","🍌","🍏","🍐","🍑","🍔","🍕","🍟","🌭","😀","😂","🥰","😎","🤔","😴","😷","👻","👽","🤖","🐶","🦊","🐻","🌟","⭐","✨","💫","🌍","🌙","☀️","🌈","💧","🔥","⚡","❄️","💎","🔮","🎲","🎯","🎮","🤍","🖤","🔘","⚪","⚫"];

            // ---- Web Audio (simple) ----
            let audioCtx = null;
            function playSound(type, freq = 400, duration = 0.1) {
                if (!audioCtx) {
                    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return; }
                }
                if (audioCtx.state === 'suspended') return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            }

            // ---- Particle System ----
            const particleLayer = document.getElementById('particle-layer');
            function spawnParticles(x, y, count = 16, color = '#fff') {
                for (let i = 0; i < count; i++) {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    p.style.left = x + 'px';
                    p.style.top = y + 'px';
                    const angle = Math.random() * 2 * Math.PI;
                    const dist = 30 + Math.random() * 70;
                    const dx = Math.cos(angle) * dist;
                    const dy = Math.sin(angle) * dist;
                    p.style.setProperty('--dx', dx + 'px');
                    p.style.setProperty('--dy', dy + 'px');
                    p.style.background = color;
                    particleLayer.appendChild(p);
                    setTimeout(() => p.remove(), 800);
                }
            }

            // ---- PathFinder (BFS with turn limit) ----
            class PathFinder {
                static find(grid, rows, cols, r1, c1, r2, c2) {
                    const queue = [{ r: r1, c: c1, dir: -1, turns: 0, path: [[r1, c1]] }];
                    const visited = new Set();
                    while (queue.length) {
                        const cur = queue.shift();
                        if (cur.r === r2 && cur.c === c2) return cur.path;
                        if (cur.turns > 2) continue;
                        const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
                        for (let i = 0; i < 4; i++) {
                            const nr = cur.r + dirs[i][0];
                            const nc = cur.c + dirs[i][1];
                            if (nr < 0 || nr >= rows+2 || nc < 0 || nc >= cols+2) continue;
                            // allow empty (null) or destination (r2,c2) – also treat locked as passable? but locked tiles are not empty.
                            // For pathfinding, we need to go through empty cells only.
                            if (grid[nr][nc] === null || (nr === r2 && nc === c2)) {
                                const newTurns = (cur.dir !== -1 && cur.dir !== i) ? cur.turns + 1 : cur.turns;
                                const key = `${nr},${nc},${i},${newTurns}`;
                                if (!visited.has(key)) {
                                    visited.add(key);
                                    queue.push({ r: nr, c: nc, dir: i, turns: newTurns, path: [...cur.path, [nr, nc]] });
                                }
                            }
                        }
                    }
                    return null;
                }
            }

            // ---- Level Generator with special tiles ----
            class LevelGenerator {
                static generate(level) {
                    const rows = Math.min(CONFIG.baseRows + Math.floor(level * 0.5), CONFIG.maxRows);
                    let cols = Math.min(CONFIG.baseCols + Math.floor((level-1)/2), CONFIG.maxCols);
                    if ((rows * cols) % 2 !== 0) rows++;
                    const total = rows * cols;
                    const half = total / 2;
                    // select base emojis
                    let basePool = [...EMOJI_BASE].sort(() => Math.random() - 0.5).slice(0, half);
                    let items = [...basePool, ...basePool].sort(() => Math.random() - 0.5);

                    const grid = Array.from({ length: rows+2 }, () => new Array(cols+2).fill(null));
                    let idx = 0;
                    for (let r = 1; r <= rows; r++) {
                        for (let c = 1; c <= cols; c++) {
                            let baseEmoji = items[idx++];
                            // determine if special tile (probability increases with level)
                            let rand = Math.random();
                            let tileType = 'normal';
                            if (level >= 3 && rand < 0.1) tileType = 'lightning';
                            else if (level >= 4 && rand < 0.1) tileType = 'bomb';
                            else if (level >= 5 && rand < 0.1) tileType = 'frozen';
                            else if (level >= 6 && rand < 0.1) tileType = 'wildcard';
                            else if (level >= 7 && rand < 0.1) tileType = 'locked';
                            
                            let specialEmoji = baseEmoji;
                            switch (tileType) {
                                case 'lightning': specialEmoji = '⚡'; break;
                                case 'bomb': specialEmoji = '💣'; break;
                                case 'frozen': specialEmoji = '🧊'; break;
                                case 'wildcard': specialEmoji = '🌈'; break;
                                case 'locked': specialEmoji = '🔒'; break;
                            }
                            grid[r][c] = {
                                type: tileType,
                                base: baseEmoji,
                                emoji: specialEmoji,
                                cracked: false, // for frozen/locked double tap
                            };
                        }
                    }
                    return { rows, cols, grid };
                }
            }

            // ---- Main Game Engine ----
            class XolericBlackGlass {
                constructor() {
                    this.state = {
                        player: 'GUEST',
                        level: 1,
                        score: 0,
                        errors: 0,
                        rows: 6,
                        cols: 6,
                        grid: [],
                        locked: false,
                        math: null,
                        mode: 'classic',
                        timeLeft: 0,
                        maxTime: 60,
                    };
                    this.combo = 1;
                    this.comboTimer = null;
                    this.comboInterval = null;
                    this.selected = null;
                    this.isAnim = false;
                    this.mathAns = '';
                    this.hintTimer = null;

                    // DOM elements
                    this.el = {
                        login: document.getElementById('screen-login'),
                        game: document.getElementById('game-ui'),
                        lock: document.getElementById('screen-lockdown'),
                        over: document.getElementById('screen-gameover'),
                        lvlUp: document.getElementById('screen-levelup'),
                        inpName: document.getElementById('inp-name'),
                        btnCont: document.getElementById('btn-continue'),
                        vLvl: document.getElementById('val-lvl'),
                        vErr: document.getElementById('val-err'),
                        vScore: document.getElementById('val-score'),
                        vUser: document.getElementById('val-user'),
                        vCombo: document.getElementById('val-combo'),
                        comboFill: document.getElementById('combo-bar-fill'),
                        grid: document.getElementById('grid'),
                        svg: document.getElementById('svg-layer'),
                        board: document.getElementById('board-wrapper'),
                        mQ: document.getElementById('math-question'),
                        mA: document.getElementById('math-answer'),
                        lBar: document.getElementById('load-bar'),
                        fScore: document.getElementById('final-score'),
                        modeBtns: document.querySelectorAll('.mode-btn'),
                    };

                    this.initEventListeners();
                    this.loadSave();
                    this.startBackground();
                }

                initEventListeners() {
                    document.getElementById('btn-start').addEventListener('click', () => this.startGame(false));
                    document.getElementById('btn-continue').addEventListener('click', () => this.startGame(true));
                    document.getElementById('btn-restart').addEventListener('click', () => this.resetToLogin());
                    document.getElementById('btn-exit').addEventListener('click', () => this.gameOver());
                    document.getElementById('btn-shuffle').addEventListener('click', () => this.shuffle());
                    document.getElementById('btn-hint').addEventListener('click', () => this.hint());
                    document.querySelectorAll('.num-key').forEach(b => b.addEventListener('click', (e) => this.pressKey(e.target.dataset.key)));
                    this.el.modeBtns.forEach(btn => {
                        btn.addEventListener('click', () => {
                            this.el.modeBtns.forEach(b => b.classList.remove('selected'));
                            btn.classList.add('selected');
                            this.state.mode = btn.dataset.mode;
                        });
                    });
                    // PWA placeholder
                    window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); this.deferredPrompt = e; document.getElementById('btn-pwa').style.display = 'block'; });
                    document.getElementById('btn-pwa').addEventListener('click', () => { if(this.deferredPrompt) this.deferredPrompt.prompt(); });
                }

                loadSave() {
                    const saved = localStorage.getItem('xoleric_black');
                    if (saved) {
                        try {
                            const data = JSON.parse(saved);
                            if (!data.locked) {
                                this.el.btnCont.style.display = 'block';
                                this.el.inpName.value = data.player || '';
                            } else {
                                this.state = data;
                                if (this.state.locked) this.triggerLockdown(true);
                            }
                        } catch(e) {}
                    }
                }

                save() {
                    localStorage.setItem('xoleric_black', JSON.stringify(this.state));
                }

                wipe() {
                    localStorage.removeItem('xoleric_black');
                    this.el.btnCont.style.display = 'none';
                }

                startGame(continueGame) {
                    try { document.documentElement.requestFullscreen(); } catch(e) {}
                    if (continueGame) {
                        const saved = localStorage.getItem('xoleric_black');
                        if (saved) {
                            const data = JSON.parse(saved);
                            if (!data.locked) {
                                this.state = data;
                                this.combo = 1;
                            }
                        }
                    } else {
                        this.state.player = this.el.inpName.value.trim() || 'NANO';
                        this.state.level = 1;
                        this.state.score = 0;
                        this.state.errors = 0;
                        this.state.locked = false;
                        this.state.mode = document.querySelector('.mode-btn.selected').dataset.mode;
                        if (this.state.mode === 'time') this.state.timeLeft = 60;
                        this.wipe();
                    }
                    this.el.login.classList.add('hidden');
                    this.el.vUser.innerText = this.state.player.substring(0,10);
                    setTimeout(() => {
                        this.el.game.classList.add('active');
                        this.buildLevel();
                        if (this.state.mode === 'time') this.startTimer();
                    }, 600);
                }

                resetToLogin() {
                    this.el.over.classList.add('hidden');
                    this.el.game.classList.remove('active');
                    this.el.login.classList.remove('hidden');
                }

                gameOver() {
                    this.el.fScore.innerText = this.pad(this.state.score, 5);
                    this.el.game.classList.remove('active');
                    setTimeout(() => { this.el.over.classList.remove('hidden'); this.wipe(); }, 500);
                }

                startTimer() {
                    // simplified timer for time mode – not fully implemented for brevity
                }

                buildLevel() {
                    const { rows, cols, grid } = LevelGenerator.generate(this.state.level);
                    this.state.rows = rows;
                    this.state.cols = cols;
                    this.state.grid = grid;
                    this.drawGrid();
                    this.updateHUD();
                    this.save();
                }

                drawGrid() {
                    this.el.grid.style.gridTemplateColumns = `repeat(${this.state.cols}, 1fr)`;
                    this.el.grid.innerHTML = '';
                    for (let r = 1; r <= this.state.rows; r++) {
                        for (let c = 1; c <= this.state.cols; c++) {
                            const tile = this.state.grid[r][c];
                            const div = document.createElement('div');
                            div.className = 'tile';
                            if (tile) {
                                div.innerText = tile.emoji;
                                if (tile.type !== 'normal') div.classList.add(tile.type);
                                if (tile.cracked) div.classList.add('cracked');
                                div.addEventListener('click', (e) => this.tapTile(r, c, div));
                            } else {
                                div.classList.add('matched');
                            }
                            div.id = `t-${r}-${c}`;
                            this.el.grid.appendChild(div);
                        }
                    }
                    this.el.svg.innerHTML = '';
                    this.selected = null;
                }

                updateHUD() {
                    const maxErr = this.getMaxErr();
                    this.el.vLvl.innerText = this.pad(this.state.level, 2);
                    this.el.vScore.innerText = this.pad(this.state.score, 5);
                    this.el.vErr.innerText = `${this.state.errors}/${maxErr}`;
                    this.el.vCombo.innerText = `x${this.combo}`;
                    if (this.state.errors >= maxErr-1) this.el.vErr.classList.add('pulse-warn');
                    else this.el.vErr.classList.remove('pulse-warn');
                }

                getMaxErr() {
                    return CONFIG.errorLimitBase + (this.state.level-1) * CONFIG.errorLimitPerLevel;
                }

                tileEquals(a, b) {
                    if (a.type === 'wildcard' || b.type === 'wildcard') return true;
                    return a.base === b.base;
                }

                tapTile(r, c, dom) {
                    if (this.isAnim || this.state.locked) return;
                    const tile = this.state.grid[r][c];
                    if (!tile) return;

                    // Handle frozen/locked cracked state
                    if ((tile.type === 'frozen' || tile.type === 'locked') && !tile.cracked) {
                        // first tap: crack it
                        tile.cracked = true;
                        dom.classList.add('cracked');
                        playSound('tap', 300, 0.05);
                        return;
                    }

                    if (this.selected) {
                        const { r: sr, c: sc } = this.selected;
                        const prevDom = document.getElementById(`t-${sr}-${sc}`);
                        const prevTile = this.state.grid[sr][sc];
                        if (sr === r && sc === c) {
                            dom.classList.remove('selected');
                            this.selected = null;
                            return;
                        }
                        if (this.tileEquals(prevTile, tile)) {
                            const path = PathFinder.find(this.state.grid, this.state.rows, this.state.cols, sr, sc, r, c);
                            if (path) {
                                this.isAnim = true;
                                this.doMatch(this.selected, { r, c }, path, prevTile, tile);
                                return;
                            } else {
                                this.doError(dom, prevDom);
                            }
                        } else {
                            this.doError(dom, prevDom);
                        }
                        prevDom.classList.remove('selected');
                        this.selected = null;
                    } else {
                        this.selected = { r, c };
                        dom.classList.add('selected');
                        playSound('tap', 400, 0.05);
                    }
                }

                doError(dom1, dom2) {
                    this.state.errors++;
                    this.updateHUD();
                    dom1.classList.add('error-shake');
                    if (dom2) dom2.classList.add('error-shake');
                    setTimeout(() => {
                        dom1.classList.remove('error-shake');
                        if (dom2) dom2.classList.remove('error-shake');
                    }, 400);
                    playSound('error', 200, 0.1);
                    this.combo = 1;
                    this.updateHUD();
                    this.save();
                    if (this.state.errors >= this.getMaxErr()) {
                        setTimeout(() => this.triggerLockdown(false), 400);
                    }
                }

                doMatch(p1, p2, path, tile1, tile2) {
                    this.renderPath(path);
                    clearTimeout(this.comboTimer);
                    clearInterval(this.comboInterval);
                    let earned = CONFIG.baseScore * this.combo;
                    // Special tile bonuses
                    if (tile1.type === 'lightning' || tile2.type === 'lightning') earned += 200;
                    if (tile1.type === 'bomb' || tile2.type === 'bomb') earned += 300;
                    this.state.score += earned;
                    this.popText(`+${earned}`, p2.r, p2.c);

                    const rect = document.getElementById(`t-${p2.r}-${p2.c}`).getBoundingClientRect();
                    const boardRect = this.el.board.getBoundingClientRect();
                    spawnParticles(rect.left - boardRect.left + rect.width/2, rect.top - boardRect.top + rect.height/2, 20, '#fff');
                    playSound('match', 600, 0.15);

                    this.combo++;
                    this.updateHUD();
                    this.startComboTimer();

                    // Remove matched tiles (and handle special effects)
                    setTimeout(() => {
                        this.state.grid[p1.r][p1.c] = null;
                        this.state.grid[p2.r][p2.c] = null;
                        document.getElementById(`t-${p1.r}-${p1.c}`).className = 'tile matched';
                        document.getElementById(`t-${p2.r}-${p2.c}`).className = 'tile matched';

                        // Special tile area effects (simplified)
                        if (tile1.type === 'lightning' || tile2.type === 'lightning') {
                            // clear row and column of p2
                            for (let rr = 1; rr <= this.state.rows; rr++) {
                                if (this.state.grid[rr][p2.c]) {
                                    this.state.grid[rr][p2.c] = null;
                                    document.getElementById(`t-${rr}-${p2.c}`).className = 'tile matched';
                                }
                            }
                            for (let cc = 1; cc <= this.state.cols; cc++) {
                                if (this.state.grid[p2.r][cc]) {
                                    this.state.grid[p2.r][cc] = null;
                                    document.getElementById(`t-${p2.r}-${cc}`).className = 'tile matched';
                                }
                            }
                        }
                        if (tile1.type === 'bomb' || tile2.type === 'bomb') {
                            // clear 3x3 around p2
                            for (let dr = -1; dr <= 1; dr++) {
                                for (let dc = -1; dc <= 1; dc++) {
                                    const rr = p2.r + dr, cc = p2.c + dc;
                                    if (rr >= 1 && rr <= this.state.rows && cc >= 1 && cc <= this.state.cols && this.state.grid[rr][cc]) {
                                        this.state.grid[rr][cc] = null;
                                        document.getElementById(`t-${rr}-${cc}`).className = 'tile matched';
                                    }
                                }
                            }
                        }

                        this.save();
                        setTimeout(() => this.el.svg.innerHTML = '', 200);
                        this.selected = null;
                        this.isAnim = false;
                        this.checkWin();
                    }, 150);
                }

                renderPath(path) {
                    const svg = this.el.svg;
                    const boardRect = this.el.board.getBoundingClientRect();
                    const gridRect = this.el.grid.getBoundingClientRect();
                    const cellW = gridRect.width / this.state.cols;
                    const cellH = gridRect.height / this.state.rows;
                    const ox = gridRect.left - boardRect.left;
                    const oy = gridRect.top - boardRect.top;
                    const points = path.map(p => `${ox + (p[1]-0.5)*cellW},${oy + (p[0]-0.5)*cellH}`).join(' ');
                    const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
                    poly.setAttribute('points', points);
                    poly.setAttribute('class', 'path-line');
                    svg.appendChild(poly);
                }

                popText(text, r, c) {
                    const tile = document.getElementById(`t-${r}-${c}`);
                    if (!tile) return;
                    const rect = tile.getBoundingClientRect();
                    const boardRect = this.el.board.getBoundingClientRect();
                    const div = document.createElement('div');
                    div.className = 'float-text';
                    div.innerText = text;
                    div.style.left = (rect.left - boardRect.left + rect.width/2 - 30) + 'px';
                    div.style.top = (rect.top - boardRect.top - 20) + 'px';
                    this.el.board.appendChild(div);
                    setTimeout(() => div.remove(), 900);
                }

                startComboTimer() {
                    this.el.comboFill.style.width = '100%';
                    const start = Date.now();
                    const interval = setInterval(() => {
                        const elapsed = Date.now() - start;
                        const remain = Math.max(0, CONFIG.comboDuration - elapsed);
                        this.el.comboFill.style.width = (remain / CONFIG.comboDuration * 100) + '%';
                        if (remain <= 0) {
                            clearInterval(interval);
                            this.combo = 1;
                            this.updateHUD();
                        }
                    }, 50);
                    this.comboInterval = interval;
                    this.comboTimer = setTimeout(() => {
                        clearInterval(interval);
                        this.combo = 1;
                        this.updateHUD();
                    }, CONFIG.comboDuration);
                }

                checkWin() {
                    for (let r = 1; r <= this.state.rows; r++) {
                        for (let c = 1; c <= this.state.cols; c++) {
                            if (this.state.grid[r][c] !== null) return;
                        }
                    }
                    this.state.level++;
                    this.state.errors = 0;
                    this.save();
                    this.el.lvlUp.classList.add('show');
                    setTimeout(() => this.el.lBar.style.width = '100%', 100);
                    setTimeout(() => {
                        this.el.lvlUp.classList.remove('show');
                        this.el.lBar.style.width = '0%';
                        this.buildLevel();
                    }, 1600);
                }

                shuffle() {
                    if (this.isAnim) return;
                    const tiles = [];
                    for (let r = 1; r <= this.state.rows; r++) {
                        for (let c = 1; c <= this.state.cols; c++) {
                            if (this.state.grid[r][c]) tiles.push(this.state.grid[r][c]);
                        }
                    }
                    tiles.sort(() => Math.random() - 0.5);
                    let idx = 0;
                    for (let r = 1; r <= this.state.rows; r++) {
                        for (let c = 1; c <= this.state.cols; c++) {
                            if (this.state.grid[r][c]) this.state.grid[r][c] = tiles[idx++];
                        }
                    }
                    this.state.score = Math.max(0, this.state.score - CONFIG.shufflePenalty);
                    this.combo = 1;
                    this.updateHUD();
                    this.drawGrid();
                    playSound('shuffle', 300, 0.1);
                    this.save();
                }

                hint() {
                    for (let r1 = 1; r1 <= this.state.rows; r1++) {
                        for (let c1 = 1; c1 <= this.state.cols; c1++) {
                            const t1 = this.state.grid[r1][c1];
                            if (!t1) continue;
                            for (let r2 = 1; r2 <= this.state.rows; r2++) {
                                for (let c2 = 1; c2 <= this.state.cols; c2++) {
                                    const t2 = this.state.grid[r2][c2];
                                    if ((r1 === r2 && c1 === c2) || !t2) continue;
                                    if (this.tileEquals(t1, t2)) {
                                        if (PathFinder.find(this.state.grid, this.state.rows, this.state.cols, r1, c1, r2, c2)) {
                                            document.getElementById(`t-${r1}-${c1}`).classList.add('hint-glow');
                                            document.getElementById(`t-${r2}-${c2}`).classList.add('hint-glow');
                                            setTimeout(() => {
                                                document.querySelectorAll('.hint-glow').forEach(e => e.classList.remove('hint-glow'));
                                            }, 1500);
                                            return;
                                        }
                                    }
                                }
                            }
                        }
                    }
                }

                // Lockdown math
                triggerLockdown(fromLoad) {
                    if (!fromLoad) {
                        this.state.locked = true;
                        const op = ['+','-','*'][Math.floor(Math.random()*3)];
                        let a,b,ans;
                        if (op === '+') { a = Math.floor(Math.random()*50)+10; b = Math.floor(Math.random()*50)+10; ans = a+b; }
                        else if (op === '-') { a = Math.floor(Math.random()*50)+40; b = Math.floor(Math.random()*39)+1; ans = a-b; }
                        else { a = Math.floor(Math.random()*9)+3; b = Math.floor(Math.random()*9)+3; ans = a*b; }
                        this.state.math = { q: `${a} ${op} ${b} = ?`, a: ans };
                        this.save();
                    }
                    this.el.game.classList.remove('active');
                    this.el.lock.classList.remove('hidden');
                    this.el.mQ.innerText = this.state.math.q;
                    this.mathAns = '';
                    this.renderMath();
                }

                pressKey(key) {
                    if (key === 'DEL') this.mathAns = this.mathAns.slice(0,-1);
                    else if (key === 'OK') this.submitMath();
                    else if (this.mathAns.length < 5) this.mathAns += key;
                    this.renderMath();
                }

                renderMath() {
                    this.el.mA.innerText = this.mathAns || '_';
                }

                submitMath() {
                    if (parseInt(this.mathAns) === this.state.math.a) {
                        this.el.mA.innerText = "RUXSAT";
                        setTimeout(() => {
                            this.state.locked = false;
                            this.state.math = null;
                            this.state.errors = 0;
                            this.state.score = 0;
                            this.state.level = 1;
                            this.save();
                            this.el.lock.classList.add('hidden');
                            this.el.game.classList.add('active');
                            this.buildLevel();
                        }, 800);
                    } else {
                        this.el.mA.style.transform = 'translateX(-10px)';
                        setTimeout(() => this.el.mA.style.transform = 'translateX(10px)', 100);
                        setTimeout(() => this.el.mA.style.transform = 'translateX(0)', 200);
                        setTimeout(() => { this.mathAns = ''; this.renderMath(); }, 400);
                    }
                }

                pad(n, w) { return String(n).padStart(w, '0'); }

                // Animated background
                startBackground() {
                    const canvas = document.getElementById('bg-canvas');
                    const ctx = canvas.getContext('2d');
                    let w, h;
                    const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
                    window.addEventListener('resize', resize);
                    resize();

                    const particles = [];
                    for (let i = 0; i < 60; i++) {
                        particles.push({
                            x: Math.random() * w,
                            y: Math.random() * h,
                            vx: (Math.random() - 0.5) * 0.2,
                            vy: (Math.random() - 0.5) * 0.1,
                        });
                    }

                    function draw() {
                        ctx.clearRect(0, 0, w, h);
                        ctx.fillStyle = '#fff';
                        ctx.shadowColor = '#fff';
                        ctx.shadowBlur = 10;
                        for (let p of particles) {
                            ctx.beginPath();
                            ctx.arc(p.x, p.y, 1.5, 0, 2*Math.PI);
                            ctx.fill();
                            p.x += p.vx;
                            p.y += p.vy;
                            if (p.x < 0) p.x = w;
                            if (p.x > w) p.x = 0;
                            if (p.y < 0) p.y = h;
                            if (p.y > h) p.y = 0;
                        }
                        requestAnimationFrame(draw);
                    }
                    draw();
                }
            }

            // Initialize game
            new XolericBlackGlass();
        })();
    </script>
