<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XOLƎRIƆ</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020406;
            --primary: #00f0ff;
            --accent: #ff003c;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Orbitron', sans-serif;
        }

        body {
            background-color: var(--bg-deep);
            color: #fff;
            width: 100vw;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: fixed;
        }

        /* --- Matrix Background Canvas --- */
        #bg-canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
            opacity: 0.15;
        }

        /* --- Glassmorphism UI Components --- */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            z-index: 10;
        }

        /* --- Login Screen --- */
        #login-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #login-screen.hidden {
            opacity: 0;
            transform: scale(1.2) translateY(-100px);
            pointer-events: none;
        }

        .logo {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 900;
            letter-spacing: 12px;
            margin-bottom: 40px;
            text-shadow: var(--neon-shadow);
        }

        .rev { display: inline-block; transform: scaleX(-1); color: var(--primary); }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 80%;
            max-width: 320px;
        }

        input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--primary);
            padding: 18px;
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            text-align: center;
            outline: none;
            transition: 0.3s;
        }

        input:focus { box-shadow: var(--neon-shadow); }

        .btn-main {
            background: var(--primary);
            color: #000;
            padding: 18px;
            border-radius: 50px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: 0.3s;
        }

        .btn-main:active { transform: scale(0.95); opacity: 0.8; }

        /* --- Game Main UI --- */
        #game-ui {
            flex: 1;
            display: grid;
            grid-template-rows: 80px 1fr 90px;
            padding: 15px;
            gap: 15px;
            opacity: 0;
            transition: 1s;
            z-index: 10;
        }

        .header, .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .stat-box { text-align: center; }
        .stat-label { font-size: 0.6rem; color: #888; text-transform: uppercase; margin-bottom: 4px; }
        .stat-value { font-size: 1.1rem; color: var(--primary); font-weight: bold; }

        #board-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-radius: 24px;
        }

        #grid {
            display: grid;
            gap: 5px;
            z-index: 20;
        }

        .tile {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            aspect-ratio: 1/1;
        }

        .tile.selected {
            background: rgba(0, 240, 255, 0.15);
            border-color: var(--primary);
            box-shadow: var(--neon-shadow);
            transform: scale(1.1);
            z-index: 30;
        }

        .tile.matched {
            opacity: 0;
            transform: scale(0);
            pointer-events: none;
        }

        #svg-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 100;
        }

        .connection-line {
            fill: none;
            stroke: var(--primary);
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 8px var(--primary));
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: draw 0.4s ease-out forwards;
        }

        @keyframes draw { to { stroke-dashoffset: 0; } }

        .btn-shuffle {
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.8rem;
        }

        /* --- Mobile Responsive --- */
        @media (max-width: 500px) {
            .logo { font-size: 2.2rem; letter-spacing: 6px; }
            .header, .footer { padding: 0 10px; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="login-screen" class="glass-panel">
        <div class="logo">XOL<span class="rev">E</span>RI<span class="rev">C</span></div>

        </div>
    </div>

    <div id="game-ui">
        <div class="header glass-panel">
            <div class="stat-box">

            </div>
            <div class="stat-box">
                <div class="stat-label">Global Score</div>
                <div class="stat-value" id="score-display">00000</div>
            </div>
        </div>

        <div id="board-wrapper" class="glass-panel">
            <div id="grid"></div>
            <svg id="svg-layer"></svg>
        </div>

        <div class="footer glass-panel">
            <div class="stat-box" style="text-align: left;">
                <div class="stat-label">Authorized User</div>
                <div class="stat-value" id="user-display">---</div>
            </div>
            <button class="btn-shuffle" onclick="handleShuffle()">SHUFFLE (INF)</button>
        </div>
    </div>

// EMOJI_DB ni ishlatish uchun:
// 1. HTML ichida script tegiga joylashtiring
// 2. gameState.tiles = createTiles() ichida ishlating 
        
        let gameState = {
            level: 1,
            score: 0,
            rows: 6,
            cols: 5,
            grid: [],
            selected: null,
            isProcessing: false
        };

        const gridEl = document.getElementById('grid');
        const svgEl = document.getElementById('svg-layer');

        // --- Matrix Background Effect ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let columns;
        const fontSize = 16;
        let drops = [];

        function initMatrix() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            columns = Math.floor(canvas.width / fontSize);
            drops = new Array(columns).fill(1);
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(2, 4, 6, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00f0ff';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = String.fromCharCode(0x30A0 + Math.random() * 33);
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);
        window.addEventListener('resize', initMatrix);
        initMatrix();

        // --- Core Game Logic ---
        function startEngine() {
            const name = document.getElementById('player-name').value.trim() || "USER_X";
            document.getElementById('user-display').innerText = name.toUpperCase();
            
            // Fullscreen attempt
            try { document.documentElement.requestFullscreen(); } catch(e){}

            document.getElementById('login-screen').classList.add('hidden');
            const gameUi = document.getElementById('game-ui');
            gameUi.style.opacity = '1';

            setupLevel();
        }

        function setupLevel() {
            // Levelga qarab qiyinchilik
            gameState.rows = 6 + Math.floor(gameState.level / 3);
            gameState.cols = 6; 
            if(window.innerWidth > 600) gameState.cols = 8;

            generateData();
            renderGrid();
        }

        function generateData() {
            const total = gameState.rows * gameState.cols;
            let items = [];
            const pairs = total / 2;
            
            // Tasodifiy emojilarni pool ichidan tanlash
            let levelEmojis = [...EMOJI_POOL].sort(() => Math.random() - 0.5).slice(0, pairs);
            levelEmojis.forEach(e => items.push(e, e));
            items.sort(() => Math.random() - 0.5);

            gameState.grid = [];
            for(let r = 0; r < gameState.rows + 2; r++) {
                gameState.grid[r] = new Array(gameState.cols + 2).fill(null);
            }

            let idx = 0;
            for(let r = 1; r <= gameState.rows; r++) {
                for(let c = 1; c <= gameState.cols; c++) {
                    gameState.grid[r][c] = items[idx++];
                }
            }
        }

        function renderGrid() {
            gridEl.style.gridTemplateColumns = `repeat(${gameState.cols}, 1fr)`;
            gridEl.innerHTML = '';
            
            const boardW = document.getElementById('board-wrapper').clientWidth - 30;
            const tileSize = Math.floor(boardW / gameState.cols);

            for(let r = 1; r <= gameState.rows; r++) {
                for(let c = 1; c <= gameState.cols; c++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.style.width = `${tileSize}px`;
                    tile.style.height = `${tileSize}px`;
                    tile.style.fontSize = `${tileSize * 0.5}px`;
                    
                    if(gameState.grid[r][c]) {
                        tile.innerText = gameState.grid[r][c];
                        tile.onclick = () => handleTileClick(r, c, tile);
                    } else {
                        tile.classList.add('matched');
                    }
                    tile.id = `t-${r}-${c}`;
                    gridEl.appendChild(tile);
                }
            }
        }

        function handleTileClick(r, c, el) {
            if(gameState.isProcessing) return;
            
            if(gameState.selected) {
                if(gameState.selected.r === r && gameState.selected.c === c) {
                    el.classList.remove('selected');
                    gameState.selected = null;
                    return;
                }

                if(gameState.grid[r][c] === gameState.grid[gameState.selected.r][gameState.selected.c]) {
                    const path = findLink(gameState.selected.r, gameState.selected.c, r, c);
                    if(path) {
                        gameState.isProcessing = true;
                        executeMatch(gameState.selected, {r, c}, path);
                        return;
                    }
                }
                
                // Noto'g'ri tanlov
                document.getElementById(`t-${gameState.selected.r}-${gameState.selected.c}`).classList.remove('selected');
                gameState.selected = {r, c};
                el.classList.add('selected');
            } else {
                gameState.selected = {r, c};
                el.classList.add('selected');
            }
        }

        function executeMatch(p1, p2, path) {
            drawPath(path);
            
            setTimeout(() => {
                gameState.grid[p1.r][p1.c] = null;
                gameState.grid[p2.r][p2.c] = null;
                
                document.getElementById(`t-${p1.r}-${p1.c}`).classList.add('matched');
                document.getElementById(`t-${p2.r}-${p2.c}`).classList.add('matched');
                
                gameState.score += 150;
                document.getElementById('score-display').innerText = gameState.score.toString().padStart(5, '0');
                
                svgEl.innerHTML = '';
                gameState.selected = null;
                gameState.isProcessing = false;

                checkWin();
            }, 400);
        }

        function handleShuffle() {
            let activeItems = gameState.grid.flat().filter(x => x !== null);
            activeItems.sort(() => Math.random() - 0.5);
            
            let idx = 0;
            for(let r = 1; r <= gameState.rows; r++) {
                for(let c = 1; c <= gameState.cols; c++) {
                    if(gameState.grid[r][c]) {
                        gameState.grid[r][c] = activeItems[idx++];
                    }
                }
            }
            renderGrid();
        }

        // --- Pathfinding BFS (Maximum 2 turns) ---
        function findLink(r1, c1, r2, c2) {
            const queue = [{r: r1, c: c1, dir: -1, turns: 0, path: [[r1, c1]]}];
            const visited = new Set();

            while(queue.length > 0) {
                const curr = queue.shift();
                if(curr.turns > 2) continue;
                if(curr.r === r2 && curr.c === c2) return curr.path;

                const dirs = [[-1,0], [1,0], [0,-1], [0,1]];
                for(let i=0; i<4; i++) {
                    const nr = curr.r + dirs[i][0];
                    const nc = curr.c + dirs[i][1];
                    
                    if(nr >= 0 && nr < gameState.rows+2 && nc >= 0 && nc < gameState.cols+2) {
                        if(gameState.grid[nr][nc] === null || (nr === r2 && nc === c2)) {
                            const nextTurns = (curr.dir !== -1 && curr.dir !== i) ? curr.turns + 1 : curr.turns;
                            const key = `${nr}-${nc}-${i}-${nextTurns}`;
                            if(!visited.has(key)) {
                                visited.add(key);
                                queue.push({r: nr, c: nc, dir: i, turns: nextTurns, path: [...curr.path, [nr, nc]]});
                            }
                        }
                    }
                }
            }
            return null;
        }

        function drawPath(path) {
            const wrapperRect = document.getElementById('board-wrapper').getBoundingClientRect();
            const points = path.map(p => {
                const tile = document.getElementById(`t-${p[0]}-${p[1]}`);
                let x, y;
                if(tile && !tile.classList.contains('matched')) {
                    const rect = tile.getBoundingClientRect();
                    x = rect.left + rect.width / 2 - wrapperRect.left;
                    y = rect.top + rect.height / 2 - wrapperRect.top;
                } else {
                    // Bo'sh joylar uchun koordinatani hisoblash
                    const gridRect = gridEl.getBoundingClientRect();
                    const cellW = gridRect.width / gameState.cols;
                    const cellH = gridRect.height / gameState.rows;
                    x = (p[1] - 0.5) * cellW + (gridEl.offsetLeft);
                    y = (p[0] - 0.5) * cellH + (gridEl.offsetTop);
                }
                return `${x},${y}`;
            }).join(' ');

            svgEl.innerHTML = `<polyline points="${points}" class="connection-line" />`;
        }

        function checkWin() {
            const rem = gameState.grid.flat().filter(x => x !== null).length;
            if(rem === 0) {
                gameState.level++;
                document.getElementById('lvl-display').innerText = gameState.level.toString().padStart(2, '0');
                setTimeout(setupLevel, 1000);
            }
        }

        // Tasodifiy yopilib ketishdan himoya
        window.onbeforeunload = () => "O'yin jarayoni saqlanmasligi mumkin!";
    </script>
