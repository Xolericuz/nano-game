<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XOLƎRIƆ</title>
    <meta name="theme-color" content="#0a0a0a">
    <link rel="manifest" href="manifest.json">
    <style>
        /* -------------------- RESET & VARIABLES -------------------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --surface-light: #1e1e1e;
            --primary: #ffffff;
            --primary-dim: rgba(255,255,255,0.7);
            --muted: rgba(255,255,255,0.3);
            --border: rgba(255,255,255,0.08);
            --border-active: rgba(255,255,255,0.25);
            --error: #ff3b30;
            --success: #32d74b;
            --glow: rgba(255,255,255,0.2);
            --gold: #ffd700;
        }

        body {
            background: var(--bg);
            color: var(--primary);
            width: 100vw;
            height: 100dvh;
            overflow: hidden;
            position: fixed;
            display: flex;
            flex-direction: column;
        }

        /* -------------------- SPLASH SCREEN -------------------- */
        #splash {
            position: absolute;
            inset: 0;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        .splash-content {
            text-align: center;
        }

        .splash-content h1 {
            font-size: 4rem;
            font-weight: 300;
            letter-spacing: 12px;
            margin-bottom: 20px;
            opacity: 0;
            transform: scale(0.9);
            animation: splashIn 1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .splash-content p {
            color: var(--muted);
            letter-spacing: 4px;
            font-size: 0.8rem;
            opacity: 0;
            animation: fadeInUp 0.8s 0.3s forwards;
        }

        @keyframes splashIn {
            0% { opacity: 0; transform: scale(0.9); letter-spacing: 20px; }
            100% { opacity: 1; transform: scale(1); letter-spacing: 12px; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* -------------------- LOGIN SCREEN -------------------- */
        #login {
            position: absolute;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 900;
            transition: opacity 0.5s ease;
            padding: 20px;
        }

        .login-header {
            margin-bottom: 60px;
            text-align: center;
        }

        .login-header h2 {
            font-size: 2rem;
            font-weight: 200;
            letter-spacing: 8px;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .login-header span {
            color: var(--muted);
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        .login-input {
            width: 100%;
            max-width: 320px;
            margin-bottom: 30px;
        }

        .login-input input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            padding: 15px 0;
            color: var(--primary);
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }

        .login-input input:focus {
            border-bottom-color: var(--primary);
        }

        .login-input input::placeholder {
            color: var(--muted);
            font-weight: 300;
        }

        .login-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--primary);
            padding: 12px 40px;
            border-radius: 30px;
            font-size: 0.9rem;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .login-btn:hover {
            background: var(--surface);
            border-color: var(--primary-dim);
        }

        .login-btn:active {
            transform: scale(0.95);
        }

        /* -------------------- GAME SCREEN -------------------- */
        #game {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* Header */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
            position: relative;
            z-index: 10;
        }

        .stats {
            display: flex;
            gap: 24px;
        }

        .stat {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 0.65rem;
            color: var(--muted);
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 200;
            line-height: 1;
        }

        .shuffle-counter {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .shuffle-count {
            font-size: 1.5rem;
            font-weight: 200;
            line-height: 1;
        }

        /* Settings button */
        .settings-btn {
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 1.4rem;
            cursor: pointer;
            transition: color 0.2s;
            margin-left: 8px;
        }
        .settings-btn:hover { color: var(--primary); }

        /* High score */
        .high-score {
            font-size: 0.8rem;
            color: var(--gold);
            letter-spacing: 1px;
            margin-left: 12px;
        }

        /* Board */
        .board-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            position: relative;
        }

        #board {
            display: grid;
            gap: 4px;
            background: var(--surface);
            padding: 4px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .tile {
            background: var(--surface-light);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1.5rem;
            box-shadow: inset 0 0 0 1px var(--border);
            position: relative;
            will-change: transform, background;
        }

        .tile:active {
            transform: scale(0.92);
            background: rgba(255,255,255,0.1);
        }

        .tile.selected {
            background: rgba(255,255,255,0.15);
            box-shadow: 0 0 20px var(--glow), inset 0 0 0 1px var(--primary-dim);
            transform: scale(1.02);
            z-index: 10;
        }

        .tile.matched {
            animation: matchPop 0.3s ease;
        }

        .tile.error {
            animation: errorShake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
            background: rgba(255,59,48,0.2) !important;
        }

        .tile.hidden {
            opacity: 0;
            transform: scale(0.5);
            pointer-events: none;
            transition: all 0.3s ease;
        }

        @keyframes matchPop {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.1); background: rgba(255,255,255,0.2); }
        }

        @keyframes errorShake {
            10%,90% { transform: translateX(-2px); }
            20%,80% { transform: translateX(2px); }
            30%,50%,70% { transform: translateX(-4px); }
            40%,60% { transform: translateX(4px); }
        }

        /* SVG Layer */
        #svg-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 50;
        }

        .path-line {
            stroke: var(--primary);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 8px var(--primary));
            stroke-dasharray: 8 4;
            animation: pathFlow 0.3s linear infinite;
        }

        @keyframes pathFlow {
            to { stroke-dashoffset: -12; }
        }

        /* Footer */
        .game-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
            position: relative;
            z-index: 10;
        }

        .player-info {
            display: flex;
            flex-direction: column;
        }

        #player-name {
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 1px;
        }

        #game-time {
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .footer-actions {
            display: flex;
            gap: 16px;
        }

        .action-btn {
            width: 44px;
            height: 44px;
            border-radius: 22px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.3rem;
        }

        .action-btn:active {
            transform: scale(0.9);
            background: var(--surface-light);
            border-color: var(--primary-dim);
        }

        .action-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        /* Achievements panel (floating) */
        .achievements-panel {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            border-radius: 40px;
            padding: 8px 20px;
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            gap: 16px;
            font-size: 0.8rem;
            border: 1px solid var(--border);
        }

        .achievement-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--muted);
        }
        .achievement-badge.completed {
            color: var(--gold);
        }

        /* Modals */
        .modal {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-content {
            background: var(--surface);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            max-width: 320px;
            width: 90%;
            border: 1px solid var(--border);
        }

        .modal-content h2 {
            font-size: 2rem;
            font-weight: 200;
            letter-spacing: 4px;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .modal-stats {
            color: var(--primary-dim);
            margin-bottom: 30px;
            line-height: 2;
            font-size: 1.1rem;
        }

        .modal-stats span {
            color: var(--primary);
            font-size: 1.3rem;
            margin-left: 8px;
        }

        .modal-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--primary);
            padding: 12px 32px;
            border-radius: 30px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .modal-btn:hover {
            background: var(--surface-light);
            border-color: var(--primary-dim);
        }

        /* Settings modal */
        .settings-modal .modal-content {
            max-width: 380px;
            text-align: left;
        }
        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .settings-item:last-child { border: none; }
        .toggle-switch {
            width: 44px;
            height: 24px;
            background: var(--surface-light);
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }
        .toggle-switch.active { background: var(--success); }
        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.2s;
        }
        .toggle-switch.active::after { transform: translateX(20px); }

        /* Tutorial */
        .tutorial-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(5px);
        }
        .tutorial-card {
            background: var(--surface);
            border-radius: 32px;
            padding: 32px;
            max-width: 320px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .tutorial-card h3 {
            font-size: 1.8rem;
            font-weight: 200;
            margin-bottom: 20px;
        }
        .tutorial-card p {
            color: var(--primary-dim);
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .tutorial-card button {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--primary);
            padding: 12px 32px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
        }

        /* Confetti */
        .confetti {
            position: absolute;
            width: 10px;
            height: 20px;
            background: var(--gold);
            opacity: 0.8;
            animation: fall 2s linear forwards;
            pointer-events: none;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }

        /* Loading spinner */
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Install button */
        #install-btn {
            display: none;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .game-header, .game-footer {
                padding: 16px;
            }
            .stat-value, .shuffle-count {
                font-size: 1.3rem;
            }
            .modal-content {
                padding: 30px 20px;
            }
            .achievements-panel {
                font-size: 0.7rem;
                padding: 6px 16px;
                bottom: 80px;
            }
        }
    </style>
</head>
<body>
    <!-- SPLASH -->

        <div class="splash-content">
            <h1>XOLERIC</h1>

    </div>

    <!-- LOGIN -->
    <div id="login">

        </div>
        <div class="login-input">
            <input type="text" id="username" placeholder="Ismingiz..." autocomplete="off" spellcheck="false">
        </div>
        <button class="login-btn" onclick="game.init()">BOSHLASH</button>

                    <span class="stat-label">ARALASHTIR</span>
                    <span class="shuffle-count" id="shuffles">03</span>
                </div>
                <button class="settings-btn" onclick="openSettings()">⚙️</button>
            </div>
        </header>

        <div class="board-container">
            <div id="board"></div>
            <svg id="svg-layer"></svg>
        </div>

        <footer class="game-footer">
            <div class="player-info">
                <span id="player-name">GUEST</span>
                <span id="game-time">00:00</span>

            <div class="footer-actions">

            <div class="settings-item">

                <span id="settings-highscore">0</span>
            </div>
            <button class="modal-btn" style="margin-top: 24px;" onclick="closeSettings()">YOPISH</button>

                    // Qo'shimcha (40)
                    '👾','🤖','👻','💀','☠️','👽','💩','🔥','✨','🌟','💫','⭐','🌙','☄️','💥','💢','💦','💨','🕳️','💬',
                    '🗯️','💭','💤','💮','♨️','💈','🛎️','🔔','📯','🎵','🎶','🎼','🎤','🎧','📻','📺','📟','📞','☎️','📠'
                ];

                // Bind methods
                this.handleTileClick = this.handleTileClick.bind(this);
                this.updateTime = this.updateTime.bind(this);

                // Cache DOM elements
                this.cacheElements();

                // Load data
                this.loadHighScore();
                this.loadSettings();
                this.initAudio();
                this.checkTutorial();
            }

            cacheElements() {
                this.elements = {
                    splash: document.getElementById('splash'),
                    login: document.getElementById('login'),
                    game: document.getElementById('game'),
                    board: document.getElementById('board'),
                    svgLayer: document.getElementById('svg-layer'),
                    level: document.getElementById('level'),
                    score: document.getElementById('score'),
                    shuffles: document.getElementById('shuffles'),
                    playerName: document.getElementById('player-name'),
                    gameTime: document.getElementById('game-time'),
                    username: document.getElementById('username'),
                    modal: document.getElementById('gameover-modal'),
                    modalTitle: document.getElementById('modal-title'),
                    modalStats: document.getElementById('modal-stats'),
                    shuffleBtn: document.getElementById('shuffle-btn'),
                    installBtn: document.getElementById('install-btn'),
                    highscoreDisplay: document.getElementById('highscore-display'),
                    settingsModal: document.getElementById('settings-modal'),
                    soundToggle: document.getElementById('sound-toggle'),
                    vibrateToggle: document.getElementById('vibrate-toggle'),
                    settingsHighscore: document.getElementById('settings-highscore'),
                    achievementsPanel: document.getElementById('achievements-panel')
                };
            }

            loadHighScore() {
                try {
                    this.state.highScore = parseInt(localStorage.getItem('xoleric_highscore')) || 0;
                    this.elements.highscoreDisplay.textContent = `🏆 ${this.state.highScore}`;
                } catch(e) {}
            }

            saveHighScore() {
                if (this.state.score > this.state.highScore) {
                    this.state.highScore = this.state.score;
                    localStorage.setItem('xoleric_highscore', this.state.highScore);
                    this.elements.highscoreDisplay.textContent = `🏆 ${this.state.highScore}`;
                }
            }

            loadSettings() {
                try {
                    const settings = JSON.parse(localStorage.getItem('xoleric_settings')) || {};
                    this.state.soundEnabled = settings.sound !== false;
                    this.state.vibrateEnabled = settings.vibrate !== false;
                } catch(e) {}
            }

            saveSettings() {
                localStorage.setItem('xoleric_settings', JSON.stringify({
                    sound: this.state.soundEnabled,
                    vibrate: this.state.vibrateEnabled
                }));
            }

            initAudio() {
                this.audioContext = null; // will be created on first sound if enabled
            }

            playSound(type) {
                if (!this.state.soundEnabled) return;
                if (!this.audioContext) {
                    try {
                        this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    } catch(e) { return; }
                }
                if (this.audioContext.state !== 'running') return;

                try {
                    const now = this.audioContext.currentTime;
                    const osc = this.audioContext.createOscillator();
                    const gain = this.audioContext.createGain();
                    osc.connect(gain);
                    gain.connect(this.audioContext.destination);

                    switch(type) {
                        case 'select':
                            osc.frequency.value = 600;
                            gain.gain.setValueAtTime(0.03, now);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                            osc.start(now);
                            osc.stop(now + 0.1);
                            break;
                        case 'match':
                            osc.frequency.value = 400;
                            gain.gain.setValueAtTime(0.04, now);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                            osc.start(now);
                            osc.stop(now + 0.15);
                            setTimeout(() => {
                                const osc2 = this.audioContext.createOscillator();
                                const gain2 = this.audioContext.createGain();
                                osc2.frequency.value = 800;
                                gain2.gain.setValueAtTime(0.04, now + 0.1);
                                gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
                                osc2.connect(gain2);
                                gain2.connect(this.audioContext.destination);
                                osc2.start(now + 0.1);
                                osc2.stop(now + 0.25);
                            }, 100);
                            break;
                        case 'error':
                            osc.frequency.value = 200;
                            gain.gain.setValueAtTime(0.05, now);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                            osc.start(now);
                            osc.stop(now + 0.2);
                            break;
                        case 'levelUp':
                            [300,400,500,600].forEach((freq, i) => {
                                setTimeout(() => {
                                    const osc = this.audioContext.createOscillator();
                                    const gain = this.audioContext.createGain();
                                    osc.frequency.value = freq;
                                    gain.gain.setValueAtTime(0.04, now);
                                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                                    osc.connect(gain);
                                    gain.connect(this.audioContext.destination);
                                    osc.start(now);
                                    osc.stop(now + 0.15);
                                }, i * 120);
                            });
                            break;
                        case 'shuffle':
                            osc.frequency.value = 300;
                            gain.gain.setValueAtTime(0.03, now);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                            osc.start(now);
                            osc.stop(now + 0.2);
                            break;
                    }
                } catch(e) {}
            }

            vibrate(pattern) {
                if (this.state.vibrateEnabled && navigator.vibrate) {
                    navigator.vibrate(pattern);
                }
            }

            checkTutorial() {
                const tut = localStorage.getItem('xoleric_tutorial');
                this.state.tutorialShown = !!tut;
            }

            showTutorial() {
                if (this.state.tutorialShown) return;
                const overlay = document.createElement('div');
                overlay.className = 'tutorial-overlay';
                overlay.innerHTML = `
                    <div class="tutorial-card">
                        <h3>✧ XUSH KELIBSIZ ✧</h3>
                        <p>• Bir xil emojilarni toping<br>• 2 marta burilish bilan ulang<br>• Shuffle dan foydalaning<br>• Tezroq topish uchun kombinatsiyalar</p>
                        <button id="tutorial-ok">TUSHUNDIM</button>
                    </div>
                `;
                document.body.appendChild(overlay);
                document.getElementById('tutorial-ok').onclick = () => {
                    overlay.remove();
                    localStorage.setItem('xoleric_tutorial', '1');
                    this.state.tutorialShown = true;
                };
            }

            checkAchievements() {
                const a = this.state.achievements;
                if (!a.firstMatch && this.state.score >= 25) {
                    a.firstMatch = true;
                    this.showAchievement('Birinchi juftlik');
                }
                if (!a.level5 && this.state.level >= 5) {
                    a.level5 = true;
                    this.showAchievement('5-bosqich');
                }
                if (!a.score1000 && this.state.score >= 1000) {
                    a.score1000 = true;
                    this.showAchievement('1000 ball');
                }
                if (!a.noShuffleWin && this.state.pairs === 0 && this.state.shuffles === 3) {
                    a.noShuffleWin = true;
                    this.showAchievement('Shufflesiz g\'alaba');
                }
                if (!a.combo5 && this.state.combo >= 5) {
                    a.combo5 = true;
                    this.showAchievement('5x Kombinatsiya');
                }
                this.updateAchievementsUI();
            }

            showAchievement(text) {
                const toast = document.createElement('div');
                toast.style.position = 'fixed';
                toast.style.bottom = '140px';
                toast.style.left = '50%';
                toast.style.transform = 'translateX(-50%)';
                toast.style.background = 'var(--gold)';
                toast.style.color = '#000';
                toast.style.padding = '8px 24px';
                toast.style.borderRadius = '40px';
                toast.style.fontWeight = '600';
                toast.style.zIndex = '3000';
                toast.style.animation = 'fadeInUp 0.3s';
                toast.textContent = `🏆 ${text}`;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2500);
            }

            updateAchievementsUI() {
                const panel = this.elements.achievementsPanel;
                if (!panel) return;
                const completed = Object.values(this.state.achievements).filter(v => v).length;
                panel.innerHTML = `🏅 Yutuqlar ${completed}/8`;
            }

            init() {
                const name = this.elements.username.value.trim() || 'GUEST';
                this.elements.playerName.textContent = name.toUpperCase();
                localStorage.setItem('xoleric_user', name);

                this.elements.splash.style.opacity = '0';
                setTimeout(() => {
                    this.elements.splash.style.display = 'none';
                    this.elements.login.style.opacity = '0';
                    setTimeout(() => {
                        this.elements.login.style.display = 'none';
                        this.elements.game.style.display = 'flex';
                        setTimeout(() => {
                            this.elements.game.style.opacity = '1';
                            this.startLevel(1);
                            this.startTimer();
                            this.showTutorial();
                        }, 50);
                    }, 500);
                }, 1000);

                try {
                    if (document.documentElement.requestFullscreen) {
                        document.documentElement.requestFullscreen();
                    }
                } catch(e) {}
            }

            startTimer() {
                if (this.state.timer) clearInterval(this.state.timer);
                this.state.gameTime = 0;
                this.state.timer = setInterval(() => this.updateTime(), 1000);
            }

            updateTime() {
                this.state.gameTime++;
                const mins = Math.floor(this.state.gameTime / 60);
                const secs = this.state.gameTime % 60;
                this.elements.gameTime.textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            }

            startLevel(level) {
                if (level > this.levelConfig.length) {
                    this.showGameOver('G\'ALABA!', `Barcha bosqichlar o‘tildi<br>Yakuniy ball: ${this.state.score}`);
                    return;
                }

                this.state.level = level;
                this.state.rows = this.levelConfig[level-1].r;
                this.state.cols = this.levelConfig[level-1].c;

                this.updateUI();
                this.showLoading();
                setTimeout(() => {
                    this.buildGrid();
                    this.renderBoard();
                    this.state.selected = null;
                    this.state.isAnimating = false;
                    this.hideLoading();
                }, 300);
            }

            updateUI() {
                this.elements.level.textContent = this.state.level.toString().padStart(2,'0');
                this.elements.score.textContent = this.state.score.toString().padStart(4,'0');
                this.elements.shuffles.textContent = this.state.shuffles.toString().padStart(2,'0');
                this.elements.shuffleBtn.disabled = this.state.shuffles <= 0;
            }

            showLoading() {
                const loader = document.createElement('div');
                loader.className = 'spinner';
                loader.id = 'board-loader';
                loader.style.position = 'absolute';
                loader.style.top = '50%';
                loader.style.left = '50%';
                loader.style.transform = 'translate(-50%, -50%)';
                this.elements.board.parentElement.appendChild(loader);
            }

            hideLoading() {
                const loader = document.getElementById('board-loader');
                if (loader) loader.remove();
            }

            buildGrid() {
                const total = this.state.rows * this.state.cols;
                this.state.pairs = total / 2;
                let items = [];

                // Shuffle emoji pool
                let pool = [...this.emojiPool].sort(() => Math.random() - 0.5);

                // Create pairs
                for (let i = 0; i < this.state.pairs; i++) {
                    const emoji = pool[i % pool.length];
                    items.push(emoji, emoji);
                }

                // Final shuffle
                for (let i = items.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [items[i], items[j]] = [items[j], items[i]];
                }

                // Create board with borders (0 means empty)
                this.state.board = Array(this.state.rows + 2).fill().map(() => Array(this.state.cols + 2).fill(0));

                let idx = 0;
                for (let r = 1; r <= this.state.rows; r++) {
                    for (let c = 1; c <= this.state.cols; c++) {
                        this.state.board[r][c] = items[idx++];
                    }
                }
            }

            renderBoard() {
                const boardEl = this.elements.board;
                const container = boardEl.parentElement;

                const maxW = container.clientWidth - 40;
                const maxH = container.clientHeight - 40;
                const gap = 4;

                this.state.tileSize = Math.floor(Math.min(
                    (maxW - (this.state.cols - 1) * gap) / this.state.cols,
                    (maxH - (this.state.rows - 1) * gap) / this.state.rows,
                    70
                ));

                boardEl.style.gridTemplateColumns = `repeat(${this.state.cols}, ${this.state.tileSize}px)`;
                boardEl.style.gridTemplateRows = `repeat(${this.state.rows}, ${this.state.tileSize}px)`;

                boardEl.innerHTML = '';
                this.elements.svgLayer.innerHTML = '';

                for (let r = 1; r <= this.state.rows; r++) {
                    for (let c = 1; c <= this.state.cols; c++) {
                        const tile = document.createElement('div');
                        tile.className = 'tile';
                        tile.dataset.row = r;
                        tile.dataset.col = c;

                        if (this.state.board[r][c] !== 0) {
                            tile.textContent = this.state.board[r][c];
                            tile.addEventListener('click', this.handleTileClick);
                        } else {
                            tile.classList.add('hidden');
                        }

                        boardEl.appendChild(tile);
                    }
                }
            }

            handleTileClick(e) {
                if (this.state.isAnimating) return;

                const tile = e.currentTarget;
                const r = parseInt(tile.dataset.row);
                const c = parseInt(tile.dataset.col);

                if (this.state.board[r][c] === 0) return;

                if (!this.state.selected) {
                    this.playSound('select');
                    this.vibrate(10);
                    this.clearSelection();
                    this.state.selected = { element: tile, row: r, col: c };
                    tile.classList.add('selected');
                } else {
                    const s = this.state.selected;

                    if (s.row === r && s.col === c) {
                        this.clearSelection();
                        this.playSound('select');
                        return;
                    }

                    if (this.state.board[s.row][s.col] === this.state.board[r][c]) {
                        const path = this.findPath({r: s.row, c: s.col}, {r, c});

                        if (path) {
                            this.state.isAnimating = true;
                            this.playSound('match');
                            this.vibrate(20);
                            this.drawPath(path);
                            this.elements.board.style.pointerEvents = 'none';

                            this.state.combo++;
                            if (this.state.combo > 1) {
                                this.state.score += 10 * this.state.combo;
                            }

                            setTimeout(() => {
                                this.state.board[s.row][s.col] = 0;
                                this.state.board[r][c] = 0;

                                s.element.classList.add('hidden', 'matched');
                                tile.classList.add('hidden', 'matched');
                                s.element.classList.remove('selected');

                                this.elements.svgLayer.innerHTML = '';

                                this.state.score += 25;
                                this.state.pairs--;
                                this.elements.score.textContent = this.state.score.toString().padStart(4,'0');

                                this.elements.board.style.pointerEvents = 'auto';
                                this.state.isAnimating = false;
                                this.clearSelection();

                                this.checkAchievements();

                                if (this.state.pairs === 0) {
                                    this.state.shuffles++;
                                    this.updateUI();
                                    this.playSound('levelUp');
                                    this.vibrate([100,50,100]);
                                    this.confetti();
                                    setTimeout(() => this.startLevel(this.state.level + 1), 800);
                                }
                            }, 250);
                        } else {
                            this.showError(s.element, tile);
                        }
                    } else {
                        this.showError(s.element, tile);
                        this.state.combo = 0;
                    }
                }
            }

            clearSelection() {
                if (this.state.selected) {
                    this.state.selected.element.classList.remove('selected');
                    this.state.selected = null;
                }
            }

            showError(tile1, tile2) {
                this.playSound('error');
                this.vibrate(30);
                this.clearSelection();
                tile1.classList.add('error');
                tile2.classList.add('error');
                setTimeout(() => {
                    tile1.classList.remove('error');
                    tile2.classList.remove('error');
                }, 400);
            }

            findPath(start, end) {
                const rows = this.state.rows + 2;
                const cols = this.state.cols + 2;
                const dr = [-1, 0, 1, 0];
                const dc = [0, 1, 0, -1];

                const queue = [{
                    r: start.r,
                    c: start.c,
                    path: [[start.r, start.c]],
                    dir: -1,
                    corners: 0
                }];

                const visited = Array(rows).fill().map(() => Array(cols).fill().map(() => Array(4).fill(Infinity)));

                while (queue.length) {
                    const curr = queue.shift();

                    if (curr.r === end.r && curr.c === end.c) {
                        return curr.path;
                    }

                    for (let i = 0; i < 4; i++) {
                        const nr = curr.r + dr[i];
                        const nc = curr.c + dc[i];
                        const nextCorners = curr.corners + (curr.dir !== -1 && curr.dir !== i ? 1 : 0);

                        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && nextCorners <= 2) {
                            if (this.state.board[nr][nc] === 0 || (nr === end.r && nc === end.c)) {
                                if (nextCorners < visited[nr][nc][i]) {
                                    visited[nr][nc][i] = nextCorners;
                                    queue.push({
                                        r: nr,
                                        c: nc,
                                        path: [...curr.path, [nr, nc]],
                                        dir: i,
                                        corners: nextCorners
                                    });
                                }
                            }
                        }
                    }
                }
                return null;
            }

            drawPath(path) {
                const svg = this.elements.svgLayer;
                const boardRect = this.elements.board.getBoundingClientRect();

                svg.innerHTML = '';
                svg.setAttribute('viewBox', `0 0 ${window.innerWidth} ${window.innerHeight}`);

                const cellSize = this.state.tileSize + 4;

                const points = path.map(([r, c]) => {
                    const x = boardRect.left + (c - 0.5) * cellSize;
                    const y = boardRect.top + (r - 0.5) * cellSize;
                    return `${x},${y}`;
                }).join(' ');

                const polyline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
                polyline.setAttribute('points', points);
                polyline.setAttribute('fill', 'none');
                polyline.setAttribute('stroke', 'white');
                polyline.setAttribute('stroke-width', '3');
                polyline.setAttribute('stroke-linecap', 'round');
                polyline.setAttribute('stroke-linejoin', 'round');
                polyline.classList.add('path-line');

                svg.appendChild(polyline);
            }

            shuffle() {
                if (this.state.shuffles <= 0 || this.state.isAnimating) return;

                this.state.shuffles--;
                this.playSound('shuffle');
                this.vibrate(15);
                this.updateUI();

                const visible = [];
                for (let r = 1; r <= this.state.rows; r++) {
                    for (let c = 1; c <= this.state.cols; c++) {
                        if (this.state.board[r][c] !== 0) visible.push(this.state.board[r][c]);
                    }
                }

                for (let i = visible.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [visible[i], visible[j]] = [visible[j], visible[i]];
                }

                let idx = 0;
                for (let r = 1; r <= this.state.rows; r++) {
                    for (let c = 1; c <= this.state.cols; c++) {
                        if (this.state.board[r][c] !== 0) this.state.board[r][c] = visible[idx++];
                    }
                }

                this.renderBoard();
                this.clearSelection();
                this.state.combo = 0;
            }

            confetti() {
                for (let i = 0; i < 30; i++) {
                    const conf = document.createElement('div');
                    conf.className = 'confetti';
                    conf.style.left = Math.random() * 100 + '%';
                    conf.style.background = `hsl(${Math.random() * 360}, 80%, 60%)`;
                    conf.style.animationDuration = (1 + Math.random() * 2) + 's';
                    conf.style.animationDelay = (Math.random() * 0.5) + 's';
                    document.body.appendChild(conf);
                    setTimeout(() => conf.remove(), 3000);
                }
            }

            showGameOver(title, message) {
                clearInterval(this.state.timer);
                this.saveHighScore();
                this.elements.modalTitle.textContent = title;
                this.elements.modalStats.innerHTML = message;
                this.elements.modal.style.display = 'flex';
                setTimeout(() => this.elements.modal.style.opacity = '1', 50);
            }

            reset() {
                this.elements.modal.style.opacity = '0';
                setTimeout(() => {
                    this.elements.modal.style.display = 'none';

                    this.state = {
                        ...this.state,
                        level: 1,
                        score: 0,
                        shuffles: 3,
                        board: [],
                        selected: null,
                        pairs: 0,
                        gameTime: 0,
                        combo: 0
                    };

                    this.startTimer();
                    this.startLevel(1);
                }, 300);
            }

            // Settings methods
            openSettings() {
                this.elements.settingsHighscore.textContent = this.state.highScore;
                this.elements.soundToggle.className = 'toggle-switch' + (this.state.soundEnabled ? ' active' : '');
                this.elements.vibrateToggle.className = 'toggle-switch' + (this.state.vibrateEnabled ? ' active' : '');
                this.elements.settingsModal.style.display = 'flex';
                setTimeout(() => this.elements.settingsModal.style.opacity = '1', 50);
            }

            closeSettings() {
                this.elements.settingsModal.style.opacity = '0';
                setTimeout(() => this.elements.settingsModal.style.display = 'none', 300);
            }

            toggleSound() {
                this.state.soundEnabled = !this.state.soundEnabled;
                this.elements.soundToggle.classList.toggle('active');
                this.saveSettings();
            }

            toggleVibrate() {
                this.state.vibrateEnabled = !this.state.vibrateEnabled;
                this.elements.vibrateToggle.classList.toggle('active');
                this.saveSettings();
            }
        }

        // -------------------- GLOBAL INSTANCE --------------------
        const game = new XolericGamePro();

        // Global functions for buttons
        function openSettings() { game.openSettings(); }
        function closeSettings() { game.closeSettings(); }
        function toggleSound() { game.toggleSound(); }
        function toggleVibrate() { game.toggleVibrate(); }

        // Event listeners for toggles
        document.addEventListener('click', (e) => {
            if (e.target.closest('#sound-toggle')) toggleSound();
            if (e.target.closest('#vibrate-toggle')) toggleVibrate();
        });

        // -------------------- PWA SETUP --------------------
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-btn').style.display = 'flex';
        });

        document.getElementById('install-btn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('install-btn').style.display = 'none';
                }
                deferredPrompt = null;
            }
        });

        // Handle resize
        window.addEventListener('resize', () => {
            if (game.elements.game.style.display === 'flex') {
                game.renderBoard();
            }
        });
    </script>
