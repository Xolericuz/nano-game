<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XOLƎRIƆ: ULTIMATE PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* reset & base — exactly as before, with a few pixel-perfect fixes */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Orbitron', sans-serif;
        }
        :root {
            --bg-deep: #020406;
            --primary: #00f0ff;
            --accent: #ff003c;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }
        body {
            background-color: var(--bg-deep);
            color: #fff;
            width: 100vw;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: fixed;
        }
        #bg-canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
            opacity: 0.12;
        }
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            z-index: 10;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        /* login screen */
        #login-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #login-screen.hidden {
            opacity: 0;
            transform: scale(1.1) translateY(-50px);
            pointer-events: none;
        }
        .logo {
            font-size: clamp(2.5rem, 10vw, 4.5rem);
            font-weight: 900;
            letter-spacing: 12px;
            margin-bottom: 40px;
            text-shadow: var(--neon-shadow);
        }
        .rev { display: inline-block; transform: scaleX(-1); color: var(--primary); }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 85%;
            max-width: 320px;
        }
        input {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--primary);
            padding: 20px;
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            text-align: center;
            outline: none;
            transition: 0.3s;
        }
        input:focus { box-shadow: var(--neon-shadow); border-color: #fff; }
        .btn-main {
            background: var(--primary);
            color: #000;
            padding: 20px;
            border-radius: 50px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: 0.3s;
        }
        .btn-main:active { transform: scale(0.95); }
        /* game grid */
        #game-ui {
            flex: 1;
            display: grid;
            grid-template-rows: 80px 1fr 90px;
            padding: 15px;
            gap: 15px;
            opacity: 0;
            transition: 1s;
            z-index: 10;
        }
        .header, .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }
        .stat-box { text-align: center; }
        .stat-label { font-size: 0.65rem; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 1.2rem; color: var(--primary); font-weight: bold; }
        #board-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-radius: 24px;
        }
        #grid {
            display: grid;
            gap: 6px;
            z-index: 20;
            padding: 10px;
        }
        .tile {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            aspect-ratio: 1/1;
        }
        .tile.selected {
            background: rgba(0, 240, 255, 0.2);
            border-color: var(--primary);
            box-shadow: var(--neon-shadow);
            transform: scale(1.1);
            z-index: 30;
        }
        .tile.matched {
            opacity: 0;
            transform: scale(0.5);
            pointer-events: none;
            transition: 0.4s;
        }
        #svg-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 100;
        }
        .connection-line {
            fill: none;
            stroke: var(--primary);
            stroke-width: 5;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 10px var(--primary));
        }
        .btn-shuffle {
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .btn-shuffle:active { background: var(--primary); color: #000; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <!-- login screen -->
    <div id="login-screen" class="glass-panel">
        <div class="logo">XOL<span class="rev">E</span>RI<span class="rev">C</span></div>
        <div class="input-group">
            <input type="text" id="player-name" placeholder="IDENTIFICATION..." autocomplete="off">

    </div>

            </div>
            <div class="stat-box">

                <div class="stat-value" id="score-display">00000</div>

        <div id="board-wrapper" class="glass-panel">
            <div id="grid"></div>
            <svg id="svg-layer"></svg>
        </div>

        <div class="footer glass-panel">
            <div class="stat-box" style="text-align: left;">
                <div class="stat-label">Operator</div>
                <div class="stat-value" id="user-display">GUEST</div>
            </div>
            <button class="btn-shuffle" onclick="handleShuffle()">SHUFFLE (INF)</button>
        </div>
    </div>

            // ---------- CORE GAME STATE ----------
            let gameState = {

                selected: null,       // {r, c}

            const userDisplay = document.getElementById('user-display');

            // ---------- MATRIX BACKGROUND ----------
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            let columns, drops = [];
            const fontSize = 16;
            function initMatrix() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                columns = Math.floor(canvas.width / fontSize);
                drops = new Array(columns).fill(1);
            }
            function drawMatrix() {
                ctx.fillStyle = 'rgba(2, 4, 6, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#00f0ff';
                ctx.font = fontSize + 'px monospace';
                for (let i = 0; i < drops.length; i++) {
                    const text = String.fromCharCode(0x30A0 + Math.random() * 33);
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }
            setInterval(drawMatrix, 50);
            window.addEventListener('resize', initMatrix);
            initMatrix();

            // ---------- GAME FUNCTIONS ----------
            window.startEngine = function() {
                const name = document.getElementById('player-name').value.trim() || "USER_" + Math.floor(Math.random()*999);
                userDisplay.innerText = name.toUpperCase();

                try { if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen(); } catch(e){}

                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('game-ui').style.opacity = '1';

                setupLevel();
            };

            function setupLevel() {
                // dynamic size based on level & screen
                gameState.rows = 6 + Math.floor(gameState.level / 3);
                gameState.cols = window.innerWidth > 600 ? 8 : 6;

                generateData();
                renderGrid();
            }

            function generateData() {
                const total = gameState.rows * gameState.cols;
                const pairs = total / 2;
                // pick random unique emojis from DB
                let shuffled = [...EMOJI_DB].sort(() => Math.random() - 0.5);
                let pool = [];
                for (let i = 0; i < pairs; i++) pool.push(shuffled[i % shuffled.length]);
                let items = [];
                pool.forEach(e => { items.push(e, e); });
                items.sort(() => Math.random() - 0.5);

                // create grid with boundaries (null)
                gameState.grid = [];
                for (let r = 0; r < gameState.rows + 2; r++) {
                    gameState.grid[r] = new Array(gameState.cols + 2).fill(null);
                }

                let idx = 0;
                for (let r = 1; r <= gameState.rows; r++) {
                    for (let c = 1; c <= gameState.cols; c++) {
                        gameState.grid[r][c] = items[idx++];
                    }
                }
            }

            function renderGrid() {
                gridEl.style.gridTemplateColumns = `repeat(${gameState.cols}, 1fr)`;
                gridEl.innerHTML = '';

                const boardW = document.getElementById('board-wrapper').clientWidth - 40;
                const tileSize = Math.floor(boardW / gameState.cols);

                for (let r = 1; r <= gameState.rows; r++) {
                    for (let c = 1; c <= gameState.cols; c++) {
                        const tile = document.createElement('div');
                        tile.className = 'tile';
                        tile.style.width = `${tileSize}px`;
                        tile.style.height = `${tileSize}px`;
                        tile.style.fontSize = `${tileSize * 0.55}px`;

                        if (gameState.grid[r][c]) {
                            tile.innerText = gameState.grid[r][c];
                            tile.onclick = (function(row, col, el) {
                                return function() { handleTileClick(row, col, el); };
                            })(r, c, tile);
                        } else {
                            tile.classList.add('matched');
                        }
                        tile.id = `t-${r}-${c}`;
                        gridEl.appendChild(tile);
                    }
                }
                svgEl.innerHTML = ''; // clear lines
            }

            function handleTileClick(r, c, el) {
                if (gameState.isProcessing) return;

                if (gameState.selected) {
                    // same tile -> deselect
                    if (gameState.selected.r === r && gameState.selected.c === c) {
                        document.getElementById(`t-${gameState.selected.r}-${gameState.selected.c}`).classList.remove('selected');
                        gameState.selected = null;
                        return;
                    }

                    // check if same emoji
                    if (gameState.grid[r][c] === gameState.grid[gameState.selected.r][gameState.selected.c]) {
                        const path = findLink(gameState.selected.r, gameState.selected.c, r, c);
                        if (path) {
                            gameState.isProcessing = true;
                            executeMatch(gameState.selected, {r, c}, path);
                            return;
                        }
                    }

                    // wrong pair -> new selection
                    document.getElementById(`t-${gameState.selected.r}-${gameState.selected.c}`).classList.remove('selected');
                    gameState.selected = {r, c};
                    el.classList.add('selected');
                } else {
                    gameState.selected = {r, c};
                    el.classList.add('selected');
                }
            }

            // pathfinding: BFS with at most 2 turns
            function findLink(r1, c1, r2, c2) {
                const queue = [{r: r1, c: c1, dir: -1, turns: 0, path: [[r1, c1]]}];
                const visited = new Set();

                while (queue.length > 0) {
                    const curr = queue.shift();
                    if (curr.turns > 2) continue;
                    if (curr.r === r2 && curr.c === c2) return curr.path;

                    const dirs = [[-1,0], [1,0], [0,-1], [0,1]];
                    for (let i = 0; i < 4; i++) {
                        const nr = curr.r + dirs[i][0];
                        const nc = curr.c + dirs[i][1];
                        if (nr >= 0 && nr < gameState.rows+2 && nc >= 0 && nc < gameState.cols+2) {
                            if (gameState.grid[nr][nc] === null || (nr === r2 && nc === c2)) {
                                const nt = (curr.dir !== -1 && curr.dir !== i) ? curr.turns + 1 : curr.turns;
                                const key = `${nr}-${nc}-${i}-${nt}`;
                                if (!visited.has(key)) {
                                    visited.add(key);
                                    queue.push({r: nr, c: nc, dir: i, turns: nt, path: [...curr.path, [nr, nc]]});
                                }
                            }
                        }
                    }
                }
                return null;
            }

            function executeMatch(p1, p2, path) {
                drawPath(path);

                setTimeout(() => {
                    // remove both tiles
                    gameState.grid[p1.r][p1.c] = null;
                    gameState.grid[p2.r][p2.c] = null;

                    document.getElementById(`t-${p1.r}-${p1.c}`).classList.add('matched');
                    document.getElementById(`t-${p2.r}-${p2.c}`).classList.add('matched');

                    gameState.score += 150 + (gameState.level * 10);
                    scoreDisplay.innerText = gameState.score.toString().padStart(5, '0');

                    svgEl.innerHTML = '';   // erase line
                    gameState.selected = null;
                    gameState.isProcessing = false;
                    checkWin();
                }, 350);
            }

            function drawPath(path) {
                const wrapperRect = document.getElementById('board-wrapper').getBoundingClientRect();
                const points = path.map(p => {
                    const tile = document.getElementById(`t-${p[0]}-${p[1]}`);
                    let x, y;
                    if (tile && !tile.classList.contains('matched')) {
                        const r = tile.getBoundingClientRect();
                        x = r.left + r.width / 2 - wrapperRect.left;
                        y = r.top + r.height / 2 - wrapperRect.top;
                    } else {
                        // fallback (should not happen)
                        const gRect = gridEl.getBoundingClientRect();
                        const cW = gRect.width / gameState.cols;
                        const cH = gRect.height / gameState.rows;
                        x = (p[1] - 0.5) * cW + gridEl.offsetLeft;
                        y = (p[0] - 0.5) * cH + gridEl.offsetTop;
                    }
                    return `${x},${y}`;
                }).join(' ');

                svgEl.innerHTML = `<polyline points="${points}" class="connection-line" />`;
            }

            function checkWin() {
                const remaining = gameState.grid.flat().filter(x => x !== null).length;
                if (remaining === 0) {
                    gameState.level++;
                    lvlDisplay.innerText = gameState.level.toString().padStart(2, '0');
                    setTimeout(() => {
                        // you may replace alert with subtle ui, but keep it for now
                        alert("NEXT LEVEL INITIALIZED!");
                        setupLevel();
                    }, 500);
                }
            }

            window.handleShuffle = function() {
                let active = gameState.grid.flat().filter(x => x !== null);
                active.sort(() => Math.random() - 0.5);
                let idx = 0;
                for (let r = 1; r <= gameState.rows; r++) {
                    for (let c = 1; c <= gameState.cols; c++) {
                        if (gameState.grid[r][c]) gameState.grid[r][c] = active[idx++];
                    }
                }
                renderGrid();
                // deselect if any
                if (gameState.selected) {
                    document.getElementById(`t-${gameState.selected.r}-${gameState.selected.c}`)?.classList.remove('selected');
                    gameState.selected = null;
                }
                svgEl.innerHTML = '';
            };

            // fix orientation resize
            window.addEventListener('resize', function() {
                if (document.getElementById('game-ui').style.opacity === '1') {
                    renderGrid();
                }
            });
        })();
    </script>
</body>
</html>
