<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#020406">
    <title>XOLƎRIƆ</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22XOL%C6%8ERI%C6%86%20PRO%22%2C%22short_name%22%3A%22XOL%C6%8ERI%C6%86%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23020406%22%2C%22theme_color%22%3A%22%2300f0ff%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fpng%3Bbase64%2CiVBORw0KGgoAAAANSUhEUgAAAEAAAABACAQAAAAAYLlVAAAAPElEQVR42u3OMQEAAAwCoPk3tY/mAwkg6yYqKioqKioqKioqKioqKioqKioqKioqKioqKioqKioqKio6Wwd7gAERjPXYAAAAAElFTkSuQmCC%22%2C%22sizes%22%3A%2264x64%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Orbitron', sans-serif;
        }
        :root {
            --bg-deep: #020406;
            --primary: #00f0ff;
            --accent: #ff003c;
            --glass: rgba(10, 25, 40, 0.4);
            --glass-border: rgba(0, 240, 255, 0.2);
            --neon-shadow: 0 0 20px rgba(0, 240, 255, 0.6);
            --success-shadow: 0 0 20px rgba(0, 255, 100, 0.6);
        }
        body {
            background-color: var(--bg-deep);
            color: #fff;
            width: 100vw;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: fixed;
        }
        #bg-canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
            opacity: 0.15;
        }
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            z-index: 10;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }
        /* Login Screen */
        #login-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(2, 4, 6, 0.85);
        }
        #login-screen.hidden {
            opacity: 0;
            transform: scale(1.1);
            pointer-events: none;
        }
        .logo {
            font-size: clamp(3rem, 12vw, 5rem);
            font-weight: 900;
            letter-spacing: 8px;
            margin-bottom: 40px;
            text-shadow: var(--neon-shadow);
            color: #fff;
        }
        .logo .rev { color: var(--primary); }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 90%;
            max-width: 350px;
        }
        input {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid var(--primary);
            padding: 18px;
            border-radius: 12px;
            color: white;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        input:focus { box-shadow: var(--neon-shadow); background: rgba(0, 240, 255, 0.1); }
        .btn-main {
            background: var(--primary);
            color: #000;
            padding: 18px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }
        .btn-main:active { transform: scale(0.96); }
        .btn-secondary {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 2px;
            display: none; /* Shows only if save exists */
        }
        /* Game UI */
        #game-ui {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 15px;
            gap: 15px;
            opacity: 0;
            transition: 0.8s ease-in-out;
            z-index: 10;
            height: 100%;
        }
        .header, .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            flex-shrink: 0;
        }
        .stat-box { text-align: center; }
        .stat-label { font-size: 0.7rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.5rem; color: var(--primary); font-weight: 900; text-shadow: 0 0 10px rgba(0,240,255,0.4); }
        #board-wrapper {
            position: relative;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-radius: 20px;
            padding: 5px;
        }
        #grid {
            display: grid;
            gap: 8px;
            z-index: 20;
            padding: 5px;
            max-width: 100%;
            max-height: 100%;
        }
        .tile {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            aspect-ratio: 1/1;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }
        .tile:active { transform: scale(0.9); }
        .tile.selected {
            background: rgba(0, 240, 255, 0.25);
            border-color: #fff;
            box-shadow: var(--neon-shadow);
            transform: scale(1.08);
            z-index: 30;
        }
        .tile.matched {
            opacity: 0;
            transform: scale(0);
            pointer-events: none;
            transition: 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        #svg-layer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        .connection-line {
            fill: none;
            stroke: #00ff88;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 12px #00ff88);
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawLine 0.3s forwards ease-in-out;
        }
        @keyframes drawLine { to { stroke-dashoffset: 0; } }
        .btn-shuffle {
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-shuffle:active { background: var(--primary); color: #000; }
        
        /* Level up overlay */
        #level-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 500;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            color: var(--primary);
            font-weight: 900;
            text-shadow: var(--neon-shadow);
            opacity: 0;
            pointer-events: none;
            transition: 0.4s;
            letter-spacing: 5px;
        }
        #level-overlay.show { opacity: 1; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div id="login-screen" class="glass-panel">
        <div class="logo">XOL<span class="rev">Ǝ</span>RI<span class="rev">Ɔ</span></div>
        <div class="input-group">
            <input type="text" id="player-name" placeholder="Ismingizga..." autocomplete="off">
            <button class="btn-main" onclick="startNewGame()">KRISH</button>
            <button class="btn-secondary" id="btn-continue" onclick="continueGame()">DAVOM ETTIRISH</button>
        </div>
    </div>

    <div id="game-ui">
        <div class="header glass-panel">
            <div class="stat-box">
                <div class="stat-label">Daraja</div>
                <div class="stat-value" id="lvl-display">01</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Global Hisob</div>
                <div class="stat-value" id="score-display">00000</div>
            </div>
        </div>

        <div id="board-wrapper" class="glass-panel">
            <div id="grid"></div>
            <svg id="svg-layer"></svg>
            <div id="level-overlay">AJOYIB</div>
        </div>

        <div class="footer glass-panel">
            <div class="stat-box" style="text-align: left;">
                <div class="stat-label">Operator</div>
                <div class="stat-value" id="user-display" style="font-size:1.1rem;">GUEST</div>
            </div>
            <button class="btn-shuffle" onclick="handleShuffle()">ARALASHTIRISH</button>
        </div>
    </div>

    <script>
        // PWA Service Worker integratsiyasi (Offline ishlashi uchun bitta fayl ichida)
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', (e) => { e.waitUntil(self.skipWaiting()); });
                self.addEventListener('activate', (e) => { e.waitUntil(self.clients.claim()); });
                self.addEventListener('fetch', (e) => {
                    e.respondWith(fetch(e.request).catch(() => new Response('Oflayn rejim faol.')));
                });
            `;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(err => console.log('SW xatosi', err));
        }

        // Qisqartirilgan va optimizatsiya qilingan Emoji DB
        const EMOJI_DB = ["😀","😂","😎","🤩","🥶","👽","🤖","👻","💀","💩","👾","🎃","😺","🦊","🐼","🦁","🐸","🚀","🛸","💎","🔥","⚡","🪐","🌍","🍕","🍔","🍏","🍒","🎲","🎮","🎯","🏆","🎸","🎧","📱","💻","💣","💡","🧿","🔮"];

        let gameState = {
            level: 1,
            score: 0,
            rows: 0,
            cols: 0,
            grid: [],
            selected: null,
            isProcessing: false,
            playerName: "GUEST"
        };

        const elements = {
            grid: document.getElementById('grid'),
            svg: document.getElementById('svg-layer'),
            lvl: document.getElementById('lvl-display'),
            score: document.getElementById('score-display'),
            user: document.getElementById('user-display'),
            loginScreen: document.getElementById('login-screen'),
            gameUI: document.getElementById('game-ui'),
            overlay: document.getElementById('level-overlay'),
            btnContinue: document.getElementById('btn-continue'),
            playerNameInput: document.getElementById('player-name')
        };

        // Matrix Fon Effekti
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let drops = [], columns;
        function initMatrix() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            columns = Math.floor(canvas.width / 16);
            drops = new Array(columns).fill(1);
        }
        function drawMatrix() {
            ctx.fillStyle = 'rgba(2, 4, 6, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00f0ff';
            ctx.font = '16px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = String.fromCharCode(0x30A0 + Math.random() * 33);
                ctx.fillText(text, i * 16, drops[i] * 16);
                if (drops[i] * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);
        window.addEventListener('resize', () => { initMatrix(); if(!elements.loginScreen.classList.contains('hidden')) renderGrid(); });
        initMatrix();

        // Xotirani Tekshirish (Auto-Save Tizimi)
        window.onload = () => {
            const saved = localStorage.getItem('xoleric_save');
            if (saved) {
                elements.btnContinue.style.display = 'block';
                const data = JSON.parse(saved);
                elements.playerNameInput.value = data.playerName;
            }
        };

        function saveGame() {
            localStorage.setItem('xoleric_save', JSON.stringify(gameState));
        }

        window.startNewGame = function() {
            gameState.playerName = elements.playerNameInput.value.trim().toUpperCase() || "OPERATOR_" + Math.floor(Math.random()*99);
            gameState.level = 1;
            gameState.score = 0;
            initUI();
            setupLevel();
        };

        window.continueGame = function() {
            const saved = JSON.parse(localStorage.getItem('xoleric_save'));
            if(saved) {
                gameState = saved;
                gameState.selected = null; 
                gameState.isProcessing = false;
                initUI();
                renderGrid();
                updateStats();
            }
        };

        function initUI() {
            elements.user.innerText = gameState.playerName;
            elements.loginScreen.classList.add('hidden');
            elements.gameUI.style.opacity = '1';
            try { if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen(); } catch(e){}
        }

        function updateStats() {
            elements.lvl.innerText = gameState.level.toString().padStart(2, '0');
            elements.score.innerText = gameState.score.toString().padStart(5, '0');
        }

        function setupLevel() {
            gameState.rows = Math.min(6 + Math.floor((gameState.level - 1) / 2), 12);
            gameState.cols = window.innerWidth > 600 ? Math.min(8 + Math.floor((gameState.level - 1)/2), 14) : Math.min(6 + Math.floor((gameState.level - 1)/3), 10);
            
            // Juft bo'lishini ta'minlash
            if ((gameState.rows * gameState.cols) % 2 !== 0) gameState.rows++;

            generateData();
            renderGrid();
            updateStats();
            saveGame();
        }

        function generateData() {
            const total = gameState.rows * gameState.cols;
            let shuffledDB = [...EMOJI_DB].sort(() => Math.random() - 0.5);
            let pool = [];
            for (let i = 0; i < total / 2; i++) {
                pool.push(shuffledDB[i % shuffledDB.length]);
            }
            let items = [...pool, ...pool].sort(() => Math.random() - 0.5);

            gameState.grid = Array.from({length: gameState.rows + 2}, () => new Array(gameState.cols + 2).fill(null));
            
            let idx = 0;
            for (let r = 1; r <= gameState.rows; r++) {
                for (let c = 1; c <= gameState.cols; c++) {
                    gameState.grid[r][c] = items[idx++];
                }
            }
        }

        function renderGrid() {
            elements.grid.style.gridTemplateColumns = `repeat(${gameState.cols}, 1fr)`;
            elements.grid.style.gridTemplateRows = `repeat(${gameState.rows}, 1fr)`;
            elements.grid.innerHTML = '';

            for (let r = 1; r <= gameState.rows; r++) {
                for (let c = 1; c <= gameState.cols; c++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    const val = gameState.grid[r][c];
                    
                    if (val) {
                        tile.innerText = val;
                        // Avtomatik o'lcham
                        tile.style.fontSize = `min(6vw, 4vh, 40px)`;
                        tile.onclick = () => handleTileClick(r, c, tile);
                    } else {
                        tile.classList.add('matched');
                    }
                    tile.id = `t-${r}-${c}`;
                    elements.grid.appendChild(tile);
                }
            }
            elements.svg.innerHTML = '';
        }

        function handleTileClick(r, c, el) {
            if (gameState.isProcessing) return;

            if (gameState.selected) {
                const {r: sr, c: sc} = gameState.selected;
                
                if (sr === r && sc === c) {
                    el.classList.remove('selected');
                    gameState.selected = null;
                    return;
                }

                if (gameState.grid[r][c] === gameState.grid[sr][sc]) {
                    const path = findLink(sr, sc, r, c);
                    if (path) {
                        gameState.isProcessing = true;
                        executeMatch(gameState.selected, {r, c}, path);
                        return;
                    }
                }

                document.getElementById(`t-${sr}-${sc}`).classList.remove('selected');
                gameState.selected = {r, c};
                el.classList.add('selected');
            } else {
                gameState.selected = {r, c};
                el.classList.add('selected');
            }
        }

        // Murakkab yo'l qidirish algoritmi (Onet Connect)
        function findLink(r1, c1, r2, c2) {
            const queue = [{r: r1, c: c1, dir: -1, turns: 0, path: [[r1, c1]]}];
            // Matrixni yengil qilish uchun 3D visited array o'rniga Set ishlatamiz
            const visited = new Set();

            while (queue.length > 0) {
                const curr = queue.shift();
                if (curr.turns > 2) continue;
                if (curr.r === r2 && curr.c === c2) return curr.path;

                const dirs = [[-1,0], [1,0], [0,-1], [0,1]];
                for (let i = 0; i < 4; i++) {
                    const nr = curr.r + dirs[i][0];
                    const nc = curr.c + dirs[i][1];
                    
                    if (nr >= 0 && nr < gameState.rows + 2 && nc >= 0 && nc < gameState.cols + 2) {
                        if (gameState.grid[nr][nc] === null || (nr === r2 && nc === c2)) {
                            const nt = (curr.dir !== -1 && curr.dir !== i) ? curr.turns + 1 : curr.turns;
                            const key = `${nr},${nc},${i},${nt}`;
                            if (!visited.has(key)) {
                                visited.add(key);
                                queue.push({r: nr, c: nc, dir: i, turns: nt, path: [...curr.path, [nr, nc]]});
                            }
                        }
                    }
                }
            }
            return null;
        }

        function executeMatch(p1, p2, path) {
            drawPath(path);

            setTimeout(() => {
                gameState.grid[p1.r][p1.c] = null;
                gameState.grid[p2.r][p2.c] = null;

                const t1 = document.getElementById(`t-${p1.r}-${p1.c}`);
                const t2 = document.getElementById(`t-${p2.r}-${p2.c}`);
                t1.classList.remove('selected');
                t2.classList.remove('selected');
                t1.classList.add('matched');
                t2.classList.add('matched');

                gameState.score += 150 + (gameState.level * 20);
                updateStats();
                saveGame();

                setTimeout(() => { elements.svg.innerHTML = ''; }, 150);
                
                gameState.selected = null;
                gameState.isProcessing = false;
                checkWin();
            }, 300);
        }

        // Aniq SVG chizish mexanizmi (chegara bo'shliqlari uchun ham)
        function drawPath(path) {
            const wrapperRect = elements.svg.getBoundingClientRect();
            const gridRect = elements.grid.getBoundingClientRect();
            
            const cellW = gridRect.width / gameState.cols;
            const cellH = gridRect.height / gameState.rows;
            const offsetX = gridRect.left - wrapperRect.left;
            const offsetY = gridRect.top - wrapperRect.top;

            const points = path.map(p => {
                const r = p[0], c = p[1];
                const x = offsetX + (c - 0.5) * cellW;
                const y = offsetY + (r - 0.5) * cellH;
                return `${x},${y}`;
            }).join(' ');

            const polyline = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
            polyline.setAttribute("points", points);
            polyline.setAttribute("class", "connection-line");
            
            // Animatsiya uzunligini hisoblash
            const length = (path.length * Math.max(cellW, cellH));
            polyline.style.strokeDasharray = length;
            polyline.style.strokeDashoffset = length;
            
            elements.svg.appendChild(polyline);
        }

        function checkWin() {
            let hasActive = false;
            for(let r=1; r<=gameState.rows; r++) {
                for(let c=1; c<=gameState.cols; c++) {
                    if(gameState.grid[r][c] !== null) {
                        hasActive = true;
                        break;
                    }
                }
            }
            
            if (!hasActive) {
                gameState.level++;
                saveGame();
                elements.overlay.classList.add('show');
                setTimeout(() => {
                    elements.overlay.classList.remove('show');
                    setupLevel();
                }, 1500);
            }
        }

        window.handleShuffle = function() {
            if(gameState.isProcessing) return;
            let active = [];
            for(let r=1; r<=gameState.rows; r++) {
                for(let c=1; c<=gameState.cols; c++) {
                    if(gameState.grid[r][c] !== null) active.push(gameState.grid[r][c]);
                }
            }
            active.sort(() => Math.random() - 0.5);
            let idx = 0;
            for(let r=1; r<=gameState.rows; r++) {
                for(let c=1; c<=gameState.cols; c++) {
                    if(gameState.grid[r][c] !== null) gameState.grid[r][c] = active[idx++];
                }
            }
            
            // Xarajat aralashtirish uchun
            gameState.score = Math.max(0, gameState.score - 50);
            updateStats();
            saveGame();
            renderGrid();
            gameState.selected = null;
        };
    </script>
</body>
</html>
