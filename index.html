<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>XOLƎRIƆ: PURE GLASS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22XOL%C6%8ERI%C6%86%22%2C%22short_name%22%3A%22XOL%C6%8ERI%C6%86%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23000000%22%2C%22theme_color%22%3A%22%23000000%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fpng%3Bbase64%2CiVBORw0KGgoAAAANSUhEUgAAAEAAAABACAQAAAAAYLlVAAAAPElEQVR42u3OMQEAAAwCoPk3tY/mAwkg6yYqKioqKioqKioqKioqKioqKioqKioqKioqKioqKioqKio6Wwd7gAERjPXYAAAAAElFTkSuQmCC%22%2C%22sizes%22%3A%2264x64%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg-pure: #000000;
            --glass-ultra-light: rgba(255, 255, 255, 0.02);
            --glass-light: rgba(255, 255, 255, 0.05);
            --glass-mid: rgba(255, 255, 255, 0.1);
            --glass-solid: rgba(255, 255, 255, 0.9);
            --white-glow: 0 0 15px rgba(255, 255, 255, 0.3);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.4);
            --font-display: 'Orbitron', sans-serif;
            --font-ui: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-pure); color: var(--text-main); font-family: var(--font-ui);
            width: 100vw; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; position: fixed;
            -webkit-font-smoothing: antialiased;
        }

        /* --- GLOBAL SCREENS --- */
        .screen {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
            background: var(--bg-pure); transition: opacity 0.8s ease, filter 0.8s ease;
        }
        .screen.hidden { opacity: 0; pointer-events: none; filter: blur(20px); }

        .logo {
            font-family: var(--font-display); font-size: clamp(3rem, 12vw, 4.5rem);
            font-weight: 900; letter-spacing: 12px; margin-bottom: 50px; color: var(--text-main);
            animation: breathe 4s infinite alternate ease-in-out;
        }
        @keyframes breathe { from { opacity: 0.5; text-shadow: 0 0 5px rgba(255,255,255,0.1); } to { opacity: 1; text-shadow: var(--white-glow); } }

        /* --- STAGE 1: LOGIN --- */
        .input-wrapper { display: flex; flex-direction: column; gap: 25px; width: 80%; max-width: 300px; }
        
        .pure-input {
            background: transparent; border: none; border-bottom: 1px solid var(--text-muted);
            padding: 10px 5px; color: var(--text-main); font-size: 1.2rem; text-align: center;
            outline: none; font-family: var(--font-ui); font-weight: 300; letter-spacing: 2px;
            transition: 0.4s ease;
        }
        .pure-input::placeholder { color: var(--text-muted); font-weight: 300; text-transform: lowercase; }
        .pure-input:focus { border-bottom: 1px solid var(--text-main); text-shadow: var(--white-glow); }

        .pure-btn {
            background: transparent; color: var(--text-main); border: 1px solid var(--glass-mid);
            padding: 16px; border-radius: 12px; font-family: var(--font-ui); font-weight: 400; font-size: 0.9rem;
            cursor: pointer; letter-spacing: 2px; text-transform: uppercase; transition: all 0.4s ease;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .pure-btn:active { background: var(--glass-solid); color: var(--bg-pure); transform: scale(0.98); }
        
        .pwa-btn {
            background: transparent; color: var(--text-muted); border: none; font-size: 0.75rem;
            margin-top: 40px; cursor: pointer; font-weight: 300; letter-spacing: 1px; transition: 0.3s; display: none;
        }
        #btn-continue { display: none; }

        /* --- STAGE 2: CORE GAMEPLAY --- */
        #game-ui { flex: 1; display: flex; flex-direction: column; opacity: 0; transition: opacity 1s ease 0.3s; z-index: 10; height: 100%; filter: blur(20px); }
        #game-ui.active { opacity: 1; filter: blur(0); }

        .hud-top {
            height: 10%; background: var(--glass-ultra-light); border-bottom: 1px solid var(--glass-light);
            display: flex; justify-content: space-between; align-items: center; padding: 0 25px; flex-shrink: 0;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        .hud-block { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .hud-label { font-size: 0.6rem; color: var(--text-muted); font-weight: 400; letter-spacing: 2px; text-transform: uppercase; }
        .hud-value { font-size: 1.2rem; font-weight: 600; color: var(--text-main); font-family: var(--font-display); }
        
        .pulse-warn { animation: pulseWarn 0.8s infinite alternate; }
        @keyframes pulseWarn { from { opacity: 1; text-shadow: var(--white-glow); } to { opacity: 0.4; text-shadow: none; } }

        #board-wrapper { position: relative; height: 75%; display: flex; justify-content: center; align-items: center; padding: 20px; }
        #grid { display: grid; gap: 6px; z-index: 20; max-width: 100%; max-height: 100%; filter: grayscale(100%); }
        
        .tile {
            background: var(--glass-light); border: 1px solid transparent;
            border-radius: 12px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            aspect-ratio: 1/1; 
        }
        .tile:active { transform: scale(0.92); background: var(--glass-mid); }
        .tile.selected { background: var(--glass-mid); border: 1px solid var(--glass-solid); transform: scale(1.05); box-shadow: var(--white-glow); z-index: 30; }
        .tile.matched { opacity: 0; transform: scale(0.6); filter: blur(5px); pointer-events: none; transition: 0.5s ease; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
        .error-shake { animation: shake 0.3s ease; border: 1px solid var(--text-muted); background: var(--glass-light); }

        #svg-layer { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .path-line {
            fill: none; stroke: var(--text-main); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.6)); stroke-dasharray: 1000; stroke-dashoffset: 1000;
            animation: drawPath 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes drawPath { to { stroke-dashoffset: 0; opacity: 0; } }

        .float-text {
            position: absolute; color: var(--text-main); font-weight: 600; font-size: 1rem;
            text-shadow: var(--white-glow); pointer-events: none; z-index: 200; font-family: var(--font-display);
            animation: floatFade 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes floatFade { 0% { opacity: 1; transform: translateY(0) scale(0.9); } 100% { opacity: 0; transform: translateY(-40px) scale(1.1); filter: blur(2px); } }

        .hud-bottom {
            height: 15%; background: var(--glass-ultra-light); border-top: 1px solid var(--glass-light);
            display: flex; justify-content: space-between; align-items: center; padding: 0 25px; flex-shrink: 0;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        .combo-bright { text-shadow: var(--white-glow); font-size: 1.3rem !important; }
        .btn-action {
            background: transparent; color: var(--text-muted); border: 1px solid var(--glass-light); border-radius: 8px;
            padding: 10px 16px; font-family: var(--font-ui); font-size: 0.7rem; font-weight: 400;
            cursor: pointer; letter-spacing: 1px; transition: 0.3s;
        }
        .btn-action:active { background: var(--text-main); color: var(--bg-pure); }

        /* --- STAGE 3: LOCKDOWN --- */
        .overlay-screen {
            position: absolute; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 500; display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: 0.6s ease;
        }
        .overlay-screen.show { opacity: 1; pointer-events: all; }

        .lock-title { font-size: 2.2rem; font-weight: 600; letter-spacing: 6px; margin-bottom: 10px; text-align: center; }
        .lock-sub { font-size: 0.85rem; color: var(--text-muted); font-weight: 300; margin-bottom: 40px; text-align: center; max-width: 80%; letter-spacing: 1px;}

        .math-eq { font-size: 2.5rem; font-weight: 700; font-family: var(--font-display); letter-spacing: 3px; }
        .math-input-box {
            font-size: 2rem; font-weight: 400; font-family: var(--font-display); margin-top: 15px; margin-bottom: 40px;
            min-height: 50px; min-width: 120px; text-align: center; border-bottom: 1px solid var(--text-muted); transition: 0.3s;
        }
        
        .glass-numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 80%; max-width: 280px; }
        .num-key {
            background: var(--glass-ultra-light); border: 1px solid var(--glass-light); color: var(--text-main);
            padding: 20px 0; border-radius: 12px; font-family: var(--font-ui); font-size: 1.2rem;
            font-weight: 400; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center;
        }
        .num-key:active { background: var(--glass-solid); color: var(--bg-pure); transform: scale(0.95); }
        .key-del { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); }
        .key-ok { background: var(--glass-mid); font-size: 0.9rem; font-weight: 600; border-color: var(--text-muted);}

        /* --- STAGE 4 & 5: LEVEL UP & GAME OVER --- */
        .load-track { width: 220px; height: 1px; background: var(--glass-mid); margin-top: 20px; position: relative; overflow: hidden; }
        .load-fill { position: absolute; top: 0; left: 0; height: 100%; width: 0%; background: var(--text-main); box-shadow: var(--white-glow); transition: width 1.5s ease-in-out; }
        
        .exit-btn { position: absolute; top: 25px; right: 25px; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; z-index: 100; transition: 0.3s;}
        .exit-btn:active { color: var(--text-main); transform: scale(0.9);}
    </style>
</head>
<body>

    <div id="screen-login" class="screen">
        <div class="logo">XOL<span style="display:inline-block; transform:scaleX(-1);">E</span>RI<span style="display:inline-block; transform:scaleX(-1);">C</span></div>
        <div class="input-wrapper">
            <input type="text" id="inp-name" class="pure-input" placeholder="[ ismingiz ]" autocomplete="off" spellcheck="false">
            <button class="pure-btn" id="btn-start" onclick="initGame(false)">ISHGA TUSHIRISH</button>
            <button class="pure-btn" id="btn-continue" onclick="initGame(true)">SEANSI DAVOM ETTIRISH</button>
        </div>
        <button class="pwa-btn" id="btn-pwa" onclick="installApp()">[ TIZIMNI QURILMAGA O'RNATISH ]</button>
    </div>

    <div id="screen-lockdown" class="screen hidden">
        <div class="overlay-title lock-title">TIZIM BLOKLANDI</div>
        <div class="lock-sub">Xavfsizlik protokoli faollashdi. Qulfni ochish uchun masalani yeching:</div>
        
        <div class="math-eq" id="math-question">0 + 0 = ?</div>
        <div class="math-input-box" id="math-answer">_</div>

        <div class="glass-numpad">
            <button class="num-key" onclick="pressKey('1')">1</button>
            <button class="num-key" onclick="pressKey('2')">2</button>
            <button class="num-key" onclick="pressKey('3')">3</button>
            <button class="num-key" onclick="pressKey('4')">4</button>
            <button class="num-key" onclick="pressKey('5')">5</button>
            <button class="num-key" onclick="pressKey('6')">6</button>
            <button class="num-key" onclick="pressKey('7')">7</button>
            <button class="num-key" onclick="pressKey('8')">8</button>
            <button class="num-key" onclick="pressKey('9')">9</button>
            <button class="num-key key-del" onclick="pressKey('DEL')">DEL</button>
            <button class="num-key" onclick="pressKey('0')">0</button>
            <button class="num-key key-ok" onclick="pressKey('OK')">OK</button>
        </div>
    </div>

    <div id="screen-gameover" class="screen hidden">
        <div class="overlay-title lock-title" style="font-size: 1.8rem;">SEANS YAKUNLANDI</div>
        <div class="lock-sub" style="font-size: 1rem; color: #fff; margin-bottom: 50px;">YAKUNIY HISOB: <br><span id="final-score" style="font-size: 2.5rem; font-family: var(--font-display); font-weight: 700;">00000</span></div>
        <button class="pure-btn" onclick="resetToLogin()" style="width: 260px;">YANGI SEANS BOSHLASH</button>
    </div>

    <div id="game-ui">
        <div class="exit-btn" onclick="triggerGameOver()">✕</div>
        
        <div class="hud-top">
            <div class="hud-block"><span class="hud-label">DARAJA</span><span class="hud-value" id="val-lvl">01</span></div>
            <div class="hud-block"><span class="hud-label">XATOLAR</span><span class="hud-value" id="val-err">00/03</span></div>
            <div class="hud-block"><span class="hud-label">HISOB</span><span class="hud-value" id="val-score">00000</span></div>
        </div>

        <div id="board-wrapper">
            <div id="grid"></div>
            <svg id="svg-layer"></svg>
            
            <div id="screen-levelup" class="overlay-screen">
                <div class="overlay-title" style="font-size: 1.8rem; letter-spacing: 4px;">DARAJA TOZALANDI</div>
                <div class="lock-sub" style="font-size: 0.75rem; letter-spacing: 2px;">KЕYINGI QATLAM YUKLANMOQDA...</div>
                <div class="load-track"><div class="load-fill" id="load-bar"></div></div>
            </div>
        </div>

        <div class="hud-bottom">
            <div class="hud-block" style="align-items: flex-start;">
                <span class="hud-label">OPERATOR</span>
                <span class="hud-value" id="val-user" style="font-size: 0.85rem; font-family: var(--font-ui); font-weight: 400;">GUEST</span>
            </div>
            <div class="hud-block"><span class="hud-label">KOMBO</span><span class="hud-value" id="val-combo">x1</span></div>
            <button class="btn-action" onclick="shuffleGrid()">ARALASHTIRISH</button>
        </div>
    </div>

    <script>
        // PWA Setup
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; document.getElementById('btn-pwa').style.display = 'block'; });
        function installApp() { if(deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(()=>{ document.getElementById('btn-pwa').style.display = 'none'; deferredPrompt=null;}); } }
        if('serviceWorker' in navigator) { const swCode = `self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(()=>new Response('Offline'))));`; const b = new Blob([swCode], {type:'application/javascript'}); navigator.serviceWorker.register(URL.createObjectURL(b)).catch(()=>{}); }

        const EMOJI_DB = ["⚽","🏀","🏈","⚾","🎾","🏐","🏉","🎱","🪀","🏓","🏸","🏒","🏑","🥍","🚗","🚕","🚙","🚌","🚎","🏎️","🚓","🚑","🚒","🚐","🛻","🚚","🚛","🚜","🛵","⌚","📱","💻","⌨️","🖥️","🖨️","🖱️","🖲️","🕹️","🗜️","💽","💾","💿","📀","📼","🍎","🍒","🍓","🍉","🍊","🍋","🍌","🍏","🍐","🍑","🍔","🍕","🍟","🌭","🍿","😀","😂","🥰","😎","🤔","😴","😷","🤠","👻","👽","🤖","😺","🐶","🦊","🐻","🌟","⭐","✨","💫","🪐","🌍","🌙","☀️","🌈","💧","🔥","⚡","❄️","🌊","🌪️"];
        
        let state = { level: 1, score: 0, err: 0, rows: 0, cols: 0, grid: [], player: "", locked: false, math: null };
        let combo = 1; let cTimer = null; let isAnim = false; let mathAns = "";

        const el = {
            login: document.getElementById('screen-login'), game: document.getElementById('game-ui'),
            lock: document.getElementById('screen-lockdown'), over: document.getElementById('screen-gameover'), lvlUp: document.getElementById('screen-levelup'),
            inpName: document.getElementById('inp-name'), btnCont: document.getElementById('btn-continue'),
            vLvl: document.getElementById('val-lvl'), vErr: document.getElementById('val-err'), vScore: document.getElementById('val-score'),
            vUser: document.getElementById('val-user'), vCombo: document.getElementById('val-combo'),
            grid: document.getElementById('grid'), svg: document.getElementById('svg-layer'), board: document.getElementById('board-wrapper'),
            mQ: document.getElementById('math-question'), mA: document.getElementById('math-answer'), lBar: document.getElementById('load-bar'), fScore: document.getElementById('final-score')
        };

        window.onload = () => {
            const mem = localStorage.getItem('xoleric_pureglass');
            if (mem) {
                const data = JSON.parse(mem);
                if(data.locked) { state = data; triggerLockdown(true); }
                else { el.btnCont.style.display = 'block'; el.inpName.value = data.player; }
            }
        };

        function save() { localStorage.setItem('xoleric_pureglass', JSON.stringify(state)); }
        function wipe() { localStorage.removeItem('xoleric_pureglass'); el.btnCont.style.display = 'none'; }
        const pad = (n, s) => String(n).padStart(s, '0');

        // ERROR CALCULATION (Dynamic Scaling)
        function getMaxErr() {
            if (state.level === 1) return 3;
            if (state.level === 2) return 5;
            return 5 + (state.level - 2) * 5; // lvl 3->10, lvl 4->15, etc.
        }

        window.initGame = (isContinue) => {
            if(isContinue) {
                const mem = JSON.parse(localStorage.getItem('xoleric_pureglass'));
                if(mem && !mem.locked) { state = mem; state.selected = null; isAnim = false; }
            } else {
                state.player = el.inpName.value.trim() || "operator";
                state.level = 1; state.score = 0; state.err = 0; state.locked = false; combo = 1;
            }
            
            el.login.classList.add('hidden');
            el.vUser.innerText = state.player.toLowerCase();
            
            setTimeout(() => {
                el.game.classList.add('active');
                if(!isContinue) buildLevel();
                else { drawGrid(); updateHUD(); }
            }, 600);
        };

        window.resetToLogin = () => {
            el.over.classList.add('hidden');
            el.login.classList.remove('hidden');
            el.inpName.value = "";
        };

        window.triggerGameOver = () => {
            el.fScore.innerText = pad(state.score, 5);
            el.game.classList.remove('active');
            setTimeout(() => { el.over.classList.remove('hidden'); wipe(); }, 600);
        };

        function updateHUD() {
            const maxErr = getMaxErr();
            el.vLvl.innerText = pad(state.level, 2);
            el.vScore.innerText = pad(state.score, 5);
            el.vErr.innerText = `${pad(state.err, 2)}/${pad(maxErr, 2)}`;
            el.vCombo.innerText = `x${combo}`;
            
            // Pulse warning if 1 or 0 mistakes left
            el.vErr.className = `hud-value ${state.err >= maxErr - 1 ? 'pulse-warn' : ''}`;
            el.vCombo.className = `hud-value ${combo > 1 ? 'combo-bright' : ''}`;
        }

        function buildLevel() {
            state.rows = Math.min(6 + Math.floor(state.level), 14);
            state.cols = Math.min((window.innerWidth > 600 ? 8 : 6) + Math.floor((state.level - 1) / 2), 10);
            if ((state.rows * state.cols) % 2 !== 0) state.rows++;

            const total = state.rows * state.cols;
            let pool = [...EMOJI_DB].sort(()=>Math.random()-0.5).slice(0, total/2);
            let items = [...pool, ...pool].sort(()=>Math.random()-0.5);

            state.grid = Array.from({length: state.rows+2}, () => new Array(state.cols+2).fill(null));
            let i = 0;
            for(let r=1; r<=state.rows; r++) for(let c=1; c<=state.cols; c++) state.grid[r][c] = items[i++];
            
            drawGrid(); updateHUD(); save();
        }

        function drawGrid() {
            el.grid.style.gridTemplateColumns = `repeat(${state.cols}, 1fr)`;
            el.grid.style.gridTemplateRows = `repeat(${state.rows}, 1fr)`;
            el.grid.innerHTML = '';
            
            for(let r=1; r<=state.rows; r++) {
                for(let c=1; c<=state.cols; c++) {
                    const t = document.createElement('div'); t.className = 'tile';
                    const v = state.grid[r][c];
                    if(v) { t.innerText = v; t.style.fontSize = `min(8vw, 4vh, 32px)`; t.onclick = () => tapTile(r, c, t); }
                    else t.classList.add('matched');
                    t.id = `t-${r}-${c}`; el.grid.appendChild(t);
                }
            }
            el.svg.innerHTML = '';
        }

        function tapTile(r, c, dom) {
            if(isAnim) return;
            if(state.selected) {
                const {r: sr, c: sc} = state.selected; const prev = document.getElementById(`t-${sr}-${sc}`);
                if(sr === r && sc === c) { dom.classList.remove('selected'); state.selected = null; return; }
                
                if(state.grid[r][c] === state.grid[sr][sc]) {
                    const path = getPath(sr, sc, r, c);
                    if(path) { isAnim = true; doMatch(state.selected, {r,c}, path); return; }
                    else doError(dom, prev);
                } else doError(dom, prev);
                
                prev.classList.remove('selected'); state.selected = null;
            } else { state.selected = {r,c}; dom.classList.add('selected'); }
        }

        function doError(t1, t2) {
            state.err++; updateHUD();
            t1.classList.add('error-shake'); if(t2) t2.classList.add('error-shake');
            setTimeout(() => { t1.classList.remove('error-shake'); if(t2) t2.classList.remove('error-shake'); }, 300);
            combo = 1; updateHUD(); save();
            
            const maxErr = getMaxErr();
            if(state.err >= maxErr) setTimeout(()=>triggerLockdown(false), 400);
        }

        function getPath(r1, c1, r2, c2) {
            const q = [{r:r1, c:c1, d:-1, t:0, p:[[r1,c1]]}]; const v = new Set();
            while(q.length > 0) {
                const cur = q.shift();
                if(cur.t > 2) continue;
                if(cur.r === r2 && cur.c === c2) return cur.p;
                const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
                for(let i=0; i<4; i++) {
                    const nr = cur.r + dirs[i][0]; const nc = cur.c + dirs[i][1];
                    if(nr >= 0 && nr < state.rows+2 && nc >= 0 && nc < state.cols+2) {
                        if(state.grid[nr][nc] === null || (nr === r2 && nc === c2)) {
                            const nt = (cur.d !== -1 && cur.d !== i) ? cur.t + 1 : cur.t;
                            const key = `${nr},${nc},${i},${nt}`;
                            if(!v.has(key)) { v.add(key); q.push({r:nr, c:nc, d:i, t:nt, p:[...cur.p, [nr,nc]]}); }
                        }
                    }
                }
            } return null;
        }

        function doMatch(p1, p2, path) {
            renderPath(path); clearTimeout(cTimer);
            let earned = 150 * combo; state.score += earned;
            popText(`+${earned}`, p2.r, p2.c);
            combo++; updateHUD();
            cTimer = setTimeout(() => { combo = 1; updateHUD(); }, 3000);

            setTimeout(() => {
                state.grid[p1.r][p1.c] = null; state.grid[p2.r][p2.c] = null;
                const t1 = document.getElementById(`t-${p1.r}-${p1.c}`); const t2 = document.getElementById(`t-${p2.r}-${p2.c}`);
                t1.className = 'tile matched'; t2.className = 'tile matched';
                save(); setTimeout(()=>{el.svg.innerHTML='';}, 200);
                state.selected = null; isAnim = false; checkWin();
            }, 100);
        }

        function popText(txt, r, c) {
            const t = document.getElementById(`t-${r}-${c}`); if(!t) return;
            const r1 = t.getBoundingClientRect(); const r2 = el.board.getBoundingClientRect();
            const pop = document.createElement('div'); pop.className = 'float-text'; pop.innerText = txt;
            pop.style.left = `${r1.left - r2.left + (r1.width/2) - 15}px`; pop.style.top = `${r1.top - r2.top}px`;
            el.board.appendChild(pop); setTimeout(()=>pop.remove(), 1000);
        }

        function renderPath(path) {
            const rW = el.svg.getBoundingClientRect(); const rG = el.grid.getBoundingClientRect();
            const cW = rG.width / state.cols; const cH = rG.height / state.rows;
            const oX = rG.left - rW.left; const oY = rG.top - rW.top;
            const pts = path.map(p => `${oX + (p[1]-0.5)*cW},${oY + (p[0]-0.5)*cH}`).join(' ');
            const poly = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
            poly.setAttribute("points", pts); poly.setAttribute("class", "path-line");
            el.svg.appendChild(poly);
        }

        function checkWin() {
            if(!state.grid.flat().some(c => c !== null)) {
                state.level++; state.err = 0; // Reset errors for new level!
                save();
                el.lvlUp.classList.add('show');
                setTimeout(()=>el.lBar.style.width = '100%', 100);
                setTimeout(() => {
                    el.lvlUp.classList.remove('show');
                    el.lBar.style.width = '0%';
                    setupLevel();
                }, 1600);
            }
        }

        window.shuffleGrid = () => {
            if(isAnim) return;
            let act = [];
            for(let r=1; r<=state.rows; r++) for(let c=1; c<=state.cols; c++) if(state.grid[r][c] !== null) act.push(state.grid[r][c]);
            act.sort(()=>Math.random()-0.5); let i=0;
            for(let r=1; r<=state.rows; r++) for(let c=1; c<=state.cols; c++) if(state.grid[r][c] !== null) state.grid[r][c] = act[i++];
            state.score = Math.max(0, state.score - 100); combo = 1; updateHUD(); save(); drawGrid(); state.selected = null;
        };

        // --- MATH OVERRIDE ---
        function triggerLockdown(fromLoad = false) {
            if(!fromLoad) {
                state.locked = true;
                const ops = ['+', '-', '*']; const op = ops[Math.floor(Math.random()*3)];
                let a, b, ans;
                if(op==='+'){a=Math.floor(Math.random()*80)+10; b=Math.floor(Math.random()*80)+10; ans=a+b;}
                else if(op==='-'){a=Math.floor(Math.random()*50)+40; b=Math.floor(Math.random()*39)+1; ans=a-b;}
                else {a=Math.floor(Math.random()*9)+3; b=Math.floor(Math.random()*9)+3; ans=a*b;}
                state.math = {q: `${a} ${op} ${b} = ?`, a: ans};
                save();
            }
            el.game.classList.remove('active'); el.login.classList.add('hidden'); el.lock.classList.remove('hidden');
            el.mQ.innerText = state.math.q; mathAns = ""; renderMath();
        }

        window.pressKey = (k) => {
            if(k === 'DEL') mathAns = mathAns.slice(0, -1);
            else if(k === 'OK') submitMath();
            else if(mathAns.length < 5) mathAns += k;
            renderMath();
        };

        function renderMath() { el.mA.innerText = mathAns || "_"; }

        function submitMath() {
            if(parseInt(mathAns) === state.math.a) {
                el.mA.innerText = "RUXSAT BERILDI"; el.mA.style.borderBottomColor = "#fff";
                setTimeout(() => {
                    state.locked = false; state.math = null; state.err = 0; state.score = 0; state.level = 1;
                    save(); el.lock.classList.add('hidden'); el.game.classList.add('active'); setupLevel();
                }, 1000);
            } else {
                el.mA.style.transform = "translateX(-10px)";
                setTimeout(()=>el.mA.style.transform = "translateX(10px)", 100);
                setTimeout(()=>el.mA.style.transform = "translateX(0)", 200);
                setTimeout(() => { mathAns = ""; renderMath(); }, 400);
            }
        }
    </script>
</body>
</html>
