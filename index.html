<script>
/**
 * XOLERIC X-CLASS QUANTUM PRO - ADVANCED GAME ENGINE
 * Architecturally structured with strict modularity, high-performance canvas rendering,
 * BFS Pathfinding for max-2-turn rule (Onet), and seamless DOM integration.
   */
// ==========================================
// 1. CORE CONFIGURATION & CONSTANTS
// ==========================================
const EMOJIS = ['🚀','🛸','🛰','👾','🤖','☄️','🌌','🌠','🔮','🧬','🧿','💠','🔋','🔌','💿','🕹'];
const CONFIG = {
CELL_SIZE_MAX: 60,
CELL_SIZE_MIN: 35,
FPS: 60,
GLOW_COLOR: '#00f3ff',
PARTICLE_COUNT: 1000,
BASE_SCORE: 100
};
// ==========================================
// 2. EVENT BUS (Pub/Sub)
// ==========================================
class EventBus {
constructor() { this.listeners = {}; }
on(event, callback) {
if (!this.listeners[event]) this.listeners[event] = [];
this.listeners[event].push(callback);
}
emit(event, data) {
if (this.listeners[event]) {
this.listeners[event].forEach(cb => cb(data));
}
}
}
const EngineEvents = new EventBus();
// ==========================================
// 3. STORAGE & SAVE SYSTEM
// ==========================================
class SaveSystem {
static save(key, value) { localStorage.setItem(XOLERIC_${key}, JSON.stringify(value)); }
static load(key, def) {
const val = localStorage.getItem(XOLERIC_${key});
return val ? JSON.parse(val) : def;
}
}
// ==========================================
// 4. AUDIO ENGINE (Synthesized - No Assets)
// ==========================================
class AudioEngine {
constructor() {
this.ctx = new (window.AudioContext || window.webkitAudioContext)();
}
playTone(freq, type, duration, vol=0.1) {
if (this.ctx.state === 'suspended') this.ctx.resume();
const osc = this.ctx.createOscillator();
const gain = this.ctx.createGain();
osc.type = type;
osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
gain.gain.setValueAtTime(vol, this.ctx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
osc.connect(gain);
gain.connect(this.ctx.destination);
osc.start();
osc.stop(this.ctx.currentTime + duration);
}
sfxSelect() { this.playTone(600, 'sine', 0.1, 0.1); }
sfxMatch() { this.playTone(800, 'square', 0.15, 0.1); setTimeout(()=>this.playTone(1200, 'square', 0.2, 0.1), 100); }
sfxError() { this.playTone(200, 'sawtooth', 0.3, 0.15); }
sfxLevelUp() { this.playTone(400, 'sine', 0.2, 0.1); setTimeout(()=>this.playTone(600, 'sine', 0.2, 0.1), 150); setTimeout(()=>this.playTone(800, 'sine', 0.4, 0.1), 300); }
}
const Audio = new AudioEngine();
// ==========================================
// 5. PARTICLE & FX ENGINE (WebGL-like pooling on 2D)
// ==========================================
class Particle {
constructor() { this.active = false; }
spawn(x, y, vx, vy, life, color, size) {
this.x = x; this.y = y; this.vx = vx; this.vy = vy;
this.life = life; this.maxLife = life;
this.color = color; this.size = size; this.active = true;
}
update(dt) {
if (!this.active) return;
this.x += this.vx * dt; this.y += this.vy * dt;
this.life -= dt;
if (this.life <= 0) this.active = false;
}
draw(ctx) {
if (!this.active) return;
const alpha = Math.max(0, this.life / this.maxLife);
ctx.globalAlpha = alpha;
ctx.fillStyle = this.color;
ctx.beginPath();
ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
ctx.fill();
ctx.globalAlpha = 1.0;
}
}
class ParticleEngine {
constructor() {
this.canvas = document.getElementById('fx-canvas');
this.ctx = this.canvas.getContext('2d');
this.particles = Array.from({length: CONFIG.PARTICLE_COUNT}, () => new Particle());
this.resize();
window.addEventListener('resize', () => this.resize());
this.lastTime = performance.now();
this.paths = [];
requestAnimationFrame(t => this.loop(t));
}
resize() {
this.canvas.width = window.innerWidth;
this.canvas.height = window.innerHeight;
}
getParticle() {
return this.particles.find(p => !p.active);
}
explosion(x, y, color) {
for(let i=0; i<30; i++) {
const p = this.getParticle();
if (p) {
const angle = Math.random() * Math.PI * 2;
const speed = Math.random() * 200 + 50;
p.spawn(x, y, Math.cos(angle)*speed, Math.sin(angle)*speed, Math.random()*0.5+0.2, color, Math.random()*3+1);
}
}
}
drawPath(pathPoints) {
this.paths.push({ points: pathPoints, life: 0.5, maxLife: 0.5 });
}
loop(time) {
const dt = (time - this.lastTime) / 1000;
this.lastTime = time;
this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
    // Draw Paths
    for (let i = this.paths.length - 1; i &gt;= 0; i--) {
        const p = this.paths[i];
        p.life -= dt;
        if (p.life &lt;= 0) {
            this.paths.splice(i, 1);
            continue;
        }
        this.ctx.strokeStyle = `rgba(0, 243, 255, ${p.life / p.maxLife})`;
        this.ctx.lineWidth = 4;
        this.ctx.shadowBlur = 15;
        this.ctx.shadowColor = &#39;#00f3ff&#39;;
        this.ctx.beginPath();
        this.ctx.moveTo(p.points[0].x, p.points[0].y);
        for(let j=1; j&lt;p.points.length; j++) {
            this.ctx.lineTo(p.points[j].x, p.points[j].y);
        }
        this.ctx.stroke();
        this.ctx.shadowBlur = 0;
    }

    // Draw Particles
    for(let i=0; i&lt;this.particles.length; i++) {
        this.particles[i].update(dt);
        this.particles[i].draw(this.ctx);
    }
    requestAnimationFrame(t =&gt; this.loop(t));
}

}
const FX = new ParticleEngine();
// Background Stars Engine
class BackgroundEngine {
constructor() {
this.canvas = document.getElementById('bg-canvas');
this.ctx = this.canvas.getContext('2d');
this.stars = [];
this.resize();
for(let i=0; i<100; i++) this.stars.push({
x: Math.random() * this.canvas.width,
y: Math.random() * this.canvas.height,
s: Math.random() * 2 + 0.5,
v: Math.random() * 20 + 5
});
window.addEventListener('resize', () => this.resize());
this.lastTime = performance.now();
requestAnimationFrame(t => this.loop(t));
}
resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }
loop(time) {
const dt = (time - this.lastTime) / 1000;
this.lastTime = time;
this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
this.ctx.fillStyle = '#fff';
this.stars.forEach(star => {
star.y -= star.v * dt;
if (star.y < 0) { star.y = this.canvas.height; star.x = Math.random() * this.canvas.width; }
this.ctx.globalAlpha = star.s / 3;
this.ctx.beginPath(); this.ctx.arc(star.x, star.y, star.s, 0, Math.PI*2); this.ctx.fill();
});
requestAnimationFrame(t => this.loop(t));
}
}
const BG = new BackgroundEngine();
// ==========================================
// 6. PATHFINDING & LOGIC (Onet System)
// ==========================================
class PathFinder {
static getTile(x, y, grid, cols, rows) {
if (x < 0 || x >= cols || y < 0 || y >= rows) return 0; // Empty boundary
return grid[y][x];
}
static checkLine(x1, y1, x2, y2, grid, cols, rows) {
    if (x1 !== x2 &amp;&amp; y1 !== y2) return false;
    let dx = Math.sign(x2 - x1);
    let dy = Math.sign(y2 - y1);
    let x = x1 + dx, y = y1 + dy;
    while(x !== x2 || y !== y2) {
        if (this.getTile(x, y, grid, cols, rows) !== 0) return false;
        x += dx; y += dy;
    }
    return true;
}

static findPath(p1, p2, grid, cols, rows) {
    if (p1.x === p2.x &amp;&amp; p1.y === p2.y) return null;
    if (this.getTile(p1.x, p1.y, grid, cols, rows) !== this.getTile(p2.x, p2.y, grid, cols, rows)) return null;

    // 0 Turns (Direct)
    if (this.checkLine(p1.x, p1.y, p2.x, p2.y, grid, cols, rows)) return [p1, p2];

    // 1 Turn
    let pA = {x: p1.x, y: p2.y};
    if (this.getTile(pA.x, pA.y, grid, cols, rows) === 0 &amp;&amp;
        this.checkLine(p1.x, p1.y, pA.x, pA.y, grid, cols, rows) &amp;&amp;
        this.checkLine(pA.x, pA.y, p2.x, p2.y, grid, cols, rows)) return [p1, pA, p2];

    let pB = {x: p2.x, y: p1.y};
    if (this.getTile(pB.x, pB.y, grid, cols, rows) === 0 &amp;&amp;
        this.checkLine(p1.x, p1.y, pB.x, pB.y, grid, cols, rows) &amp;&amp;
        this.checkLine(pB.x, pB.y, p2.x, p2.y, grid, cols, rows)) return [p1, pB, p2];

    // 2 Turns Horizontal Ext
    for (let dir of [-1, 1]) {
        let x = p1.x + dir;
        while (x &gt;= -1 &amp;&amp; x &lt;= cols) {
            if (this.getTile(x, p1.y, grid, cols, rows) !== 0) break;
            let pC = {x: x, y: p1.y};
            let pD = {x: x, y: p2.y};
            if (this.getTile(pD.x, pD.y, grid, cols, rows) === 0 &amp;&amp;
                this.checkLine(pC.x, pC.y, pD.x, pD.y, grid, cols, rows) &amp;&amp;
                this.checkLine(pD.x, pD.y, p2.x, p2.y, grid, cols, rows)) {
                return [p1, pC, pD, p2];
            }
            x += dir;
        }
    }

    // 2 Turns Vertical Ext
    for (let dir of [-1, 1]) {
        let y = p1.y + dir;
        while (y &gt;= -1 &amp;&amp; y &lt;= rows) {
            if (this.getTile(p1.x, y, grid, cols, rows) !== 0) break;
            let pC = {x: p1.x, y: y};
            let pD = {x: p2.x, y: y};
            if (this.getTile(pD.x, pD.y, grid, cols, rows) === 0 &amp;&amp;
                this.checkLine(pC.x, pC.y, pD.x, pD.y, grid, cols, rows) &amp;&amp;
                this.checkLine(pD.x, pD.y, p2.x, p2.y, grid, cols, rows)) {
                return [p1, pC, pD, p2];
            }
            y += dir;
        }
    }
    return null;
}

}
// ==========================================
// 7. BOARD GENERATOR & DEADLOCK SOLVER
// ==========================================
class BoardManager {
constructor(cols, rows) {
this.cols = cols;
this.rows = rows;
this.grid = [];
this.generate();
}
generate() {
let totalTiles = this.cols * this.rows;
if (totalTiles % 2 !== 0) totalTiles--; // Must be even
let pairs = [];
for(let i=0; i<totalTiles/2; i++) {
let type = (i % EMOJIS.length) + 1; // 1-indexed for logic, 0 is empty
pairs.push(type, type);
}
// Shuffle
for(let i = pairs.length - 1; i > 0; i--){
const j = Math.floor(Math.random() * (i + 1));
[pairs[i], pairs[j]] = [pairs[j], pairs[i]];
}
// Build Grid
this.grid = [];
let pIdx = 0;
for(let y=0; y<this.rows; y++) {
let row = [];
for(let x=0; x<this.cols; x++) {
row.push(pIdx < pairs.length ? pairs[pIdx++] : 0);
}
this.grid.push(row);
}
// Ensure Solvable
while(!this.hasAvailableMoves() && this.getRemainingCount() > 0) {
this.shuffleGrid();
}
}
getRemainingCount() {
let count = 0;
for(let y=0; y<this.rows; y++) {
for(let x=0; x<this.cols; x++) {
if (this.grid[y][x] !== 0) count++;
}
}
return count;
}
hasAvailableMoves() {
let tiles = [];
for(let y=0; y<this.rows; y++) {
for(let x=0; x<this.cols; x++) {
if (this.grid[y][x] !== 0) tiles.push({x, y, val: this.grid[y][x]});
}
}
for(let i=0; i<tiles.length; i++) {
for(let j=i+1; j<tiles.length; j++) {
if (tiles[i].val === tiles[j].val) {
if (PathFinder.findPath(tiles[i], tiles[j], this.grid, this.cols, this.rows)) return true;
}
}
}
return false;
}
shuffleGrid() {
let flat = [];
for(let y=0; y<this.rows; y++) {
for(let x=0; x<this.cols; x++) {
if (this.grid[y][x] !== 0) flat.push(this.grid[y][x]);
}
}
for(let i = flat.length - 1; i > 0; i--){
const j = Math.floor(Math.random() * (i + 1));
[flat[i], flat[j]] = [flat[j], flat[i]];
}
let fIdx = 0;
for(let y=0; y<this.rows; y++) {
for(let x=0; x<this.cols; x++) {
if (this.grid[y][x] !== 0) this.grid[y][x] = flat[fIdx++];
}
}
}
}
// ==========================================
// 8. MAIN GAME ENGINE
// ==========================================
class GameEngine {
constructor() {
this.level = 1;
this.score = 0;
this.combo = 0;
this.lastMatchTime = 0;
this.board = null;
this.selectedTile = null;
this.domTiles = [];
    this.bindEvents();
}

bindEvents() {
    document.getElementById(&#39;btn-start&#39;).addEventListener(&#39;click&#39;, () =&gt; {
        document.getElementById(&#39;screen-main&#39;).classList.remove(&#39;visible&#39;);
        setTimeout(() =&gt; document.getElementById(&#39;screen-main&#39;).classList.add(&#39;hidden&#39;), 500);
        document.getElementById(&#39;hud&#39;).style.display = &#39;flex&#39;;
        this.initLevel(1);
    });
    document.getElementById(&#39;btn-restart&#39;).addEventListener(&#39;click&#39;, () =&gt; {
        document.getElementById(&#39;screen-gameover&#39;).classList.remove(&#39;visible&#39;);
        setTimeout(() =&gt; document.getElementById(&#39;screen-gameover&#39;).classList.add(&#39;hidden&#39;), 500);
        this.score = 0;
        this.updateHUD();
        this.initLevel(1);
    });
}

initLevel(lvl) {
    this.level = lvl;
    let cols = Math.min(10, 4 + Math.floor(this.level / 2));
    let rows = Math.min(8, 4 + Math.floor((this.level-1) / 2));
    
    this.board = new BoardManager(cols, rows);
    this.selectedTile = null;
    this.combo = 0;
    this.renderBoard();
    this.updateHUD();
    Audio.sfxLevelUp();
}

renderBoard() {
    const boardEl = document.getElementById(&#39;board&#39;);
    boardEl.innerHTML = &#39;&#39;;
    boardEl.style.gridTemplateColumns = `repeat(${this.board.cols}, 1fr)`;
    boardEl.style.gridTemplateRows = `repeat(${this.board.rows}, 1fr)`;
    
    // Calculate dynamic sizing based on screen
    const maxW = window.innerWidth * 0.95;
    const maxH = window.innerHeight * 0.75;
    let cW = Math.floor(maxW / this.board.cols) - 4;
    let cH = Math.floor(maxH / this.board.rows) - 4;
    let size = Math.min(cW, cH, CONFIG.CELL_SIZE_MAX);
    size = Math.max(size, CONFIG.CELL_SIZE_MIN);
    
    boardEl.style.width = `${(size+4) * this.board.cols}px`;
    boardEl.style.height = `${(size+4) * this.board.rows}px`;

    this.domTiles = [];
    for(let y=0; y&lt;this.board.rows; y++) {
        this.domTiles[y] = [];
        for(let x=0; x&lt;this.board.cols; x++) {
            const tile = document.createElement(&#39;div&#39;);
            tile.className = &#39;tile&#39;;
            const val = this.board.grid[y][x];
            if (val !== 0) {
                tile.innerText = EMOJIS[val - 1];
                tile.dataset.x = x;
                tile.dataset.y = y;
                // Event listeners for touch/click
                const handleTap = (e) =&gt; {
                    e.preventDefault();
                    this.handleTileClick(x, y, tile);
                };
                tile.addEventListener(&#39;mousedown&#39;, handleTap);
                tile.addEventListener(&#39;touchstart&#39;, handleTap, {passive: false});
            } else {
                tile.classList.add(&#39;empty&#39;);
            }
            tile.style.fontSize = `${size * 0.55}px`;
            this.domTiles[y][x] = tile;
            boardEl.appendChild(tile);
        }
    }
}

handleTileClick(x, y, tileEl) {
    if (this.board.grid[y][x] === 0) return;

    if (!this.selectedTile) {
        this.selectedTile = {x, y, el: tileEl};
        tileEl.classList.add(&#39;active&#39;);
        Audio.sfxSelect();
        return;
    }

    if (this.selectedTile.x === x &amp;&amp; this.selectedTile.y === y) {
        tileEl.classList.remove(&#39;active&#39;);
        this.selectedTile = null;
        return;
    }

    const path = PathFinder.findPath(this.selectedTile, {x, y}, this.board.grid, this.board.cols, this.board.rows);
    
    if (path) {
        this.processMatch(this.selectedTile, {x, y}, path);
    } else {
        // Invalid match
        this.selectedTile.el.classList.remove(&#39;active&#39;);
        this.selectedTile = {x, y, el: tileEl};
        tileEl.classList.add(&#39;active&#39;);
        Audio.sfxError();
    }
}

processMatch(p1, p2, path) {
    Audio.sfxMatch();
    const now = performance.now();
    if (now - this.lastMatchTime &lt; 2000) {
        this.combo++;
        this.showCombo(this.combo);
    } else {
        this.combo = 1;
    }
    this.lastMatchTime = now;
    
    const pts = CONFIG.BASE_SCORE * this.combo;
    this.score += pts;

    // Convert path logical coords to screen coords for FX
    const screenPath = path.map(pt =&gt; this.getScreenCoords(pt.x, pt.y));
    FX.drawPath(screenPath);
    
    const c1 = this.getScreenCoords(p1.x, p1.y);
    const c2 = this.getScreenCoords(p2.x, p2.y);
    FX.explosion(c1.x, c1.y, &#39;#00f3ff&#39;);
    FX.explosion(c2.x, c2.y, &#39;#bc13fe&#39;);

    // Update Logic
    this.board.grid[p1.y][p1.x] = 0;
    this.board.grid[p2.y][p2.x] = 0;
    
    // Update DOM
    p1.el.classList.add(&#39;empty&#39;);
    p1.el.innerText = &#39;&#39;;
    p1.el.classList.remove(&#39;active&#39;);
    p2.el = this.domTiles[p2.y][p2.x];
    p2.el.classList.add(&#39;empty&#39;);
    p2.el.innerText = &#39;&#39;;
    
    this.selectedTile = null;
    this.updateHUD();

    // Check level complete
    const remaining = this.board.getRemainingCount();
    if (remaining === 0) {
        setTimeout(() =&gt; this.initLevel(this.level + 1), 1000);
    } else {
        // Check Deadlock
        if (!this.board.hasAvailableMoves()) {
            setTimeout(() =&gt; {
                this.board.shuffleGrid();
                this.renderBoard();
                FX.explosion(window.innerWidth/2, window.innerHeight/2, &#39;#ffffff&#39;);
            }, 500);
        }
    }
}

getScreenCoords(x, y) {
    const boardEl = document.getElementById(&#39;board&#39;);
    const rect = boardEl.getBoundingClientRect();
    const cW = rect.width / this.board.cols;
    const cH = rect.height / this.board.rows;
    
    // Logical boundaries (-1 or cols) handled by projecting outside board rect
    const posX = rect.left + (x + 0.5) * cW;
    const posY = rect.top + (y + 0.5) * cH;
    return { x: posX, y: posY };
}

showCombo(combo) {
    if(combo &lt; 2) return;
    const display = document.getElementById(&#39;combo-display&#39;);
    display.innerText = `${combo}X COMBO!`;
    display.classList.remove(&#39;combo-anim&#39;);
    void display.offsetWidth; // trigger reflow
    display.classList.add(&#39;combo-anim&#39;);
}

updateHUD() {
    document.getElementById(&#39;hud-level&#39;).innerText = this.level;
    document.getElementById(&#39;hud-score&#39;).innerText = this.score;
    document.getElementById(&#39;hud-tiles&#39;).innerText = this.board ? (this.board.getRemainingCount() / 2) : 0;
}

endGame() {
    document.getElementById(&#39;screen-gameover&#39;).classList.remove(&#39;hidden&#39;);
    setTimeout(() =&gt; document.getElementById(&#39;screen-gameover&#39;).classList.add(&#39;visible&#39;), 50);
    document.getElementById(&#39;end-score&#39;).innerText = this.score;
    document.getElementById(&#39;hud&#39;).style.display = &#39;none&#39;;
    SaveSystem.save(&#39;Highscore&#39;, Math.max(this.score, SaveSystem.load(&#39;Highscore&#39;, 0)));
}
