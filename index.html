<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XOLƎRIƆ</title>
    <link rel="manifest" id="manifest-link">
    <style>
        :root {
            --bg-color: #080c14;
            --surface-color: #131a2a;
            --primary-color: #00f0ff;
            --text-color: #ffffff;
            --accent-color: #ff003c;
            --glow-primary: 0 0 10px rgba(0, 240, 255, 0.5);
            --glow-accent: 0 0 15px rgba(255, 0, 60, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Mobil uchun to'liq ekran moslashuvi */
        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-color);
            width: 100vw;
            height: 100dvh; /* Dynamic viewport */
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
        }

        /* --- Login Screen --- */
        #login-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(8, 12, 20, 0.95);
            backdrop-filter: blur(10px);
            z-index: 200;
            transition: opacity 0.5s ease;
        }

        #login-screen h1 {
            font-size: 3.5rem;
            color: var(--text-color);
            margin-bottom: 30px;
            letter-spacing: 5px;
            text-shadow: var(--glow-primary);
        }

        .rev-letter {
            display: inline-block;
            transform: scaleX(-1);
            color: var(--primary-color);
        }

        .input-group {
            width: 80%;
            max-width: 350px;
            position: relative;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 240, 255, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            text-align: center;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: var(--glow-primary);
        }

        .btn-enter {
            background: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            width: 80%;
            max-width: 350px;
        }

        .btn-enter:hover, .btn-enter:active {
            background: var(--primary-color);
            color: #000;
            box-shadow: var(--glow-primary);
            transform: scale(1.05);
        }

        /* --- Game UI Layout --- */
        #game-screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
        }

        /* Yuqori panel */
        #header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(19, 26, 42, 0.8);
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
            height: 60px;
            flex-shrink: 0;
            z-index: 10;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.2rem;
            color: var(--primary-color);
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 240, 255, 0.3);
        }

        /* O'yin maydoni */
        #board-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 10px;
            overflow: hidden;
        }

        #board {
            display: grid;
            gap: 2px; /* Kafelkalar orasi qisqardi */
            background: rgba(0, 0, 0, 0.4);
            padding: 5px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            position: relative;
            z-index: 2;
        }

        .tile {
            background: var(--surface-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .tile:active {
            transform: scale(0.9);
        }

        .tile.selected {
            background: rgba(0, 240, 255, 0.2);
            border-color: var(--primary-color);
            box-shadow: var(--glow-primary);
            transform: scale(1.1);
            z-index: 5;
        }

        .tile.error {
            background: rgba(255, 0, 60, 0.2);
            border-color: var(--accent-color);
            box-shadow: var(--glow-accent);
            animation: shake 0.3s;
        }

        .tile.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        #svg-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* Path animation */
        .path-line {
            stroke-dasharray: 10;
            animation: dash 0.5s linear forwards;
        }
        @keyframes dash {
            to { stroke-dashoffset: -20; }
        }

        /* Pastki panel */
        #footer-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(19, 26, 42, 0.9);
            border-top: 1px solid rgba(0, 240, 255, 0.2);
            height: 60px;
            flex-shrink: 0;
            z-index: 10;
        }

        .footer-info {
            font-size: 0.9rem;
            color: #aaa;
            display: flex;
            flex-direction: column;
        }
        
        #player-name-display { color: var(--text-color); font-weight: bold; }
        #clock-display { font-size: 0.8rem; color: #666; }

        .btn-action {
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-action:active {
            background: var(--primary-color);
            color: #000;
        }

        #install-btn {
            display: none;
            border-color: #ffd700;
            color: #ffd700;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>XOL<span class="rev-letter">E</span>RI<span class="rev-letter">C</span></h1>
        <div class="input-group">
            <input type="text" id="player-input" placeholder="Ismingizni kiriting..." autocomplete="off">
        </div>
        <button class="btn-enter" onclick="startGame()">Kirish</button>
    </div>

    <div id="game-screen">
        
        <div id="header-panel">
            <div class="stat-box">
                <span class="stat-label">Level</span>
                <span class="stat-value" id="level-display">1 / 10</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Score</span>
                <span class="stat-value" id="score-display">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Shuffle</span>
                <span class="stat-value" id="shuffle-display">3</span>
            </div>
        </div>

        <div id="board-wrapper">
            <div id="board"></div>
            <svg id="svg-layer"></svg>
        </div>

        <div id="footer-panel">
            <div class="footer-info">
                <span id="player-name-display">User</span>
                <span id="clock-display">00:00:00</span>
            </div>
            <button class="btn-action" onclick="shuffleBoard()">Aralashtirish</button>
            <button class="btn-action" id="install-btn">O'rnatish</button>
        </div>

    </div>

    <script>
        // --- Web Audio Engine ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSynth(freq, type, duration, vol = 0.05) {
            if (!audioCtx) return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = type; 
            oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + duration);
        }

        function playSound(effect) {
            try {
                switch(effect) {
                    case 'select': playSynth(800, 'square', 0.1, 0.03); break;
                    case 'match': 
                        playSynth(400, 'sine', 0.1, 0.05);
                        setTimeout(() => playSynth(800, 'sine', 0.1, 0.05), 100);
                        break;
                    case 'error': playSynth(150, 'sawtooth', 0.2, 0.05); break;
                    case 'levelUp':
                        [400, 500, 600, 800, 1000].forEach((f, i) => setTimeout(() => playSynth(f, 'square', 0.1, 0.04), i * 100));
                        break;
                    case 'shuffle':
                        playSynth(300, 'triangle', 0.3, 0.05);
                        break;
                }
            } catch(e){}
        }

        // --- PWA Setup ---
        const manifest = {
            name: "Xoleric PRO",
            short_name: "Xoleric",
            display: "fullscreen",
            background_color: "#080c14",
            theme_color: "#00f0ff",
            icons: [{
                src: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iIzA4MGMxNCIvPjx0ZXh0IHg9IjUwIiB5PSI2NCIgZm9udC1zaXplPSI1MCIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZmlsbD0iIzAwZjBmZiI+WDwvdGV4dD48L3N2Zz4=",
                sizes: "192x192",
                type: "image/svg+xml"
            }]
        };
        document.getElementById('manifest-link').href = URL.createObjectURL(new Blob([JSON.stringify(manifest)], {type: 'application/json'}));
        
        const swUrl = URL.createObjectURL(new Blob([`self.addEventListener('fetch', e => {});`], {type: 'application/javascript'}));
        if ('serviceWorker' in navigator) navigator.serviceWorker.register(swUrl);

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-btn').style.display = 'block';
        });

        document.getElementById('install-btn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('install-btn').style.display = 'none';
                deferredPrompt = null;
            }
        });

        // --- Clock ---
        setInterval(() => {
            document.getElementById('clock-display').innerText = new Date().toLocaleTimeString('uz-UZ', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }, 1000);

        // --- Game Logic ---
        // XAVFSIZ EMOJILAR (Karakter uzilishi bo'lmaydi)
        const safeEmojis = [
            "😀","😁","😂","🤣","😃","😄","😅","😆","😉","😊","😋","😎","😍","😘","🥰","😗","😙","🥲","😚","🙂",
            "🤗","🤩","🤔","🤨","😐","😑","😶","🙄","😏","😣","😥","😮","🤐","😯","😪","😫","🥱","😴","😌","😛",
            "😜","😝","🤤","😒","😓","😔","😕","🙃","🤑","😲","☹","🙁","😖","😞","😟","😤","😢","😭","😦","😧",
            "😨","😩","🤯","😬","😮‍💨","😰","😱","🥵","🥶","😳","🤪","😵","🥴","😠","😡","🤬","😷","🤒","🤕","🤢",
            "🤮","🤧","😇","🥳","🥸","🥺","🤠","🤡","🤥","🤫","🤭","🧐","🤓","😈","👿","👹","👺","💀","☠","👻",
            "👽","👾","🤖","💩","🐵","🐒","🦍","🦧","🐶","🐕","🐩","🐺","🦊","🦝","🐱","🐈","🦁","🐯","🐅","🐆",
            "🐴","🐎","🦄","🦓","🦌","🦬","🐮","🐂","🐃","🐄","🐷","🐖","🐗","🐽","🐏","🐑","🐐","🐪","🐫","🦙",
            "🦒","🐘","🦣","🦏","🦛","🐭","🐁","🐀","🐹","🐰","🐇","🐿","🦫","🦔","🦇","🐻","🐨","🐼","🦥","🦦",
            "🦨","🦘","🦡","🐾","🦃","🐔","🐓","🐣","🐤","🐥","🐦","🐧","🕊","🦅","🦆","🦢","🦉","🦤","🪶","🦩",
            "🦚","🦜","🐸","🐊","🐢","🦎","🐍","🐲","🐉","🦕","🦖","🐳","🐋","🐬","🦭","🐟","🐠","🐡","🦈","🐙",
            "🐚","🐌","🦋","🐛","🐜","🐝","🪲","🐞","🦗","🪳","🕷","🕸","🦂","🦟","🪰","🪱","🦠","🍎","🍏","🍐",
            "🍊","🍋","🍌","🍉","🍇","🍓","🫐","🍈","🍒","🍑","🥭","🍍","🥥","🥝","🍅","🍆","🥑"
        ];

        let level = 1;
        let score = 0;
        let shuffles = 3;
        let board = [];
        let rows = 0, cols = 0;
        let tileSize = 0;
        let selectedTile = null;
        let pairsRemaining = 0;

        // Ekranga yaxshiroq sig'ishi uchun qatorlar
        const levels = [
            { r: 6, c: 6 }, { r: 6, c: 8 }, { r: 8, c: 8 }, { r: 8, c: 10 }, { r: 10, c: 10 },
            { r: 10, c: 12 }, { r: 12, c: 12 }, { r: 12, c: 14 }, { r: 14, c: 14 }, { r: 14, c: 16 }
        ];

        function startGame() {
            const nameInput = document.getElementById('player-input').value.trim();
            if (!nameInput) {
                document.getElementById('player-input').style.borderColor = 'var(--accent-color)';
                setTimeout(() => document.getElementById('player-input').style.borderColor = '', 500);
                return;
            }

            initAudio();
            playSound('levelUp');

            // Try fullscreen safely
            try {
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen().catch(e => console.log(e));
                }
            } catch(e) {}

            document.getElementById('login-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'flex';
                document.getElementById('player-name-display').innerText = nameInput;
                level = 1; score = 0; shuffles = 3;
                initLevel();
            }, 500);
        }

        function initLevel() {
            if (level > 10) {
                playSound('levelUp');
                alert("TABRIKLAYMIZ! Siz barcha PRO bosqichlarni yakunladingiz!");
                return;
            }
            
            document.getElementById('level-display').innerText = `${level} / 10`;
            document.getElementById('score-display').innerText = score;
            document.getElementById('shuffle-display').innerText = shuffles;
            
            rows = levels[level-1].r;
            cols = levels[level-1].c;
            
            generateBoard();
            renderBoard();
        }

        function generateBoard() {
            const totalTiles = rows * cols;
            pairsRemaining = totalTiles / 2;
            let items = [];
            
            // Randomly pick emojis
            let pool = [...safeEmojis].sort(() => Math.random() - 0.5);
            let needed = pool.slice(0, pairsRemaining);
            
            for (let i = 0; i < pairsRemaining; i++) {
                items.push(needed[i], needed[i]); 
            }
            items.sort(() => Math.random() - 0.5); 
            
            board = Array(rows + 2).fill().map(() => Array(cols + 2).fill(0));
            
            let itemIndex = 0;
            for (let r = 1; r <= rows; r++) {
                for (let c = 1; c <= cols; c++) {
                    board[r][c] = items[itemIndex++];
                }
            }
        }

        function renderBoard() {
            const boardWrapper = document.getElementById('board-wrapper');
            const boardElement = document.getElementById('board');
            
            // Kafelka o'lchamini bo'sh joyga qarab ideal hisoblash
            const maxW = boardWrapper.clientWidth - 20;
            const maxH = boardWrapper.clientHeight - 20;
            
            // Gap = 2px, shuning uchun (cols * tileSize) + (cols-1)*2 <= maxW
            tileSize = Math.floor(Math.min( (maxW - (cols-1)*2) / cols, (maxH - (rows-1)*2) / rows ));
            if (tileSize > 55) tileSize = 55; // Maksimal hajm
            
            boardElement.innerHTML = '';
            boardElement.style.gridTemplateColumns = `repeat(${cols}, ${tileSize}px)`;
            boardElement.style.gridTemplateRows = `repeat(${rows}, ${tileSize}px)`;

            for (let r = 1; r <= rows; r++) {
                for (let c = 1; c <= cols; c++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.style.width = `${tileSize}px`;
                    tile.style.height = `${tileSize}px`;
                    tile.style.fontSize = `${tileSize * 0.65}px`; // Emojini maksimal kattalashtirish
                    tile.dataset.r = r;
                    tile.dataset.c = c;
                    
                    if (board[r][c] === 0) {
                        tile.classList.add('hidden');
                    } else {
                        tile.innerText = board[r][c];
                        tile.onclick = () => onTileClick(tile, r, c);
                    }
                    boardElement.appendChild(tile);
                }
            }
            // Clear lines
            document.getElementById('svg-layer').innerHTML = '';
            selectedTile = null;
        }

        function shuffleBoard() {
            if (shuffles <= 0) return;
            shuffles--;
            document.getElementById('shuffle-display').innerText = shuffles;
            playSound('shuffle');
            
            let currentItems = [];
            for (let r = 1; r <= rows; r++) {
                for (let c = 1; c <= cols; c++) {
                    if (board[r][c] !== 0) {
                        currentItems.push(board[r][c]);
                    }
                }
            }
            
            currentItems.sort(() => Math.random() - 0.5);
            
            let i = 0;
            for (let r = 1; r <= rows; r++) {
                for (let c = 1; c <= cols; c++) {
                    if (board[r][c] !== 0) {
                        board[r][c] = currentItems[i++];
                    }
                }
            }
            renderBoard();
        }

        function onTileClick(el, r, c) {
            if (board[r][c] === 0) return;

            if (!selectedTile) {
                playSound('select');
                selectedTile = { el, r, c };
                el.classList.add('selected');
            } else {
                if (selectedTile.r === r && selectedTile.c === c) {
                    selectedTile.el.classList.remove('selected');
                    selectedTile = null;
                    playSound('select'); 
                    return;
                }

                if (board[selectedTile.r][selectedTile.c] === board[r][c]) {
                    let path = findPath({r: selectedTile.r, c: selectedTile.c}, {r, c});
                    if (path) {
                        playSound('match'); 
                        drawPath(path);
                        let p1 = selectedTile;
                        
                        setTimeout(() => {
                            board[p1.r][p1.c] = 0;
                            board[r][c] = 0;
                            p1.el.classList.add('hidden');
                            p1.el.classList.remove('selected');
                            el.classList.add('hidden');
                            document.getElementById('svg-layer').innerHTML = ''; 
                            
                            score += 15;
                            document.getElementById('score-display').innerText = score;
                            pairsRemaining--;
                            
                            if (pairsRemaining === 0) {
                                level++;
                                shuffles++; // Har bosqichda 1 ta bonus shuffle
                                playSound('levelUp'); 
                                setTimeout(initLevel, 800); 
                            }
                        }, 300);
                    } else {
                        showError(selectedTile.el, el);
                    }
                } else {
                    showError(selectedTile.el, el);
                }
                selectedTile = null;
            }
        }

        function showError(t1, t2) {
            playSound('error');
            t1.classList.remove('selected');
            t1.classList.add('error');
            t2.classList.add('error');
            setTimeout(() => {
                t1.classList.remove('error');
                t2.classList.remove('error');
            }, 300);
        }

        // --- Pathfinding Algorithm (Onet) ---
        function findPath(start, end) {
            const queue = [{ r: start.r, c: start.c, path: [[start.r, start.c]], dir: -1, corners: 0 }];
            const visited = Array(rows + 2).fill().map(() => Array(cols + 2).fill().map(() => Array(4).fill(100)));
            const dr = [-1, 0, 1, 0];
            const dc = [0, 1, 0, -1];

            while (queue.length > 0) {
                let curr = queue.shift();
                if (curr.r === end.r && curr.c === end.c) return curr.path;

                for (let i = 0; i < 4; i++) {
                    let nr = curr.r + dr[i];
                    let nc = curr.c + dc[i];
                    let nextCorners = curr.corners + (curr.dir !== -1 && curr.dir !== i ? 1 : 0);

                    if (nr >= 0 && nr <= rows + 1 && nc >= 0 && nc <= cols + 1 && nextCorners <= 2) {
                        if (board[nr][nc] === 0 || (nr === end.r && nc === end.c)) {
                            if (nextCorners < visited[nr][nc][i]) {
                                visited[nr][nc][i] = nextCorners;
                                queue.push({
                                    r: nr, c: nc,
                                    path: [...curr.path, [nr, nc]],
                                    dir: i,
                                    corners: nextCorners
                                });
                            }
                        }
                    }
                }
            }
            return null;
        }

        function drawPath(path) {
            const svg = document.getElementById('svg-layer');
            const boardEl = document.getElementById('board');
            const rect = boardEl.getBoundingClientRect();
            
            // Grid gap is 2px
            const cellW = tileSize + 2; 
            const cellH = tileSize + 2;
            
            let polyline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
            polyline.setAttribute('fill', 'none');
            polyline.setAttribute('stroke', 'var(--primary-color)');
            polyline.setAttribute('stroke-width', '4');
            polyline.setAttribute('stroke-linejoin', 'round');
            polyline.setAttribute('stroke-linecap', 'round');
            polyline.setAttribute('filter', 'drop-shadow(0 0 8px var(--primary-color))');
            polyline.classList.add('path-line');
            
            let points = "";
            path.forEach(p => {
                const x = rect.left + (p[1] - 0.5) * cellW;
                const y = rect.top + (p[0] - 0.5) * cellH;
                points += `${x},${y} `;
            });
            
            polyline.setAttribute('points', points.trim());
            svg.appendChild(polyline);
        }
    </script>
</body>
</html>
