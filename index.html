<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#020406">
    <title>XOLƎRIƆ</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22XOL%C6%8ERI%C6%86%22%2C%22short_name%22%3A%22XOL%C6%8ERI%C6%86%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23020406%22%2C%22theme_color%22%3A%22%23020406%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fpng%3Bbase64%2CiVBORw0KGgoAAAANSUhEUgAAAEAAAABACAQAAAAAYLlVAAAAPElEQVR42u3OMQEAAAwCoPk3tY/mAwkg6yYqKioqKioqKioqKioqKioqKioqKioqKioqKioqKioqKio6Wwd7gAERjPXYAAAAAElFTkSuQmCC%22%2C%22sizes%22%3A%2264x64%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #020406;
            --glass: rgba(10, 15, 25, 0.7);
            --border: rgba(0, 240, 255, 0.15);
            --accent: #00f0ff;
            --danger: #ff003c;
            --success: #00ff88;
            --text-main: #ffffff;
            --text-dim: #6c7a89;
        }
        body {
            background-color: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif;
            width: 100vw; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; position: fixed;
        }

        /* Screens */
        .screen-overlay {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
            background: rgba(2, 4, 6, 0.95); backdrop-filter: blur(20px);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .screen-overlay.hidden { opacity: 0; transform: scale(1.05); pointer-events: none; }
        
        .logo {
            font-family: 'Orbitron', sans-serif; font-size: clamp(3rem, 12vw, 4.5rem);
            font-weight: 900; letter-spacing: 10px; margin-bottom: 30px; color: #fff;
            text-shadow: 0 0 25px rgba(0, 240, 255, 0.4);
        }
        
        .input-group { display: flex; flex-direction: column; gap: 12px; width: 85%; max-width: 320px; }
        input.text-input {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            padding: 18px; border-radius: 16px; color: white; font-size: 1.1rem;
            text-align: center; outline: none; transition: 0.3s; font-family: 'Inter', sans-serif;
            text-transform: uppercase; letter-spacing: 2px;
        }
        input.text-input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0,240,255,0.2); }
        
        .btn {
            background: var(--accent); color: #000; padding: 18px; border-radius: 16px;
            font-weight: 900; font-size: 1rem; border: none; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.2s;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }
        .btn:active { transform: scale(0.96); }
        .btn-outline { background: transparent; color: var(--accent); border: 2px solid var(--accent); box-shadow: none; }
        #btn-continue, #btn-install { display: none; }

        /* Game UI */
        #game-ui {
            flex: 1; display: flex; flex-direction: column; opacity: 0;
            transition: opacity 0.8s ease 0.2s; z-index: 10; height: 100%; padding-top: env(safe-area-inset-top, 10px);
        }
        
        #board-wrapper {
            position: relative; flex: 1; display: flex;
            justify-content: center; align-items: center; padding: 10px;
        }
        #grid { display: grid; gap: 6px; z-index: 20; max-width: 100%; max-height: 100%; }
        
        .tile {
            background: #080c12; border: 1px solid rgba(0,240,255,0.08);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            aspect-ratio: 1/1; box-shadow: inset 0 0 15px rgba(0,0,0,0.9);
        }
        .tile:active { transform: scale(0.85); }
        .tile.selected {
            background: rgba(0, 240, 255, 0.2); border: 1px solid var(--accent);
            transform: scale(1.1); box-shadow: 0 0 20px rgba(0,240,255,0.4); z-index: 30;
        }
        .tile.matched { opacity: 0; transform: scale(0); pointer-events: none; transition: 0.3s ease-out; }
        
        /* Mistake Animation */
        @keyframes errorShake {
            0% { transform: translateX(0); border-color: var(--danger); }
            25% { transform: translateX(-5px); border-color: var(--danger); }
            50% { transform: translateX(5px); border-color: var(--danger); }
            75% { transform: translateX(-5px); border-color: var(--danger); }
            100% { transform: translateX(0); }
        }
        .error-shake { animation: errorShake 0.4s ease; }

        /* Dashboard */
        .dashboard {
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 24px;
            margin: 10px 15px 25px 15px; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            flex-shrink: 0; z-index: 50; box-shadow: 0 -10px 40px rgba(0,0,0,0.6);
        }
        .stats-group { display: flex; gap: 15px; align-items: center; flex-wrap: wrap;}
        .stat-item { display: flex; flex-direction: column; gap: 2px; }
        .stat-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; font-weight: 900; letter-spacing: 1px; }
        .stat-val { font-size: 1.1rem; font-weight: 900; color: #fff; font-family: 'Orbitron', sans-serif;}
        
        #mistake-display { transition: color 0.3s; }
        .danger-text { color: var(--danger) !important; text-shadow: 0 0 10px var(--danger); animation: pulse 0.5s infinite alternate; }
        .combo-text { color: var(--success); text-shadow: 0 0 10px var(--success); animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }

        /* SVG Line */
        #svg-layer { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .connection-line {
            fill: none; stroke: var(--success); stroke-width: 5;
            stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(0 0 10px var(--success));
            stroke-dasharray: 2000; stroke-dashoffset: 2000;
            animation: drawLine 0.25s ease-out forwards;
        }
        @keyframes drawLine { to { stroke-dashoffset: 0; } }

        /* Floating Score */
        .floating-score {
            position: absolute; color: var(--success); font-weight: 900; font-size: 1.3rem;
            text-shadow: 0 0 10px var(--success); pointer-events: none; z-index: 200;
            animation: floatUp 0.8s ease-out forwards; font-family: 'Orbitron', sans-serif;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.3); }
        }

        /* Math Numpad UI */
        .math-box {
            background: rgba(0,0,0,0.5); border: 1px solid var(--danger); border-radius: 20px;
            padding: 20px; text-align: center; margin-bottom: 20px; box-shadow: inset 0 0 20px rgba(255,0,60,0.2);
            width: 85%; max-width: 320px;
        }
        .math-q { font-size: 2rem; font-family: 'Orbitron', sans-serif; font-weight: 900; color: #fff; letter-spacing: 3px; }
        .math-ans {
            background: #000; border: 2px solid var(--accent); padding: 15px; margin-top: 15px;
            border-radius: 12px; font-size: 1.5rem; font-family: 'Orbitron', sans-serif; color: var(--accent);
            min-height: 60px; display: flex; justify-content: center; align-items: center; letter-spacing: 5px;
        }
        .numpad {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 85%; max-width: 320px;
        }
        .num-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; font-size: 1.5rem; padding: 15px; border-radius: 12px; font-family: 'Orbitron', sans-serif;
            font-weight: 900; cursor: pointer; transition: 0.2s;
        }
        .num-btn:active { background: rgba(255,255,255,0.15); transform: scale(0.92); }
        .num-btn.del { background: rgba(255,0,60,0.1); color: var(--danger); border-color: var(--danger); }
        .num-btn.ok { background: rgba(0,240,255,0.1); color: var(--accent); border-color: var(--accent); }

        /* Level up overlay */
        #msg-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            z-index: 500; display: flex; justify-content: center; align-items: center; flex-direction: column;
            opacity: 0; pointer-events: none; transition: 0.4s;
        }
        #msg-overlay.show { opacity: 1; }
        .msg-title { font-size: 3.5rem; color: #fff; font-weight: 900; letter-spacing: 8px; font-family: 'Orbitron', sans-serif; text-shadow: 0 0 20px var(--accent); }
    </style>
</head>
<body>

    <div id="login-screen" class="screen-overlay">
        <div class="logo">XOLƎRIƆ</div>
        <div class="input-group">
            <input type="text" id="player-name" class="text-input" placeholder="ID KODINGIZ" autocomplete="off" spellcheck="false">
            <button class="btn" onclick="startNewGame()">Ishga Tushirish</button>
            <button class="btn btn-outline" id="btn-continue" onclick="continueGame()">Davom etish</button>
            <button class="btn btn-outline" id="btn-install" onclick="installPWA()" style="color: #fff; border-color: #fff;">📲 Ilovani O'rnatish</button>
        </div>
    </div>

    <div id="locked-screen" class="screen-overlay hidden">
        <div class="logo" style="color: var(--danger); text-shadow: 0 0 30px rgba(255,0,60,0.6); font-size: 2.5rem; margin-bottom: 20px;">TIZIM BLOKLANDI</div>
        <p style="color: var(--text-dim); margin-bottom: 20px; font-weight: 700; text-align:center; max-width: 80%;">Xatolar soni oshib ketdi. Override kodini kiriting:</p>
        
        <div class="math-box">
            <div class="math-q" id="math-question">2 + 2 = ?</div>
            <div class="math-ans" id="math-answer-display"></div>
        </div>

        <div class="numpad">
            <button class="num-btn" onclick="typeNum(1)">1</button>
            <button class="num-btn" onclick="typeNum(2)">2</button>
            <button class="num-btn" onclick="typeNum(3)">3</button>
            <button class="num-btn" onclick="typeNum(4)">4</button>
            <button class="num-btn" onclick="typeNum(5)">5</button>
            <button class="num-btn" onclick="typeNum(6)">6</button>
            <button class="num-btn" onclick="typeNum(7)">7</button>
            <button class="num-btn" onclick="typeNum(8)">8</button>
            <button class="num-btn" onclick="typeNum(9)">9</button>
            <button class="num-btn del" onclick="delNum()">DEL</button>
            <button class="num-btn" onclick="typeNum(0)">0</button>
            <button class="num-btn ok" onclick="checkMath()">OK</button>
        </div>
    </div>

    <div id="game-ui">
        <div id="board-wrapper">
            <div id="grid"></div>
            <svg id="svg-layer"></svg>
            <div id="msg-overlay">
                <div class="msg-title">Ajoyib</div>
            </div>
        </div>

        <div class="dashboard">
            <div class="stats-group">
                <div class="stat-item">
                    <span class="stat-label">Daraja</span>
                    <span class="stat-val" id="lvl-display">1</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">HISOB</span>
                    <span class="stat-val" id="score-display">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">XATO</span>
                    <span class="stat-val" id="mistake-display">0/10</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">KOMBO</span>
                    <span class="stat-val" id="combo-display">x1</span>
                </div>
            </div>
            <button class="btn btn-outline" style="padding: 10px 15px; font-size: 0.8rem; border-radius: 12px; margin-left: 10px;" onclick="handleShuffle()">ARALASH</button>
        </div>
    </div>

    <script>
        // --- PWA Installation Logic ---
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            document.getElementById('btn-install').style.display = 'block';
        });
        function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') document.getElementById('btn-install').style.display = 'none';
                    deferredPrompt = null;
                });
            }
        }
        if ('serviceWorker' in navigator) {
            const swCode = `self.addEventListener('fetch', (e) => { e.respondWith(fetch(e.request).catch(() => new Response('Oflayn'))); });`;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
        }

        // --- Game Database & State ---
        const EMOJI_DB = [
            "🍎","🍅","🍒","🍓","🍉","🍊","🍋","🍌","🍏","🍐","🍑","🥭","🍍","🥥","🥝",
            "🍔","🥪","🌭","🍕","🍟","🌮","🌯","🥩","🍗","🍖","🍘","🍙","🍚","🍛","🍜",
            "🚗","🚕","🚙","🚌","🚎","🏎️","🚓","🚑","🚒","🚐","🛻","🚚","🚛","🚜","🛵",
            "⚽","🏀","🏈","⚾","🥎","🎾","🏐","🏉","🎱","🪀","🏓","🏸","🏒","🏑","🥍",
            "😀","😃","😄","😁","😆","😅","🤣","😂","🙂","🙃","😉","😊","😇","🥰","😍",
            "🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐻‍❄️","🐨","🐯","🦁","🐮","🐷","🐸",
            "❤️","🧡","💛","💚","💙","💜","🖤","🤍","🤎","💔","❣️","💕","💞","💓","💗",
            "🌟","⭐","✨","💫","🌠","🪐","🌍","🌎","🌏","🌑","🌒","🌓","🌔","🌕","🌖",
            "🔴","🟠","🟡","🟢","🔵","🟣","⚫","⚪","🟤","🟥","🟧","🟨","🟩","🟦","🟪",
            "⌚","📱","💻","⌨️","🖥️","🖨️","🖱️","🖲️","🕹️","🗜️","💽","💾","💿","📀","📼"
        ];

        let gameState = { 
            level: 1, score: 0, mistakes: 0, rows: 0, cols: 0, grid: [], 
            playerName: "GUEST", isLocked: false, mathTask: null 
        };
        
        let combo = 1; let comboTimeout; let isProcessing = false; let typedAnswer = "";

        const els = {
            grid: document.getElementById('grid'), svg: document.getElementById('svg-layer'),
            lvl: document.getElementById('lvl-display'), score: document.getElementById('score-display'),
            combo: document.getElementById('combo-display'), mistake: document.getElementById('mistake-display'),
            login: document.getElementById('login-screen'), locked: document.getElementById('locked-screen'),
            gameUI: document.getElementById('game-ui'), overlay: document.getElementById('msg-overlay'),
            btnCont: document.getElementById('btn-continue'), nameInp: document.getElementById('player-name'),
            boardWrap: document.getElementById('board-wrapper'), mathQ: document.getElementById('math-question'),
            mathAns: document.getElementById('math-answer-display')
        };

        // --- Boot & Save Logic ---
        window.onload = () => {
            const saved = localStorage.getItem('xoleric_override');
            if (saved) { 
                const data = JSON.parse(saved);
                if(data.isLocked) {
                    gameState = data;
                    showLockedScreen();
                } else {
                    els.btnCont.style.display = 'block'; 
                    els.nameInp.value = data.playerName;
                }
            }
        };

        function saveGame() { localStorage.setItem('xoleric_override', JSON.stringify(gameState)); }

        window.startNewGame = function() {
            gameState.playerName = els.nameInp.value.trim().toUpperCase() || "HACKER";
            gameState.level = 1; gameState.score = 0; gameState.mistakes = 0; gameState.isLocked = false;
            combo = 1; els.login.classList.add('hidden'); els.gameUI.style.opacity = '1';
            setupLevel();
        };

        window.continueGame = function() {
            const saved = JSON.parse(localStorage.getItem('xoleric_override'));
            if(saved && !saved.isLocked) { 
                gameState = saved; gameState.selected = null; isProcessing = false; 
                els.login.classList.add('hidden'); els.gameUI.style.opacity = '1';
                renderGrid(); updateStats();
            }
        };

        // --- Math Override Logic ---
        function triggerLockdown() {
            gameState.isLocked = true;
            gameState.mathTask = generateMathProblem();
            saveGame();
            showLockedScreen();
        }

        function generateMathProblem() {
            const ops = ['+', '-', '*'];
            const op = ops[Math.floor(Math.random() * ops.length)];
            let a, b, ans;
            if (op === '+') { a = Math.floor(Math.random()*50)+10; b = Math.floor(Math.random()*50)+10; ans = a+b; }
            else if (op === '-') { a = Math.floor(Math.random()*50)+30; b = Math.floor(Math.random()*29)+1; ans = a-b; }
            else { a = Math.floor(Math.random()*11)+2; b = Math.floor(Math.random()*11)+2; ans = a*b; }
            return { q: `${a} ${op} ${b} = ?`, a: ans };
        }

        function showLockedScreen() {
            els.gameUI.style.opacity = '0';
            els.login.classList.add('hidden');
            els.locked.classList.remove('hidden');
            els.mathQ.innerText = gameState.mathTask.q;
            typedAnswer = ""; updateMathDisplay();
        }

        window.typeNum = function(n) { if(typedAnswer.length < 5) { typedAnswer += n; updateMathDisplay(); } };
        window.delNum = function() { typedAnswer = typedAnswer.slice(0, -1); updateMathDisplay(); };
        function updateMathDisplay() { els.mathAns.innerText = typedAnswer || "_"; }

        window.checkMath = function() {
            if (parseInt(typedAnswer) === gameState.mathTask.a) {
                // Unlock
                gameState.isLocked = false;
                gameState.mathTask = null;
                gameState.mistakes = 0; // reset mistakes
                gameState.score = 0; // Reset score for failing
                gameState.level = 1; // Restart from level 1 as punishment
                saveGame();
                els.locked.classList.add('hidden');
                els.gameUI.style.opacity = '1';
                setupLevel();
            } else {
                els.mathAns.style.borderColor = 'red';
                els.mathAns.style.color = 'red';
                els.mathAns.innerText = "XATO";
                setTimeout(() => { typedAnswer = ""; updateMathDisplay(); els.mathAns.style.borderColor = 'var(--accent)'; els.mathAns.style.color = 'var(--accent)'; }, 800);
            }
        };

        // --- Core Game Logic ---
        function updateStats() { 
            els.lvl.innerText = gameState.level; 
            els.score.innerText = gameState.score; 
            els.mistake.innerText = `${gameState.mistakes}/10`;
            els.combo.innerText = `x${combo}`;
            
            if(gameState.mistakes >= 8) els.mistake.classList.add('danger-text');
            else els.mistake.classList.remove('danger-text');

            if(combo > 1) els.combo.classList.add('combo-text');
            else els.combo.classList.remove('combo-text');
        }

        function registerMistake(t1, t2) {
            gameState.mistakes++;
            updateStats();
            t1.classList.add('error-shake');
            if(t2) t2.classList.add('error-shake');
            setTimeout(() => { t1.classList.remove('error-shake'); if(t2) t2.classList.remove('error-shake'); }, 400);
            
            combo = 1; updateStats();
            saveGame();

            if(gameState.mistakes >= 10) setTimeout(triggerLockdown, 500);
        }

        function setupLevel() {
            let baseRows = 8; let baseCols = window.innerWidth > 600 ? 10 : 6;
            gameState.rows = Math.min(baseRows + Math.floor(gameState.level), 16);
            gameState.cols = Math.min(baseCols + Math.floor((gameState.level - 1) / 2), 12);
            if ((gameState.rows * gameState.cols) % 2 !== 0) gameState.rows++;

            generateData(); renderGrid(); updateStats(); saveGame();
        }

        function generateData() {
            const total = gameState.rows * gameState.cols;
            let shuffledDB = [...EMOJI_DB].sort(() => Math.random() - 0.5);
            let pool = [];
            for (let i = 0; i < total / 2; i++) pool.push(shuffledDB[i % shuffledDB.length]);
            let items = [...pool, ...pool].sort(() => Math.random() - 0.5);

            gameState.grid = Array.from({length: gameState.rows + 2}, () => new Array(gameState.cols + 2).fill(null));
            let idx = 0;
            for (let r = 1; r <= gameState.rows; r++) {
                for (let c = 1; c <= gameState.cols; c++) gameState.grid[r][c] = items[idx++];
            }
        }

        function renderGrid() {
            els.grid.style.gridTemplateColumns = `repeat(${gameState.cols}, 1fr)`;
            els.grid.style.gridTemplateRows = `repeat(${gameState.rows}, 1fr)`;
            els.grid.innerHTML = '';

            for (let r = 1; r <= gameState.rows; r++) {
                for (let c = 1; c <= gameState.cols; c++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    const val = gameState.grid[r][c];
                    
                    if (val) {
                        tile.innerText = val;
                        tile.style.fontSize = `min(8vw, 4vh, 38px)`;
                        tile.onclick = () => handleTileClick(r, c, tile);
                    } else { tile.classList.add('matched'); }
                    tile.id = `t-${r}-${c}`;
                    els.grid.appendChild(tile);
                }
            }
            els.svg.innerHTML = '';
        }

        function handleTileClick(r, c, el) {
            if (isProcessing) return;
            if (gameState.selected) {
                const {r: sr, c: sc} = gameState.selected;
                const prevEl = document.getElementById(`t-${sr}-${sc}`);
                
                if (sr === r && sc === c) {
                    el.classList.remove('selected'); gameState.selected = null; return;
                }
                
                if (gameState.grid[r][c] === gameState.grid[sr][sc]) {
                    const path = findLink(sr, sc, r, c);
                    if (path) {
                        isProcessing = true; executeMatch(gameState.selected, {r, c}, path); return;
                    } else {
                        registerMistake(el, prevEl);
                    }
                } else {
                    registerMistake(el, prevEl);
                }
                prevEl.classList.remove('selected');
                gameState.selected = null; // reset selection on mistake to force new thinking
            } else {
                gameState.selected = {r, c}; el.classList.add('selected');
            }
        }

        function findLink(r1, c1, r2, c2) {
            const queue = [{r: r1, c: c1, dir: -1, turns: 0, path: [[r1, c1]]}];
            const visited = new Set();
            while (queue.length > 0) {
                const curr = queue.shift();
                if (curr.turns > 2) continue;
                if (curr.r === r2 && curr.c === c2) return curr.path;
                const dirs = [[-1,0], [1,0], [0,-1], [0,1]];
                for (let i = 0; i < 4; i++) {
                    const nr = curr.r + dirs[i][0]; const nc = curr.c + dirs[i][1];
                    if (nr >= 0 && nr < gameState.rows + 2 && nc >= 0 && nc < gameState.cols + 2) {
                        if (gameState.grid[nr][nc] === null || (nr === r2 && nc === c2)) {
                            const nt = (curr.dir !== -1 && curr.dir !== i) ? curr.turns + 1 : curr.turns;
                            const key = `${nr},${nc},${i},${nt}`;
                            if (!visited.has(key)) {
                                visited.add(key); queue.push({r: nr, c: nc, dir: i, turns: nt, path: [...curr.path, [nr, nc]]});
                            }
                        }
                    }
                }
            }
            return null;
        }

        function executeMatch(p1, p2, path) {
            drawPath(path);
            
            clearTimeout(comboTimeout);
            let earnedScore = 150 * combo;
            gameState.score += earnedScore;
            
            showFloatingScore(`+${earnedScore}`, p2.r, p2.c);
            combo++; updateStats();
            comboTimeout = setTimeout(() => { combo = 1; updateStats(); }, 4000); // 4 sec to keep combo

            setTimeout(() => {
                gameState.grid[p1.r][p1.c] = null; gameState.grid[p2.r][p2.c] = null;
                const t1 = document.getElementById(`t-${p1.r}-${p1.c}`); const t2 = document.getElementById(`t-${p2.r}-${p2.c}`);
                t1.classList.remove('selected'); t2.classList.remove('selected');
                t1.classList.add('matched'); t2.classList.add('matched');
                
                saveGame(); setTimeout(() => { els.svg.innerHTML = ''; }, 150);
                gameState.selected = null; isProcessing = false; checkWin();
            }, 150);
        }

        function showFloatingScore(text, r, c) {
            const tile = document.getElementById(`t-${r}-${c}`);
            if(!tile) return;
            const rect = tile.getBoundingClientRect(); const wrapperRect = els.boardWrap.getBoundingClientRect();
            const pop = document.createElement('div');
            pop.className = 'floating-score'; pop.innerText = text;
            pop.style.left = `${rect.left - wrapperRect.left + (rect.width/4)}px`;
            pop.style.top = `${rect.top - wrapperRect.top}px`;
            els.boardWrap.appendChild(pop);
            setTimeout(() => pop.remove(), 800);
        }

        function drawPath(path) {
            const wrapperRect = els.svg.getBoundingClientRect(); const gridRect = els.grid.getBoundingClientRect();
            const cellW = gridRect.width / gameState.cols; const cellH = gridRect.height / gameState.rows;
            const offsetX = gridRect.left - wrapperRect.left; const offsetY = gridRect.top - wrapperRect.top;
            const points = path.map(p => `${offsetX + (p[1] - 0.5) * cellW},${offsetY + (p[0] - 0.5) * cellH}`).join(' ');
            const polyline = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
            polyline.setAttribute("points", points); polyline.setAttribute("class", "connection-line");
            els.svg.appendChild(polyline);
        }

        function checkWin() {
            if (!gameState.grid.flat().some(cell => cell !== null)) {
                gameState.level++; saveGame(); els.overlay.classList.add('show');
                setTimeout(() => { els.overlay.classList.remove('show'); setupLevel(); }, 1500);
            }
        }

        window.handleShuffle = function() {
            if(isProcessing) return;
            let active = [];
            for(let r=1; r<=gameState.rows; r++) {
                for(let c=1; c<=gameState.cols; c++) if(gameState.grid[r][c] !== null) active.push(gameState.grid[r][c]);
            }
            active.sort(() => Math.random() - 0.5);
            let idx = 0;
            for(let r=1; r<=gameState.rows; r++) {
                for(let c=1; c<=gameState.cols; c++) if(gameState.grid[r][c] !== null) gameState.grid[r][c] = active[idx++];
            }
            gameState.score = Math.max(0, gameState.score - 100);
            combo = 1; updateStats(); saveGame(); renderGrid(); gameState.selected = null;
        };
    </script>
</body>
