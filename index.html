<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XOLƎRIƆ Connect Game</title>
    <link rel="manifest" id="manifest-link">
    <style>
        :root {
            --bg-color: #0b0f19;
            --surface-color: #1a2235;
            --primary-color: #a8c7fa;
            --text-color: #e3e3e3;
            --accent-color: #7cacf8;
            --error-color: #ff6b6b;
            --glow: 0 0 15px rgba(124, 172, 248, 0.4);
            --glow-error: 0 0 15px rgba(255, 107, 107, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- Login Screen --- */
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--surface-color);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--glow);
            transition: all 0.5s ease;
            position: relative;
            z-index: 200;
        }

        #login-screen h1 {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 20px;
            letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(168, 199, 250, 0.5);
        }

        .rev-letter {
            display: inline-block;
            transform: scaleX(-1);
        }

        input {
            width: 100%;
            padding: 12px 20px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
            text-align: center;
        }

        input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(124, 172, 248, 0.2);
        }

        button {
            background: var(--primary-color);
            color: #000;
            border: none;
            padding: 12px 40px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(168, 199, 250, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(168, 199, 250, 0.5);
        }

        /* --- Game Screen --- */
        #game-screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            position: relative;
        }

        /* Minimalistic Clock */
        #clock-container {
            position: absolute;
            top: 15px;
            right: 20px;
            text-align: right;
            opacity: 0.5;
            font-size: 0.85rem;
            letter-spacing: 1px;
            z-index: 10;
            pointer-events: none;
        }

        #game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(26, 34, 53, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 5;
        }

        .header-info {
            font-size: 1.1rem;
            color: var(--primary-color);
            font-weight: 500;
        }

        #board-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        #board {
            display: grid;
            gap: 4px;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 15px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6);
        }

        .tile {
            background: var(--surface-color);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s, opacity 0.3s, box-shadow 0.2s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
        }

        .tile:active {
            transform: scale(0.9);
        }

        .tile.selected {
            background: rgba(168, 199, 250, 0.15);
            border-color: var(--accent-color);
            box-shadow: var(--glow);
            transform: scale(1.05);
            z-index: 2;
        }

        .tile.error {
            background: rgba(255, 107, 107, 0.15);
            border-color: var(--error-color);
            box-shadow: var(--glow-error);
            transform: translateX(3px); /* Kichik titrash effekti uchun */
        }

        .tile.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: scale(0.5);
        }

        #svg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        #install-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: transparent;
            border: 1px solid rgba(168, 199, 250, 0.5);
            color: var(--primary-color);
            padding: 8px 15px;
            font-size: 0.9rem;
            display: none;
        }
        
        #install-btn:hover {
            background: rgba(168, 199, 250, 0.1);
            box-shadow: none;
            transform: none;
        }
    </style>
</head>

    <script>
        // --- Web Audio API (Hacker/Cyber Sound Engine) ---
        let audioCtx;
        
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSynth(freq, type, duration, vol = 0.05) {
            if (!audioCtx) return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = type; // 'square', 'sawtooth', 'triangle', 'sine'
            oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + duration);
        }

        function playSound(effect) {
            switch(effect) {
                case 'select':
                    // Qisqa raqamli chertish
                    playSynth(800, 'square', 0.1, 0.03);
                    break;
                case 'match':
                    // Tezkor yuqorilovchi "muvaffaqiyat" ovozi
                    playSynth(400, 'sine', 0.1, 0.05);
                    setTimeout(() => playSynth(600, 'sine', 0.1, 0.05), 80);
                    setTimeout(() => playSynth(1200, 'sine', 0.2, 0.05), 160);
                    break;
                case 'error':
                    // Past chastotali xato ovozi ("buzz")
                    playSynth(150, 'sawtooth', 0.2, 0.05);
                    break;
                case 'levelUp':
                    // Kiber-musiqa kabi o'tish ovozi
                    [300, 400, 500, 600, 800, 1200].forEach((f, i) => {
                        setTimeout(() => playSynth(f, 'square', 0.15, 0.04), i * 100);
                    });
                    break;
            }
        }

        let level = 1;
        let score = 0;
        let board = [];
        let rows = 0;
        let cols = 0;
        let tileSize = 50;

        let pairsRemaining = 0;

        const levels = [
            { r: 6, c: 6 },   // Level 1: 36

            { r: 14, c: 14 }, // Level 9: 196
            { r: 14, c: 16 }  // Level 10: 224

        function startGame() {
            const nameInput = document.getElementById('player-name').value.trim();
            if (!nameInput) {
                // Xato tovushi
                if(audioCtx) playSynth(150, 'sawtooth', 0.2, 0.05);
                document.getElementById('player-name').style.borderColor = 'var(--error-color)';
                setTimeout(() => document.getElementById('player-name').style.borderColor = '', 500);
                return;
            }

            // Audio API ni faollashtirish (Foydalanuvchi tugma bosganda)
            initAudio();
            playSound('levelUp'); // Tizimga kirish musiqasi

            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
            }

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('player-display').innerText = "User: " + nameInput;
            
            level = 1;
            score = 0;
            initLevel();
        }

        function initLevel() {
            if (level > 10) {
                playSound('levelUp');
                setTimeout(() => alert("Mission Complete! Barcha 10 ta bosqich yakunlandi!"), 500);
                return;
            }
            
            document.getElementById('level-display').innerText = `Level: ${level}/10`;
            document.getElementById('score-display').innerText = `Score: ${score}`;
            
            rows = levels[level-1].r;
            cols = levels[level-1].c;
            
            const boardContainer = document.getElementById('board-container');
            const maxW = boardContainer.clientWidth - 40;
            const maxH = boardContainer.clientHeight - 40;
            
            tileSize = Math.min((maxW / cols) - 4, (maxH / rows) - 4);
            if(tileSize > 60) tileSize = 60;

            generateBoard();
            renderBoard();
        }

        function generateBoard() {
            const totalTiles = rows * cols;
            pairsRemaining = totalTiles / 2;
            let items = [];
            
            let shuffledPool = [...allEmojis].sort(() => Math.random() - 0.5);
            let selectedEmojisForLevel = shuffledPool.slice(0, pairsRemaining);
            
            for (let i = 0; i < pairsRemaining; i++) {
                let emoji = selectedEmojisForLevel[i];
                items.push(emoji, emoji); 
            }
            
            items.sort(() => Math.random() - 0.5); 
            
            board = Array(rows + 2).fill().map(() => Array(cols + 2).fill(0));
            
            let itemIndex = 0;
            for (let r = 1; r <= rows; r++) {
                for (let c = 1; c <= cols; c++) {
                    board[r][c] = items[itemIndex++];
                }
            }
        }

        function renderBoard() {
            const boardElement = document.getElementById('board');
            boardElement.innerHTML = '';
            boardElement.style.gridTemplateColumns = `repeat(${cols}, ${tileSize}px)`;
            boardElement.style.gridTemplateRows = `repeat(${rows}, ${tileSize}px)`;

            for (let r = 1; r <= rows; r++) {
                for (let c = 1; c <= cols; c++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.style.width = `${tileSize}px`;
                    tile.style.height = `${tileSize}px`;
                    tile.style.fontSize = `${tileSize * 0.6}px`;
                    tile.dataset.r = r;
                    tile.dataset.c = c;
                    
                    if (board[r][c] === 0) {
                        tile.classList.add('hidden');
                    } else {
                        tile.innerText = board[r][c];
                        tile.onclick = () => onTileClick(tile, r, c);
                    }
                    boardElement.appendChild(tile);
                }
            }
        }

        function onTileClick(tileElement, r, c) {
            if (board[r][c] === 0) return;

            if (!selectedTile) {
                playSound('select');
                selectedTile = { el: tileElement, r: r, c: c };
                tileElement.classList.add('selected');
            } else {
                if (selectedTile.r === r && selectedTile.c === c) {
                    selectedTile.el.classList.remove('selected');
                    selectedTile = null;
                    playSound('select'); // Bekor qilish ham chertish
                    return;
                }

                if (board[selectedTile.r][selectedTile.c] === board[r][c]) {
                    let path = findPath({r: selectedTile.r, c: selectedTile.c}, {r: r, c: c});
                    if (path) {
                        playSound('match'); // To'g'ri topildi!
                        drawPath(path);
                        let p1 = selectedTile;
                        
                        setTimeout(() => {
                            board[p1.r][p1.c] = 0;
                            board[r][c] = 0;
                            p1.el.classList.add('hidden');
                            tileElement.classList.add('hidden');
                            document.getElementById('svg-layer').innerHTML = ''; 
                            
                            score += 10;
                            document.getElementById('score-display').innerText = `Score: ${score}`;
                            pairsRemaining--;
                            
                            if (pairsRemaining === 0) {
                                level++;
                                playSound('levelUp'); // Bosqich yakunlandi!
                                setTimeout(initLevel, 1000); 
                            }
                        }, 300);
                    } else {
                        // Yo'l yopiq
                        showError(selectedTile.el, tileElement);
                    }
                } else {
                    // Xato kafel
                    showError(selectedTile.el, tileElement);
                }
                selectedTile = null;
            }
        }

        function showError(t1, t2) {
            playSound('error');
            t1.classList.remove('selected');
            t1.classList.add('error');
            t2.classList.add('error');
            
            setTimeout(() => {
                t1.classList.remove('error');
                t2.classList.remove('error');
            }, 300);
        }

        // --- Pathfinding ---
        function findPath(start, end) {
            if (start.r === end.r && start.c === end.c) return null;
            
            const queue = [{ r: start.r, c: start.c, path: [[start.r, start.c]], dir: -1, corners: 0 }];
            const visited = Array(rows + 2).fill().map(() => Array(cols + 2).fill().map(() => Array(4).fill(100)));
            const dr = [-1, 0, 1, 0];
            const dc = [0, 1, 0, -1];

            while (queue.length > 0) {
                let curr = queue.shift();

                if (curr.r === end.r && curr.c === end.c) return curr.path;

                for (let i = 0; i < 4; i++) {
                    let nr = curr.r + dr[i];
                    let nc = curr.c + dc[i];
                    let nextCorners = curr.corners + (curr.dir !== -1 && curr.dir !== i ? 1 : 0);

                    if (nr >= 0 && nr <= rows + 1 && nc >= 0 && nc <= cols + 1 && nextCorners <= 2) {
                        if (board[nr][nc] === 0 || (nr === end.r && nc === end.c)) {
                            if (nextCorners < visited[nr][nc][i]) {
                                visited[nr][nc][i] = nextCorners;
                                queue.push({
                                    r: nr, c: nc,
                                    path: [...curr.path, [nr, nc]],
                                    dir: i,
                                    corners: nextCorners
                                });
                            }
                        }
                    }
                }
            }
            return null;
        }

        function drawPath(path) {
            const svg = document.getElementById('svg-layer');
            const boardEl = document.getElementById('board');
            const rect = boardEl.getBoundingClientRect();
            
            const cellW = tileSize + 4; 
            const cellH = tileSize + 4;
            
            let polyline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
            polyline.setAttribute('fill', 'none');
            polyline.setAttribute('stroke', 'var(--accent-color)');
            polyline.setAttribute('stroke-width', '4');
            polyline.setAttribute('stroke-linejoin', 'round');
            polyline.setAttribute('filter', 'drop-shadow(0 0 5px var(--accent-color))');
            
            let points = "";
            path.forEach(p => {
                const x = rect.left + (p[1] - 0.5) * cellW;
                const y = rect.top + (p[0] - 0.5) * cellH;
                points += `${x},${y} `;
            });
            
            polyline.setAttribute('points', points.trim());
            svg.appendChild(polyline);
        }
    </script>
