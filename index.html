<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#030508">
    <title>XOLƎRIƆ</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22XOL%C6%8ERI%C6%86%22%2C%22short_name%22%3A%22XOL%C6%8ERI%C6%86%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23030508%22%2C%22theme_color%22%3A%22%2300F0FF%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fpng%3Bbase64%2CiVBORw0KGgoAAAANSUhEUgAAAEAAAABACAQAAAAAYLlVAAAAPElEQVR42u3OMQEAAAwCoPk3tY/mAwkg6yYqKioqKioqKioqKioqKioqKioqKioqKioqKioqKioqKio6Wwd7gAERjPXYAAAAAElFTkSuQmCC%22%2C%22sizes%22%3A%2264x64%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg-deep: #030508;
            --tile-bg: #111111;
            --cyan: #00F0FF;
            --red: #FF003C;
            --green: #00FF66;
            --text-main: #FFFFFF;
            --font-display: 'Orbitron', sans-serif;
            --font-ui: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-deep); color: var(--text-main); font-family: var(--font-ui);
            width: 100vw; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; position: fixed;
        }

        /* --- GLOBAL SCREENS --- */
        .screen {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
            background: var(--bg-deep); transition: opacity 0.5s ease;
        }
        .screen.hidden { opacity: 0; pointer-events: none; }

        .logo {
            font-family: var(--font-display); font-size: clamp(3rem, 12vw, 5rem);
            font-weight: 900; letter-spacing: 12px; margin-bottom: 50px; color: var(--cyan);
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.4); animation: pulseLogo 2s infinite alternate;
        }
        @keyframes pulseLogo { from { opacity: 0.8; text-shadow: 0 0 10px rgba(0, 240, 255, 0.2); } to { opacity: 1; text-shadow: 0 0 25px rgba(0, 240, 255, 0.6); } }

        /* --- STAGE 2: LOGIN --- */
        .input-group { display: flex; flex-direction: column; gap: 20px; width: 80%; max-width: 350px; }
        .cyber-input {
            background: transparent; border: none; border-bottom: 2px solid var(--cyan);
            padding: 15px 5px; color: var(--cyan); font-size: 1.2rem; text-align: center;
            outline: none; font-family: var(--font-display); text-transform: uppercase; letter-spacing: 3px;
        }
        .cyber-input::placeholder { color: rgba(0, 240, 255, 0.3); font-family: var(--font-ui); letter-spacing: 1px; font-size: 0.9rem;}
        
        .cyber-btn {
            background: #000; color: var(--cyan); border: 1px solid var(--cyan);
            padding: 18px; font-family: var(--font-ui); font-weight: 800; font-size: 1rem;
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            transition: all 0.2s; position: relative;
        }
        .cyber-btn:active { background: var(--cyan); color: #000; box-shadow: 0 0 20px var(--cyan); }
        .pwa-btn {
            background: transparent; color: rgba(255,255,255,0.5); border: none; font-size: 0.75rem;
            margin-top: 40px; cursor: pointer; letter-spacing: 2px; text-decoration: underline; text-underline-offset: 4px;
            display: none;
        }
        #btn-continue { display: none; }

        /* --- STAGE 3: CORE GAMEPLAY --- */
        #game-ui { flex: 1; display: flex; flex-direction: column; opacity: 0; transition: opacity 0.8s ease; z-index: 10; height: 100%; }
        
        /* Header HUD (10%) */
        .hud-header {
            height: 10%; background: #000; border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px; flex-shrink: 0;
        }
        .hud-item { font-family: var(--font-display); font-size: clamp(0.7rem, 3vw, 1rem); display: flex; align-items: center; gap: 8px;}
        .hud-val { color: var(--cyan); }
        .danger-blink { color: var(--red) !important; animation: blinkFast 0.3s infinite alternate; text-shadow: 0 0 10px var(--red); }
        @keyframes blinkFast { from { opacity: 1; } to { opacity: 0.3; } }
        .btn-exit { color: var(--red); border: 1px solid var(--red); background: transparent; padding: 5px 10px; cursor: pointer; font-family: var(--font-display); font-weight: 900; transition: 0.2s;}
        .btn-exit:active { background: var(--red); color: #000;}

        /* Grid Wrapper (75%) */
        #board-wrapper { position: relative; height: 75%; display: flex; justify-content: center; align-items: center; padding: 15px; }
        #grid { display: grid; gap: 4px; z-index: 20; max-width: 100%; max-height: 100%; }
        
        /* Brutalist Tiles */
        .tile {
            background: var(--tile-bg); border: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: center; align-items: center; border-radius: 0; /* Strict squares */
            cursor: pointer; transition: all 0.1s ease; aspect-ratio: 1/1; box-shadow: 4px 4px 0px rgba(0,0,0,0.8);
        }
        .tile:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px rgba(0,0,0,0.8); }
        .tile.selected { border: 2px solid var(--cyan); box-shadow: 0 0 15px inset rgba(0, 240, 255, 0.2); }
        .tile.matched { opacity: 0; transform: scale(0); pointer-events: none; transition: 0.3s ease-out; }
        
        /* Laser Line */
        #svg-layer { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .laser-line {
            fill: none; stroke: var(--green); stroke-width: 3; stroke-linecap: square; stroke-linejoin: miter;
            filter: drop-shadow(0 0 8px var(--green)); stroke-dasharray: 2000; stroke-dashoffset: 2000;
            animation: shootLaser 0.2s linear forwards;
        }
        @keyframes shootLaser { to { stroke-dashoffset: 0; } }

        /* Floating Score */
        .float-score {
            position: absolute; color: var(--green); font-weight: 900; font-size: 1.2rem;
            text-shadow: 0 0 10px var(--green); pointer-events: none; z-index: 200; font-family: var(--font-display);
            animation: floatUp 0.6s ease-out forwards;
        }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-40px); } }

        /* Footer Deck (15%) */
        .hud-footer {
            height: 15%; background: #000; border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px; flex-shrink: 0;
        }
        .combo-active { color: #FFD700 !important; text-shadow: 0 0 10px #FFD700; font-size: 1.1em;}
        .btn-shuffle {
            background: transparent; color: var(--text-main); border: 1px solid var(--text-main);
            padding: 12px 15px; font-family: var(--font-ui); font-size: 0.75rem; font-weight: 800;
            text-transform: uppercase; cursor: pointer; transition: 0.2s;
        }
        .btn-shuffle:active { background: var(--text-main); color: #000; }

        /* --- STAGE 4: LOCKDOWN --- */
        #lockdown-screen { background: #050000; } /* very dark red tint */
        .lock-title { font-family: var(--font-display); font-size: 2.5rem; color: var(--red); text-shadow: 0 0 20px var(--red); letter-spacing: 5px; margin-bottom: 10px; text-align: center;}
        .lock-desc { font-family: var(--font-ui); color: var(--text-main); font-size: 0.85rem; max-width: 80%; text-align: center; margin-bottom: 30px; letter-spacing: 1px; line-height: 1.5;}
        
        .math-problem { font-family: var(--font-display); font-size: 3rem; color: #fff; margin-bottom: 10px; letter-spacing: 4px; }
        .math-input { font-family: var(--font-display); font-size: 2rem; color: var(--cyan); height: 50px; border-bottom: 2px solid var(--cyan); min-width: 100px; text-align: center; margin-bottom: 30px; letter-spacing: 5px;}
        .math-error { color: var(--red); border-color: var(--red); }

        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 85%; max-width: 320px; }
        .num-btn {
            background: #000; border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 20px;
            font-family: var(--font-display); font-size: 1.2rem; cursor: pointer; transition: 0.1s;
        }
        .num-btn:active { background: #fff; color: #000; }
        .num-btn.del { color: var(--red); border-color: var(--red); }
        .num-btn.ok { color: var(--green); border-color: var(--green); }

        /* --- STAGE 5: LEVEL UP & GAME OVER --- */
        .overlay-center {
            position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 500;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .overlay-center.show { opacity: 1; pointer-events: all; }
        
        .lvl-title { font-family: var(--font-display); font-size: 2.5rem; color: var(--cyan); letter-spacing: 4px; margin-bottom: 20px; }
        .loading-text { font-family: var(--font-ui); font-size: 0.8rem; color: #aaa; letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase;}
        .loading-bar-wrap { width: 250px; height: 4px; background: #222; border: 1px solid #444; }
        .loading-bar { height: 100%; width: 0%; background: var(--cyan); box-shadow: 0 0 10px var(--cyan); transition: width 1.5s linear; }

        .go-title { font-family: var(--font-display); font-size: 3rem; color: #fff; letter-spacing: 5px; margin-bottom: 10px; }
        .go-score { font-family: var(--font-display); font-size: 2rem; color: var(--cyan); margin-bottom: 40px; }
        
        /* Flashing error for grid */
        .bg-flash-red { animation: flashRed 0.3s; }
        @keyframes flashRed { 0% { background-color: var(--bg-deep); } 50% { background-color: #300; } 100% { background-color: var(--bg-deep); } }
    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="logo">XOL<span style="display:inline-block; transform:scaleX(-1);">E</span>RI<span style="display:inline-block; transform:scaleX(-1);">C</span></div>
        <div class="input-group">
            <input type="text" id="player-name" class="cyber-input" placeholder="[ OPERATOR ID KIRITING ]" autocomplete="off" spellcheck="false">
            <button class="cyber-btn" onclick="startNewGame()">TIZIMNI ISHGA TUSHIRISH</button>
            <button class="cyber-btn" id="btn-continue" onclick="continueGame()">SEANSI DAVOM ETTIRISH</button>
        </div>
        <button class="pwa-btn" id="btn-install" onclick="installPWA()">[ TIZIMNI QURILMAGA O'RNATISH ]</button>
    </div>

    <div id="lockdown-screen" class="screen hidden">
        <div class="lock-title">TIZIM BLOKLANDI</div>
        <div class="lock-desc">Xavfsizlik protokoli ishga tushdi. Blokni ochish uchun tenglamani yeching:</div>
        
        <div class="math-problem" id="math-q">45 + 12 = ?</div>
        <div class="math-input" id="math-ans">_</div>

        <div class="numpad">
            <button class="num-btn" onclick="typeNumpad(1)">1</button>
            <button class="num-btn" onclick="typeNumpad(2)">2</button>
            <button class="num-btn" onclick="typeNumpad(3)">3</button>
            <button class="num-btn" onclick="typeNumpad(4)">4</button>
            <button class="num-btn" onclick="typeNumpad(5)">5</button>
            <button class="num-btn" onclick="typeNumpad(6)">6</button>
            <button class="num-btn" onclick="typeNumpad(7)">7</button>
            <button class="num-btn" onclick="typeNumpad(8)">8</button>
            <button class="num-btn" onclick="typeNumpad(9)">9</button>
            <button class="num-btn del" onclick="delNumpad()">DEL</button>
            <button class="num-btn" onclick="typeNumpad(0)">0</button>
            <button class="num-btn ok" onclick="checkMath()">OK</button>
        </div>
    </div>

    <div id="gameover-screen" class="screen hidden">
        <div class="go-title">SEANS YAKUNLANDI</div>
        <div class="go-score">YAKUNIY HISOB: <span id="final-score">0</span></div>
        <button class="cyber-btn" onclick="resetToLogin()" style="width: 250px;">YANGI SEANS BOSHLASH</button>
    </div>

    <div id="game-ui">
        
        <div class="hud-header">
            <div class="hud-item">DARAJA: <span class="hud-val" id="lvl-display">01</span></div>
            <div class="hud-item">XATOLAR: <span class="hud-val" id="mistake-display">00 / 10</span></div>
            <div class="hud-item" style="gap:15px;">
                <span>HISOB: <span class="hud-val" id="score-display">00000</span></span>
                <button class="btn-exit" onclick="triggerExit()">[X]</button>
            </div>
        </div>

        <div id="board-wrapper">
            <div id="grid"></div>
            <svg id="svg-layer"></svg>
            
            <div id="levelup-screen" class="overlay-center">
                <div class="lvl-title">DARAJA TOZALANDI</div>
                <div class="loading-text">KEYINGI QATLAM YUKLANMOQDA...</div>
                <div class="loading-bar-wrap"><div class="loading-bar" id="load-bar"></div></div>
            </div>
        </div>

        <div class="hud-footer">
            <div class="hud-item" style="font-family: var(--font-ui); font-size: 0.8rem; text-transform: uppercase;">
                OPERATOR: <span class="hud-val" id="user-display" style="color: #fff; font-weight:800; margin-left: 5px;">GUEST</span>
            </div>
            <div class="hud-item">KOMBO: <span class="hud-val" id="combo-display">x1</span></div>
            <button class="btn-shuffle" onclick="handleShuffle()">[ ARALASHTIRISH -100 ]</button>
        </div>
    </div>

    <script>
        // PWA logic
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            document.getElementById('btn-install').style.display = 'block';
        });
        function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => {
                    document.getElementById('btn-install').style.display = 'none';
                    deferredPrompt = null;
                });
            }
        }
        if ('serviceWorker' in navigator) {
            const swCode = `self.addEventListener('fetch', (e) => { e.respondWith(fetch(e.request).catch(() => new Response('Oflayn'))); });`;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
        }

        // Hardcore Emoji DB
        const EMOJI_DB = [
            "🍎","🍅","🍒","🍓","🍉","🍊","🍋","🍌","🍏","🍐","🍑","🥭","🍍","🥥","🥝",
            "🍔","🥪","🌭","🍕","🍟","🌮","🌯","🥩","🍗","🍖","🍘","🍙","🍚","🍛","🍜",
            "🚗","🚕","🚙","🚌","🚎","🏎️","🚓","🚑","🚒","🚐","🛻","🚚","🚛","🚜","🛵",
            "⚽","🏀","🏈","⚾","🥎","🎾","🏐","🏉","🎱","🪀","🏓","🏸","🏒","🏑","🥍",
            "😀","😃","😄","😁","😆","😅","🤣","😂","🙂","🙃","😉","😊","😇","🥰","😍",
            "🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐻‍❄️","🐨","🐯","🦁","🐮","🐷","🐸",
            "❤️","🤍","🖤","🤍","🖤","🤍","🖤","🤍","🖤","🤍","🖤","🤍","🖤","🤍","🖤",
            "🌟","⭐","✨","💫","🌠","🪐","🌍","🌎","🌏","🌑","🌒","🌓","🌔","🌕","🌖",
            "⌚","📱","💻","⌨️","🖥️","🖨️","🖱️","🖲️","🕹️","🗜️","💽","💾","💿","📀","📼"
        ];

        let gameState = { level: 1, score: 0, mistakes: 0, rows: 0, cols: 0, grid: [], playerName: "", isLocked: false, mathTask: null };
        let combo = 1; let comboTimeout; let isProcessing = false; let typedAnswer = "";

        // Elements
        const els = {
            grid: document.getElementById('grid'), svg: document.getElementById('svg-layer'),
            lvl: document.getElementById('lvl-display'), score: document.getElementById('score-display'),
            combo: document.getElementById('combo-display'), mistake: document.getElementById('mistake-display'),
            login: document.getElementById('login-screen'), locked: document.getElementById('lockdown-screen'),
            gameUI: document.getElementById('game-ui'), levelup: document.getElementById('levelup-screen'),
            gameover: document.getElementById('gameover-screen'), loadBar: document.getElementById('load-bar'),
            btnCont: document.getElementById('btn-continue'), nameInp: document.getElementById('player-name'),
            userDisp: document.getElementById('user-display'), finalScore: document.getElementById('final-score'),
            boardWrap: document.getElementById('board-wrapper'), mathQ: document.getElementById('math-q'), mathAns: document.getElementById('math-ans')
        };

        // Boot
        window.onload = () => {
            const saved = localStorage.getItem('xoleric_ult');
            if (saved) {
                const data = JSON.parse(saved);
                if(data.isLocked) { gameState = data; showLockdown(); }
                else { els.btnCont.style.display = 'block'; els.nameInp.value = data.playerName; }
            }
        };

        function saveGame() { localStorage.setItem('xoleric_ult', JSON.stringify(gameState)); }
        function clearSave() { localStorage.removeItem('xoleric_ult'); els.btnCont.style.display = 'none'; }

        window.startNewGame = function() {
            try { document.documentElement.requestFullscreen(); } catch(e){}
            gameState.playerName = els.nameInp.value.trim().toUpperCase() || "OPERATOR_01";
            gameState.level = 1; gameState.score = 0; gameState.mistakes = 0; gameState.isLocked = false;
            combo = 1;
            transitionToGame();
            setupLevel();
        };

        window.continueGame = function() {
            try { document.documentElement.requestFullscreen(); } catch(e){}
            const saved = JSON.parse(localStorage.getItem('xoleric_ult'));
            if(saved && !saved.isLocked) {
                gameState = saved; gameState.selected = null; isProcessing = false;
                transitionToGame(); renderGrid(); updateStats();
            }
        };

        function transitionToGame() {
            els.login.classList.add('hidden');
            els.userDisp.innerText = gameState.playerName;
            setTimeout(() => { els.gameUI.style.opacity = '1'; }, 200);
        }

        // Stats Update
        function pad(num, size) { let s = num+""; while (s.length < size) s = "0" + s; return s; }
        
        function updateStats() {
            els.lvl.innerText = pad(gameState.level, 2);
            els.score.innerText = pad(gameState.score, 5);
            els.mistake.innerText = `${pad(gameState.mistakes, 2)} / 10`;
            els.combo.innerText = `x${combo}`;
            
            if(gameState.mistakes >= 8) els.mistake.classList.add('danger-blink');
            else els.mistake.classList.remove('danger-blink');

            if(combo > 1) els.combo.classList.add('combo-active');
            else els.combo.classList.remove('combo-active');
        }

        // Level Setup
        function setupLevel() {
            let baseRows = 8; let baseCols = window.innerWidth > 600 ? 10 : 6;
            gameState.rows = Math.min(baseRows + Math.floor(gameState.level), 14);
            gameState.cols = Math.min(baseCols + Math.floor((gameState.level - 1) / 2), 10);
            if ((gameState.rows * gameState.cols) % 2 !== 0) gameState.rows++;

            generateData(); renderGrid(); updateStats(); saveGame();
        }

        function generateData() {
            const total = gameState.rows * gameState.cols;
            let shuffledDB = [...EMOJI_DB].sort(() => Math.random() - 0.5);
            let pool = [];
            for (let i = 0; i < total / 2; i++) pool.push(shuffledDB[i % shuffledDB.length]);
            let items = [...pool, ...pool].sort(() => Math.random() - 0.5);
            gameState.grid = Array.from({length: gameState.rows + 2}, () => new Array(gameState.cols + 2).fill(null));
            let idx = 0;
            for (let r = 1; r <= gameState.rows; r++) { for (let c = 1; c <= gameState.cols; c++) gameState.grid[r][c] = items[idx++]; }
        }

        function renderGrid() {
            els.grid.style.gridTemplateColumns = `repeat(${gameState.cols}, 1fr)`;
            els.grid.style.gridTemplateRows = `repeat(${gameState.rows}, 1fr)`;
            els.grid.innerHTML = '';
            for (let r = 1; r <= gameState.rows; r++) {
                for (let c = 1; c <= gameState.cols; c++) {
                    const tile = document.createElement('div'); tile.className = 'tile';
                    const val = gameState.grid[r][c];
                    if (val) {
                        tile.innerText = val; tile.style.fontSize = `min(8vw, 4vh, 35px)`;
                        tile.onclick = () => handleTileClick(r, c, tile);
                    } else { tile.classList.add('matched'); }
                    tile.id = `t-${r}-${c}`; els.grid.appendChild(tile);
                }
            }
            els.svg.innerHTML = '';
        }

        // Gameplay Mechanics
        function handleTileClick(r, c, el) {
            if (isProcessing) return;
            if (gameState.selected) {
                const {r: sr, c: sc} = gameState.selected; const prevEl = document.getElementById(`t-${sr}-${sc}`);
                if (sr === r && sc === c) { el.classList.remove('selected'); gameState.selected = null; return; }
                
                if (gameState.grid[r][c] === gameState.grid[sr][sc]) {
                    const path = findLink(sr, sc, r, c);
                    if (path) { isProcessing = true; executeMatch(gameState.selected, {r, c}, path); return; } 
                    else { registerMistake(prevEl); }
                } else { registerMistake(prevEl); }
                
                prevEl.classList.remove('selected'); gameState.selected = null; 
            } else { gameState.selected = {r, c}; el.classList.add('selected'); }
        }

        function registerMistake(prevEl) {
            gameState.mistakes++; updateStats();
            document.body.classList.add('bg-flash-red');
            setTimeout(() => document.body.classList.remove('bg-flash-red'), 300);
            combo = 1; updateStats(); saveGame();
            if(gameState.mistakes >= 10) setTimeout(triggerLockdown, 400);
        }

        function findLink(r1, c1, r2, c2) {
            const queue = [{r: r1, c: c1, dir: -1, turns: 0, path: [[r1, c1]]}]; const visited = new Set();
            while (queue.length > 0) {
                const curr = queue.shift();
                if (curr.turns > 2) continue;
                if (curr.r === r2 && curr.c === c2) return curr.path;
                const dirs = [[-1,0], [1,0], [0,-1], [0,1]];
                for (let i = 0; i < 4; i++) {
                    const nr = curr.r + dirs[i][0]; const nc = curr.c + dirs[i][1];
                    if (nr >= 0 && nr < gameState.rows + 2 && nc >= 0 && nc < gameState.cols + 2) {
                        if (gameState.grid[nr][nc] === null || (nr === r2 && nc === c2)) {
                            const nt = (curr.dir !== -1 && curr.dir !== i) ? curr.turns + 1 : curr.turns;
                            const key = `${nr},${nc},${i},${nt}`;
                            if (!visited.has(key)) { visited.add(key); queue.push({r: nr, c: nc, dir: i, turns: nt, path: [...curr.path, [nr, nc]]}); }
                        }
                    }
                }
            } return null;
        }

        function executeMatch(p1, p2, path) {
            drawPath(path); clearTimeout(comboTimeout);
            let earnedScore = 150 * combo; gameState.score += earnedScore;
            showFloatingScore(`+${earnedScore}`, p2.r, p2.c);
            combo++; updateStats();
            comboTimeout = setTimeout(() => { combo = 1; updateStats(); }, 3000); 

            setTimeout(() => {
                gameState.grid[p1.r][p1.c] = null; gameState.grid[p2.r][p2.c] = null;
                const t1 = document.getElementById(`t-${p1.r}-${p1.c}`); const t2 = document.getElementById(`t-${p2.r}-${p2.c}`);
                t1.classList.remove('selected'); t2.classList.remove('selected');
                t1.classList.add('matched'); t2.classList.add('matched');
                saveGame(); setTimeout(() => { els.svg.innerHTML = ''; }, 100);
                gameState.selected = null; isProcessing = false; checkWin();
            }, 100);
        }

        function showFloatingScore(text, r, c) {
            const tile = document.getElementById(`t-${r}-${c}`); if(!tile) return;
            const rect = tile.getBoundingClientRect(); const wrapperRect = els.boardWrap.getBoundingClientRect();
            const pop = document.createElement('div'); pop.className = 'float-score'; pop.innerText = text;
            pop.style.left = `${rect.left - wrapperRect.left + (rect.width/2) - 20}px`; pop.style.top = `${rect.top - wrapperRect.top}px`;
            els.boardWrap.appendChild(pop); setTimeout(() => pop.remove(), 600);
        }

        function drawPath(path) {
            const wrapperRect = els.svg.getBoundingClientRect(); const gridRect = els.grid.getBoundingClientRect();
            const cellW = gridRect.width / gameState.cols; const cellH = gridRect.height / gameState.rows;
            const offsetX = gridRect.left - wrapperRect.left; const offsetY = gridRect.top - wrapperRect.top;
            const points = path.map(p => `${offsetX + (p[1] - 0.5) * cellW},${offsetY + (p[0] - 0.5) * cellH}`).join(' ');
            const polyline = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
            polyline.setAttribute("points", points); polyline.setAttribute("class", "laser-line");
            els.svg.appendChild(polyline);
        }

        // Win, Shuffle, Exit
        function checkWin() {
            if (!gameState.grid.flat().some(cell => cell !== null)) {
                gameState.level++; saveGame(); 
                els.levelup.classList.add('show');
                els.loadBar.style.width = '100%';
                setTimeout(() => { 
                    els.levelup.classList.remove('show'); 
                    els.loadBar.style.width = '0%';
                    setupLevel(); 
                }, 2000);
            }
        }

        window.handleShuffle = function() {
            if(isProcessing) return;
            let active = [];
            for(let r=1; r<=gameState.rows; r++) { for(let c=1; c<=gameState.cols; c++) if(gameState.grid[r][c] !== null) active.push(gameState.grid[r][c]); }
            active.sort(() => Math.random() - 0.5);
            let idx = 0;
            for(let r=1; r<=gameState.rows; r++) { for(let c=1; c<=gameState.cols; c++) if(gameState.grid[r][c] !== null) gameState.grid[r][c] = active[idx++]; }
            gameState.score = Math.max(0, gameState.score - 100); combo = 1; updateStats(); saveGame(); renderGrid(); gameState.selected = null;
        };

        window.triggerExit = function() {
            els.finalScore.innerText = pad(gameState.score, 5);
            els.gameUI.style.opacity = '0';
            setTimeout(() => { els.gameover.classList.remove('hidden'); clearSave(); }, 500);
        };

        window.resetToLogin = function() {
            els.gameover.classList.add('hidden');
            els.login.classList.remove('hidden');
            els.nameInp.value = "";
        };

        // --- STAGE 4: LOCKDOWN MATH ---
        function triggerLockdown() {
            gameState.isLocked = true; 
            const ops = ['+', '-', '*']; const op = ops[Math.floor(Math.random() * ops.length)];
            let a, b, ans;
            if (op === '+') { a = Math.floor(Math.random()*80)+20; b = Math.floor(Math.random()*80)+20; ans = a+b; }
            else if (op === '-') { a = Math.floor(Math.random()*80)+40; b = Math.floor(Math.random()*39)+1; ans = a-b; }
            else { a = Math.floor(Math.random()*12)+3; b = Math.floor(Math.random()*12)+3; ans = a*b; }
            gameState.mathTask = { q: `${a} ${op} ${b} = ?`, a: ans };
            saveGame(); showLockdown();
        }

        function showLockdown() {
            els.gameUI.style.opacity = '0'; els.login.classList.add('hidden'); els.locked.classList.remove('hidden');
            els.mathQ.innerText = gameState.mathTask.q; typedAnswer = ""; updateMath();
        }

        window.typeNumpad = function(n) { if(typedAnswer.length < 5) { typedAnswer += n; updateMath(); } };
        window.delNumpad = function() { typedAnswer = typedAnswer.slice(0, -1); updateMath(); };
        function updateMath() { els.mathAns.innerText = typedAnswer || "_"; }

        window.checkMath = function() {
            if (parseInt(typedAnswer) === gameState.mathTask.a) {
                // RUXSAT BERILDI
                els.mathAns.style.color = 'var(--green)'; els.mathAns.style.borderColor = 'var(--green)'; els.mathAns.innerText = "RUXSAT BERILDI";
                setTimeout(() => {
                    gameState.isLocked = false; gameState.mathTask = null; gameState.mistakes = 0; gameState.score = 0; gameState.level = 1;
                    els.mathAns.style.color = 'var(--cyan)'; els.mathAns.style.borderColor = 'var(--cyan)';
                    saveGame(); els.locked.classList.add('hidden'); els.gameUI.style.opacity = '1'; setupLevel();
                }, 1000);
            } else {
                els.mathAns.classList.add('math-error'); els.mathAns.innerText = "XATO";
                setTimeout(() => { typedAnswer = ""; updateMath(); els.mathAns.classList.remove('math-error'); }, 500);
            }
        };
    </script>
</body>
