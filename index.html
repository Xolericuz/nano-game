<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Xoleric PRO</title>
    <link rel="manifest" id="manifest-link">
    <style>
        :root {
            /* Premium Minimalist Colors */
            --bg-color: #000000;
            --surface-color: #0d0d0d;
            --accent-yellow: #FFD700;
            --accent-blue: #00A8FF;
            --text-white: #FFFFFF;
            --text-grey: #888888;
            --border-color: #222222;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            width: 100vw;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
            overscroll-behavior: none; /* Scrollni bloklash */
        }

        /* --- Xoleric Logo --- */
        .logo-text {
            font-size: 3.5rem;
            color: var(--text-white);
            letter-spacing: 8px;
            font-weight: 800;
            margin-bottom: 40px;
            text-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);
        }

        .rev-letter {
            display: inline-block;
            transform: scaleX(-1);
            color: var(--accent-yellow);
        }

        /* --- Screens --- */
        .screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--bg-color);
            z-index: 200;
            transition: opacity 0.4s ease;
        }

        #game-screen {
            display: none;
            z-index: 100;
        }

        /* --- Inputs & Buttons --- */
        input {
            width: 85%;
            max-width: 320px;
            padding: 18px 20px;
            margin-bottom: 30px;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            color: var(--text-white);
            font-size: 1.1rem;
            outline: none;
            text-align: center;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 15px rgba(0, 168, 255, 0.2);
        }

        .btn-premium {
            background: var(--text-white);
            color: var(--bg-color);
            border: none;
            padding: 16px 45px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            width: 85%;
            max-width: 320px;
        }

        .btn-premium:active {
            transform: scale(0.95);
            background: var(--accent-yellow);
        }

        #welcome-text {
            font-size: 1.2rem;
            color: var(--text-grey);
            margin-bottom: 20px;
            display: none;
        }

        /* --- Game Board Area --- */
        #board-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 5px;
            width: 100%;
        }

        #board {
            display: grid;
            gap: 3px;
            position: relative;
            z-index: 2;
        }

        .tile {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.3s;
            position: relative;
            overflow: hidden;
        }

        .tile:active {
            transform: scale(0.85);
        }

        .tile.selected {
            background: rgba(0, 168, 255, 0.15);
            border-color: var(--accent-blue);
            transform: scale(1.05);
            z-index: 5;
            box-shadow: 0 0 15px rgba(0, 168, 255, 0.4);
        }

        .tile.error {
            background: rgba(255, 59, 48, 0.15);
            border-color: #FF3B30;
            animation: shake 0.3s;
        }

        .tile.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Path Animation */
        #svg-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        
        .path-line {
            stroke-dasharray: 15;
            animation: dash 0.4s linear forwards;
        }
        
        @keyframes dash {
            to { stroke-dashoffset: -30; }
        }

        /* --- Minimalist Bottom Panel --- */
        #bottom-panel {
            height: 70px;
            background: var(--surface-color);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            padding-bottom: env(safe-area-inset-bottom); /* iOS uchun */
            flex-shrink: 0;
            z-index: 10;
        }

        .panel-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .stat {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 0.65rem;
            color: var(--text-grey);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.1rem;
            color: var(--text-white);
            font-weight: 700;
        }

        .stat-value.yellow { color: var(--accent-yellow); }
        .stat-value.blue { color: var(--accent-blue); }

        .btn-action {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-white);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-action:active {
            background: var(--text-white);
            color: var(--bg-color);
        }

    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <h1 class="logo-text">XOL<span class="rev-letter">E</span>RI<span class="rev-letter">C</span></h1>
        
        <div id="welcome-text">Salom, <span id="saved-name-display" style="color: var(--text-white); font-weight: bold;"></span>!</div>
        
        <input type="text" id="player-input" placeholder="Ismingizni kiriting..." autocomplete="off">
        <button class="btn-premium" id="start-btn" onclick="initGameFlow()">Boshlash</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="board-wrapper">
            <div id="board"></div>
            <svg id="svg-layer"></svg>
        </div>

        <div id="bottom-panel">
            <div class="panel-group">
                <div class="stat">
                    <span class="stat-label">O'yinchi</span>
                    <span class="stat-value" id="ui-name">User</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Ball</span>
                    <span class="stat-value yellow" id="ui-score">0</span>
                </div>
            </div>

            <div class="panel-group" style="justify-content: center; flex: 1; text-align: center;">
                <div class="stat" style="align-items: center;">
                    <span class="stat-label">Bosqich</span>
                    <span class="stat-value blue" id="ui-level">1</span>
                </div>
            </div>

            <div class="panel-group">
                <div class="stat" style="align-items: flex-end;">
                    <span class="stat-label">Yordam</span>
                    <span class="stat-value" id="ui-shuffle">3</span>
                </div>
                <button class="btn-action" onclick="shuffleBoard()">⟳</button>
            </div>
        </div>
    </div>

    <script>
        // --- Fullscreen API Lock ---
        function enforceFullscreen() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                const elem = document.documentElement;
                if (elem.requestFullscreen) {
                    elem.requestFullscreen().catch(() => {});
                } else if (elem.webkitRequestFullscreen) {
                    elem.webkitRequestFullscreen().catch(() => {});
                }
            }
        }
        
        // Ekranning istalgan joyiga bosilganda fullscreen rejimini faollashtirish
        document.body.addEventListener('click', enforceFullscreen);
        document.body.addEventListener('touchstart', enforceFullscreen);

        // --- Data Persistence ---
        let gameState = {
            name: '',
            level: 1,
            score: 0,
            shuffles: 3
        };

        function loadSavedData() {
            const saved = localStorage.getItem('xoleric_pro_data');
            if (saved) {
                gameState = JSON.parse(saved);
                document.getElementById('player-input').style.display = 'none';
                document.getElementById('welcome-text').style.display = 'block';
                document.getElementById('saved-name-display').innerText = gameState.name;
                document.getElementById('start-btn').innerText = 'Davom etish';
            }
        }

        function saveData() {
            localStorage.setItem('xoleric_pro_data', JSON.stringify(gameState));
        }

        // --- Init Game ---
        window.onload = loadSavedData;

        function initGameFlow() {
            if (!gameState.name) {
                const input = document.getElementById('player-input').value.trim();
                if (!input) {
                    document.getElementById('player-input').style.borderColor = '#FF3B30';
                    setTimeout(() => document.getElementById('player-input').style.borderColor = 'var(--border-color)', 500);
                    return;
                }
                gameState.name = input;
                saveData();
            }

            enforceFullscreen();
            
            document.getElementById('login-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'flex';
                updateUI();
                startLevel();
            }, 400);
        }

        // --- UI Updates ---
        function updateUI() {
            document.getElementById('ui-name').innerText = gameState.name;
            document.getElementById('ui-score').innerText = gameState.score;
            document.getElementById('ui-level').innerText = gameState.level;
            document.getElementById('ui-shuffle').innerText = gameState.shuffles;
            saveData();
        }

        // --- Kengaytirilgan Emojilar ---
        const emojis = [
            "💎","👑","🚀","🛸","🌌","🌍","🪐","☄️","⚡️","🔥","💧","❄️","🌪","🌈","🌊",
            "🍎","🥝","🥑","🍒","🍔","🍕","🍣","🍿","🍩","☕️","🍹","⚽️","🏀","🎱","🎮",
            "🎲","🎯","🧩","🎭","🎨","🎸","🥁","🎧","🎤","🎬","📸","🧭","🕰","💡","💎",
            "🛡","⚔️","🗝","🧸","🔮","🧿","🧬","🦠","🔭","🔬","⚖️","🧲","💣","🧨","💰",
            "🐼","🦊","🦁","🐸","🐙","🦋","🦖","🦄","🐉","🦂","🕸","🦉","🦇","🐺","🐍"
        ];

        let board = [];
        let rows = 0, cols = 0;
        let tileSize = 0;
        let selectedTile = null;
        let pairsRemaining = 0;

        const levelConfigs = [
            { r: 6, c: 6 }, { r: 6, c: 8 }, { r: 8, c: 8 }, { r: 8, c: 10 }, { r: 10, c: 10 },
            { r: 10, c: 12 }, { r: 12, c: 12 }, { r: 12, c: 14 }, { r: 14, c: 14 }, { r: 16, c: 14 }
        ];

        function startLevel() {
            let configIdx = Math.min(gameState.level - 1, levelConfigs.length - 1);
            rows = levelConfigs[configIdx].r;
            cols = levelConfigs[configIdx].c;
            
            const totalTiles = rows * cols;
            pairsRemaining = totalTiles / 2;
            let items = [];
            
            let pool = [...emojis].sort(() => Math.random() - 0.5);
            let needed = [];
            
            while(needed.length < pairsRemaining) {
                needed = needed.concat(pool);
            }
            needed = needed.slice(0, pairsRemaining);
            
            for (let i = 0; i < pairsRemaining; i++) {
                items.push(needed[i], needed[i]); 
            }
            items.sort(() => Math.random() - 0.5); 
            
            board = Array(rows + 2).fill().map(() => Array(cols + 2).fill(0));
            
            let itemIndex = 0;
            for (let r = 1; r <= rows; r++) {
                for (let c = 1; c <= cols; c++) {
                    board[r][c] = items[itemIndex++];
                }
            }
            renderBoard();
        }

        function renderBoard() {
            const wrapper = document.getElementById('board-wrapper');
            const boardEl = document.getElementById('board');
            
            // Panellar o'lchamiga moslashuv
            const maxW = wrapper.clientWidth - 10;
            const maxH = wrapper.clientHeight - 10;
            
            tileSize = Math.floor(Math.min((maxW - (cols-1)*3) / cols, (maxH - (rows-1)*3) / rows));
            if (tileSize > 55) tileSize = 55;
            if (tileSize < 25) tileSize = 25; // Minimal o'lcham himoyasi
            
            boardEl.innerHTML = '';
            boardEl.style.gridTemplateColumns = `repeat(${cols}, ${tileSize}px)`;
            boardEl.style.gridTemplateRows = `repeat(${rows}, ${tileSize}px)`;

            for (let r = 1; r <= rows; r++) {
                for (let c = 1; c <= cols; c++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.style.width = `${tileSize}px`;
                    tile.style.height = `${tileSize}px`;
                    tile.style.fontSize = `${tileSize * 0.55}px`;
                    
                    if (board[r][c] === 0) {
                        tile.classList.add('hidden');
                    } else {
                        tile.innerText = board[r][c];
                        tile.onclick = (e) => {
                            e.stopPropagation();
                            onTileClick(tile, r, c);
                        };
                    }
                    boardEl.appendChild(tile);
                }
            }
            document.getElementById('svg-layer').innerHTML = '';
            selectedTile = null;
        }

        function shuffleBoard() {
            if (gameState.shuffles <= 0) return;
            gameState.shuffles--;
            updateUI();
            
            let currentItems = [];
            for (let r = 1; r <= rows; r++) {
                for (let c = 1; c <= cols; c++) {
                    if (board[r][c] !== 0) currentItems.push(board[r][c]);
                }
            }
            currentItems.sort(() => Math.random() - 0.5);
            
            let i = 0;
            for (let r = 1; r <= rows; r++) {
                for (let c = 1; c <= cols; c++) {
                    if (board[r][c] !== 0) board[r][c] = currentItems[i++];
                }
            }
            renderBoard();
        }

        function onTileClick(el, r, c) {
            if (board[r][c] === 0) return;

            if (!selectedTile) {
                selectedTile = { el, r, c };
                el.classList.add('selected');
            } else {
                if (selectedTile.r === r && selectedTile.c === c) {
                    selectedTile.el.classList.remove('selected');
                    selectedTile = null;
                    return;
                }

                if (board[selectedTile.r][selectedTile.c] === board[r][c]) {
                    let path = findPath({r: selectedTile.r, c: selectedTile.c}, {r, c});
                    if (path) {
                        drawPath(path);
                        let p1 = selectedTile;
                        
                        setTimeout(() => {
                            board[p1.r][p1.c] = 0;
                            board[r][c] = 0;
                            p1.el.classList.add('hidden');
                            p1.el.classList.remove('selected');
                            el.classList.add('hidden');
                            document.getElementById('svg-layer').innerHTML = ''; 
                            
                            gameState.score += 25;
                            pairsRemaining--;
                            updateUI();
                            
                            if (pairsRemaining === 0) {
                                gameState.level++;
                                gameState.shuffles += 2;
                                setTimeout(startLevel, 600); 
                            }
                        }, 250);
                    } else {
                        showError(selectedTile.el, el);
                    }
                } else {
                    showError(selectedTile.el, el);
                }
                selectedTile = null;
            }
        }

        function showError(t1, t2) {
            t1.classList.remove('selected');
            t1.classList.add('error');
            t2.classList.add('error');
            setTimeout(() => {
                t1.classList.remove('error');
                t2.classList.remove('error');
            }, 300);
        }

        // --- Pathfinding ---
        function findPath(start, end) {
            const queue = [{ r: start.r, c: start.c, path: [[start.r, start.c]], dir: -1, corners: 0 }];
            const visited = Array(rows + 2).fill().map(() => Array(cols + 2).fill().map(() => Array(4).fill(100)));
            const dr = [-1, 0, 1, 0];
            const dc = [0, 1, 0, -1];

            while (queue.length > 0) {
                let curr = queue.shift();
                if (curr.r === end.r && curr.c === end.c) return curr.path;

                for (let i = 0; i < 4; i++) {
                    let nr = curr.r + dr[i];
                    let nc = curr.c + dc[i];
                    let nextCorners = curr.corners + (curr.dir !== -1 && curr.dir !== i ? 1 : 0);

                    if (nr >= 0 && nr <= rows + 1 && nc >= 0 && nc <= cols + 1 && nextCorners <= 2) {
                        if (board[nr][nc] === 0 || (nr === end.r && nc === end.c)) {
                            if (nextCorners < visited[nr][nc][i]) {
                                visited[nr][nc][i] = nextCorners;
                                queue.push({
                                    r: nr, c: nc,
                                    path: [...curr.path, [nr, nc]],
                                    dir: i,
                                    corners: nextCorners
                                });
                            }
                        }
                    }
                }
            }
            return null;
        }

        function drawPath(path) {
            const svg = document.getElementById('svg-layer');
            const boardEl = document.getElementById('board');
            const rect = boardEl.getBoundingClientRect();
            
            const cellW = tileSize + 3; // Gap = 3px
            const cellH = tileSize + 3;
            
            let polyline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
            polyline.setAttribute('fill', 'none');
            polyline.setAttribute('stroke', 'var(--accent-blue)');
            polyline.setAttribute('stroke-width', '4');
            polyline.setAttribute('stroke-linejoin', 'round');
            polyline.setAttribute('stroke-linecap', 'round');
            polyline.setAttribute('filter', 'drop-shadow(0 0 5px var(--accent-blue))');
            polyline.classList.add('path-line');
            
            let points = "";
            path.forEach(p => {
                const x = rect.left + (p[1] - 0.5) * cellW;
                const y = rect.top + (p[0] - 0.5) * cellH;
                points += `${x},${y} `;
            });
            
            polyline.setAttribute('points', points.trim());
            svg.appendChild(polyline);
        }

        // --- PWA Setup ---
        const manifest = {
            name: "Xoleric PRO", short_name: "Xoleric",
            display: "fullscreen", orientation: "portrait",
            background_color: "#000000", theme_color: "#000000",
            icons: [{
                src: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iIzAwMDAwMCIvPjx0ZXh0IHg9IjUwIiB5PSI2NCIgZm9udC1zaXplPSI1MCIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZmlsbD0iI0ZGRDcwMCI+WDwvdGV4dD48L3N2Zz4=",
                sizes: "192x192", type: "image/svg+xml"
            }]
        };
        document.getElementById('manifest-link').href = URL.createObjectURL(new Blob([JSON.stringify(manifest)], {type: 'application/json'}));
        
        // Disable pinch zoom
        document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
        
        // Resize update
        window.addEventListener('resize', () => {
            if (document.getElementById('game-screen').style.display === 'flex') {
                renderBoard();
            }
        });
    </script>
</body>
</html>
