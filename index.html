<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>XOLƎRIƆ</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22XOL%C6%8ERI%C6%86%22%2C%22short_name%22%3A%22XOL%C6%8ERI%C6%86%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23000000%22%2C%22theme_color%22%3A%22%23000000%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fpng%3Bbase64%2CiVBORw0KGgoAAAANSUhEUgAAAEAAAABACAQAAAAAYLlVAAAAPElEQVR42u3OMQEAAAwCoPk3tY/mAwkg6yYqKioqKioqKioqKioqKioqKioqKioqKioqKioqKioqKio6Wwd7gAERjPXYAAAAAElFTkSuQmCC%22%2C%22sizes%22%3A%2264x64%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #000000;
            --glass: rgba(20, 20, 20, 0.65);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #00f0ff;
            --danger: #ff003c;
            --text-main: #ffffff;
            --text-dim: #888888;
        }
        body {
            background-color: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif;
            width: 100vw; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; position: fixed;
        }

        /* Time Bar */
        #time-container {
            width: 100%; height: 4px; background: rgba(255,255,255,0.05);
            position: absolute; top: 0; left: 0; z-index: 100;
        }
        #time-bar {
            height: 100%; width: 100%; background: var(--accent);
            box-shadow: 0 0 15px var(--accent); transition: width 0.1s linear, background-color 0.3s;
        }
        .time-warning { background: var(--danger) !important; box-shadow: 0 0 15px var(--danger) !important; }

        /* Login & Game Over Screens */
        .screen-overlay {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .screen-overlay.hidden { opacity: 0; transform: scale(1.05); pointer-events: none; }
        
        .logo {
            font-family: 'Orbitron', sans-serif; font-size: clamp(3rem, 12vw, 4.5rem);
            font-weight: 900; letter-spacing: 10px; margin-bottom: 40px; color: #fff;
            text-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
        }
        .input-group { display: flex; flex-direction: column; gap: 15px; width: 85%; max-width: 320px; }
        input {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            padding: 20px; border-radius: 16px; color: white; font-size: 1.1rem;
            text-align: center; outline: none; transition: 0.3s; font-family: 'Inter', sans-serif;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0,240,255,0.2); }
        .btn {
            background: #fff; color: #000; padding: 18px; border-radius: 16px;
            font-weight: 900; font-size: 1rem; border: none; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-outline { background: transparent; color: #fff; border: 1px solid var(--border); }
        #btn-continue { display: none; }

        /* Game UI */
        #game-ui {
            flex: 1; display: flex; flex-direction: column; opacity: 0;
            transition: opacity 0.8s ease 0.2s; z-index: 10; height: 100%; padding-top: 10px;
        }
        
        #board-wrapper {
            position: relative; flex: 1; display: flex;
            justify-content: center; align-items: center; padding: 10px;
        }
        #grid { display: grid; gap: 6px; z-index: 20; max-width: 100%; max-height: 100%; }
        
        .tile {
            background: #0a0a0a; border: 1px solid rgba(255,255,255,0.05);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            aspect-ratio: 1/1; box-shadow: inset 0 0 15px rgba(0,0,0,0.9);
        }
        .tile:active { transform: scale(0.85); }
        .tile.selected {
            background: rgba(0, 240, 255, 0.15); border: 1px solid var(--accent);
            transform: scale(1.1); box-shadow: 0 0 20px rgba(0,240,255,0.3); z-index: 30;
        }
        .tile.matched { opacity: 0; transform: scale(0); pointer-events: none; transition: 0.3s ease-out; }

        /* Dashboard */
        .dashboard {
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 24px;
            margin: 10px 15px 20px 15px; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            flex-shrink: 0; z-index: 50; box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }
        .stats-group { display: flex; gap: 20px; align-items: center; }
        .stat-item { display: flex; flex-direction: column; gap: 2px; }
        .stat-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }
        .stat-val { font-size: 1.2rem; font-weight: 900; color: #fff; font-family: 'Orbitron', sans-serif;}
        .combo-text { color: var(--accent); text-shadow: 0 0 10px var(--accent); animation: pulse 0.5s infinite alternate; }
        
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }

        /* SVG Line */
        #svg-layer { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .connection-line {
            fill: none; stroke: var(--accent); stroke-width: 5;
            stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(0 0 8px var(--accent));
            stroke-dasharray: 2000; stroke-dashoffset: 2000;
            animation: drawLine 0.2s ease-out forwards;
        }
        @keyframes drawLine { to { stroke-dashoffset: 0; } }

        /* Floating Score Animations */
        .floating-score {
            position: absolute; color: var(--accent); font-weight: 900; font-size: 1.2rem;
            text-shadow: 0 0 10px var(--accent); pointer-events: none; z-index: 200;
            animation: floatUp 0.8s ease-out forwards; font-family: 'Orbitron', sans-serif;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-40px) scale(1.2); }
        }

        /* Message Overlays */
        #msg-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            z-index: 500; display: flex; justify-content: center; align-items: center;
            font-size: 3rem; color: #fff; font-weight: 900; letter-spacing: 5px; opacity: 0;
            pointer-events: none; transition: 0.4s; font-family: 'Orbitron', sans-serif;
            text-align: center; flex-direction: column;
        }
        #msg-overlay.show { opacity: 1; }
        .msg-sub { font-size: 1rem; color: var(--accent); margin-top: 10px; font-family: 'Inter', sans-serif; letter-spacing: 2px;}
    </style>
</head>
<body>

    <div id="time-container"><div id="time-bar"></div></div>

    <div id="login-screen" class="screen-overlay">
        <div class="logo">XOL<span style="display:inline-block; transform:scaleX(-1);">E</span>RI<span style="display:inline-block; transform:scaleX(-1);">C</span></div>
        <div class="input-group">
            <input type="text" id="player-name" placeholder="IDENTIFIKATSIYA" autocomplete="off" spellcheck="false">
            <button class="btn" onclick="startNewGame()">Tizimga Kirish</button>
            <button class="btn btn-outline" id="btn-continue" onclick="continueGame()">Davom etish</button>
        </div>
    </div>

    <div id="game-over-screen" class="screen-overlay hidden">
        <div class="logo" style="color: var(--danger); text-shadow: 0 0 30px rgba(255,0,60,0.5);">TUGADI</div>
        <div style="color: #fff; font-size: 1.5rem; margin-bottom: 30px; font-weight: 900; font-family:'Orbitron', sans-serif;">
            HISOB: <span id="final-score" style="color: var(--accent);">0</span>
        </div>
        <div class="input-group">
            <button class="btn" onclick="restartGame()">Qaytadan Boshlash</button>
        </div>
    </div>

    <div id="game-ui">
        <div id="board-wrapper">
            <div id="grid"></div>
            <svg id="svg-layer"></svg>
            <div id="msg-overlay">
                <div id="msg-title">LEVEL UP</div>
                <div id="msg-sub" class="msg-sub">VAQT QO'SHILDI</div>
            </div>
        </div>

        <div class="dashboard">
            <div class="stats-group">
                <div class="stat-item">
                    <span class="stat-label">LVL</span>
                    <span class="stat-val" id="lvl-display">1</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">HISOB</span>
                    <span class="stat-val" id="score-display">0</span>
                </div>
                <div class="stat-item" style="margin-left: 10px;">
                    <span class="stat-label">KOMBO</span>
                    <span class="stat-val" id="combo-display">x1</span>
                </div>
            </div>
            <button class="btn btn-outline" style="padding: 10px 15px; font-size: 0.8rem; border-radius: 12px;" onclick="handleShuffle()">ARALASH</button>
        </div>
    </div>

    <script>
        // PWA Offline Support
        if ('serviceWorker' in navigator) {
            const swCode = `self.addEventListener('fetch', (e) => { e.respondWith(fetch(e.request).catch(() => new Response('Oflayn rejim'))); });`;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
        }

        // Hardcore Emoji DB (O'xshash ranglar va shakllar chalg'itish uchun guruhlangan)
        const EMOJI_DB = [
            "🍎","🍅","🍒","🍓","🍉","🍊","🍋","🍌","🍏","🍐","🍑","🥭","🍍","🥥","🥝",
            "🍔","🥪","🌭","🍕","🍟","🌮","🌯","🥩","🍗","🍖","🍘","🍙","🍚","🍛","🍜",
            "🚗","🚕","🚙","🚌","🚎","🏎️","🚓","🚑","🚒","🚐","🛻","🚚","🚛","🚜","🛵",
            "⚽","🏀","🏈","⚾","🥎","🎾","🏐","🏉","🎱","🪀","🏓","🏸","🏒","🏑","🥍",
            "😀","😃","😄","😁","😆","😅","🤣","😂","🙂","🙃","😉","😊","😇","🥰","😍",
            "🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐻‍❄️","🐨","🐯","🦁","🐮","🐷","🐸",
            "❤️","🧡","💛","💚","💙","💜","🖤","🤍","🤎","💔","❣️","💕","💞","💓","💗",
            "🌟","⭐","✨","💫","🌠","🪐","🌍","🌎","🌏","🌑","🌒","🌓","🌔","🌕","🌖",
            "🔴","🟠","🟡","🟢","🔵","🟣","⚫","⚪","🟤","🟥","🟧","🟨","🟩","🟦","🟪",
            "⌚","📱","💻","⌨️","🖥️","🖨️","🖱️","🖲️","🕹️","🗜️","💽","💾","💿","📀","📼"
        ];

        let gameState = { level: 1, score: 0, rows: 0, cols: 0, grid: [], selected: null, playerName: "" };
        
        // Timer & Combo variables
        let isPlaying = false;
        let maxTime = 100;
        let currentTime = 100;
        let timerInterval;
        let combo = 1;
        let comboTimeout;
        let isProcessing = false; // block clicks during animation

        const els = {
            grid: document.getElementById('grid'), svg: document.getElementById('svg-layer'),
            lvl: document.getElementById('lvl-display'), score: document.getElementById('score-display'),
            combo: document.getElementById('combo-display'), timeBar: document.getElementById('time-bar'),
            login: document.getElementById('login-screen'), gameOver: document.getElementById('game-over-screen'),
            gameUI: document.getElementById('game-ui'), overlay: document.getElementById('msg-overlay'),
            btnCont: document.getElementById('btn-continue'), nameInp: document.getElementById('player-name'),
            finalScore: document.getElementById('final-score'), boardWrap: document.getElementById('board-wrapper')
        };

        window.onload = () => {
            const saved = localStorage.getItem('xoleric_pro');
            if (saved) { 
                els.btnCont.style.display = 'block'; 
                els.nameInp.value = JSON.parse(saved).playerName; 
            }
        };

        function saveGame() { 
            if(isPlaying) localStorage.setItem('xoleric_pro', JSON.stringify(gameState)); 
        }
        function clearSave() { localStorage.removeItem('xoleric_pro'); els.btnCont.style.display = 'none'; }

        window.startNewGame = function() {
            gameState.playerName = els.nameInp.value.trim().toUpperCase() || "NANO";
            gameState.level = 1; gameState.score = 0; 
            initUI(); startGameLoop();
        };

        window.continueGame = function() {
            const saved = JSON.parse(localStorage.getItem('xoleric_pro'));
            if(saved) { 
                gameState = saved; gameState.selected = null; isProcessing = false; 
                initUI(); renderGrid(); updateStats(); startTimer();
            }
        };

        window.restartGame = function() {
            els.gameOver.classList.add('hidden');
            startNewGame();
        };

        function initUI() {
            els.login.classList.add('hidden'); els.gameUI.style.opacity = '1';
        }

        function startGameLoop() {
            maxTime = Math.max(40, 100 - (gameState.level * 2)); // Vaqt tobora kamayadi
            currentTime = maxTime;
            combo = 1;
            updateStats();
            setupLevel();
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            isPlaying = true;
            timerInterval = setInterval(() => {
                if(!isPlaying) return;
                currentTime -= 0.1; // Tezlikni sozlash
                
                let percent = (currentTime / maxTime) * 100;
                els.timeBar.style.width = `${percent}%`;
                
                if(percent < 25) els.timeBar.classList.add('time-warning');
                else els.timeBar.classList.remove('time-warning');

                if (currentTime <= 0) {
                    triggerGameOver();
                }
            }, 100);
        }

        function triggerGameOver() {
            isPlaying = false;
            clearInterval(timerInterval);
            els.finalScore.innerText = gameState.score;
            els.gameOver.classList.remove('hidden');
            clearSave();
        }

        function updateStats() { 
            els.lvl.innerText = gameState.level; 
            els.score.innerText = gameState.score; 
            els.combo.innerText = `x${combo}`;
            if(combo > 1) els.combo.classList.add('combo-text');
            else els.combo.classList.remove('combo-text');
        }

        function setupLevel() {
            let baseRows = 8;
            let baseCols = window.innerWidth > 600 ? 10 : 6;
            
            gameState.rows = Math.min(baseRows + Math.floor(gameState.level), 16);
            gameState.cols = Math.min(baseCols + Math.floor((gameState.level - 1) / 2), 12);
            if ((gameState.rows * gameState.cols) % 2 !== 0) gameState.rows++;

            generateData(); renderGrid(); saveGame();
        }

        function generateData() {
            const total = gameState.rows * gameState.cols;
            let shuffledDB = [...EMOJI_DB].sort(() => Math.random() - 0.5);
            let pool = [];
            for (let i = 0; i < total / 2; i++) pool.push(shuffledDB[i % shuffledDB.length]);
            let items = [...pool, ...pool].sort(() => Math.random() - 0.5);

            gameState.grid = Array.from({length: gameState.rows + 2}, () => new Array(gameState.cols + 2).fill(null));
            let idx = 0;
            for (let r = 1; r <= gameState.rows; r++) {
                for (let c = 1; c <= gameState.cols; c++) gameState.grid[r][c] = items[idx++];
            }
        }

        function renderGrid() {
            els.grid.style.gridTemplateColumns = `repeat(${gameState.cols}, 1fr)`;
            els.grid.style.gridTemplateRows = `repeat(${gameState.rows}, 1fr)`;
            els.grid.innerHTML = '';

            for (let r = 1; r <= gameState.rows; r++) {
                for (let c = 1; c <= gameState.cols; c++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    const val = gameState.grid[r][c];
                    
                    if (val) {
                        tile.innerText = val;
                        tile.style.fontSize = `min(8vw, 4vh, 38px)`;
                        tile.onclick = () => handleTileClick(r, c, tile);
                    } else {
                        tile.classList.add('matched');
                    }
                    tile.id = `t-${r}-${c}`;
                    els.grid.appendChild(tile);
                }
            }
            els.svg.innerHTML = '';
        }

        function handleTileClick(r, c, el) {
            if (isProcessing || !isPlaying) return;
            if (gameState.selected) {
                const {r: sr, c: sc} = gameState.selected;
                if (sr === r && sc === c) {
                    el.classList.remove('selected'); gameState.selected = null; return;
                }
                if (gameState.grid[r][c] === gameState.grid[sr][sc]) {
                    const path = findLink(sr, sc, r, c);
                    if (path) {
                        isProcessing = true; executeMatch(gameState.selected, {r, c}, path); return;
                    }
                }
                document.getElementById(`t-${sr}-${sc}`).classList.remove('selected');
                gameState.selected = {r, c}; el.classList.add('selected');
            } else {
                gameState.selected = {r, c}; el.classList.add('selected');
            }
        }

        // BFS Pathfinding Algoritmi
        function findLink(r1, c1, r2, c2) {
            const queue = [{r: r1, c: c1, dir: -1, turns: 0, path: [[r1, c1]]}];
            const visited = new Set();
            while (queue.length > 0) {
                const curr = queue.shift();
                if (curr.turns > 2) continue;
                if (curr.r === r2 && curr.c === c2) return curr.path;
                const dirs = [[-1,0], [1,0], [0,-1], [0,1]];
                for (let i = 0; i < 4; i++) {
                    const nr = curr.r + dirs[i][0]; const nc = curr.c + dirs[i][1];
                    if (nr >= 0 && nr < gameState.rows + 2 && nc >= 0 && nc < gameState.cols + 2) {
                        if (gameState.grid[nr][nc] === null || (nr === r2 && nc === c2)) {
                            const nt = (curr.dir !== -1 && curr.dir !== i) ? curr.turns + 1 : curr.turns;
                            const key = `${nr},${nc},${i},${nt}`;
                            if (!visited.has(key)) {
                                visited.add(key);
                                queue.push({r: nr, c: nc, dir: i, turns: nt, path: [...curr.path, [nr, nc]]});
                            }
                        }
                    }
                }
            }
            return null;
        }

        function executeMatch(p1, p2, path) {
            drawPath(path);
            
            // Combo va Score hisoblash
            clearTimeout(comboTimeout);
            let earnedScore = 100 * combo;
            gameState.score += earnedScore;
            
            // Vaqt qo'shish
            let timeBonus = 3 + (path.length * 0.5); // Yo'l qancha uzun bo'lsa shuncha ko'p vaqt
            currentTime = Math.min(maxTime, currentTime + timeBonus);
            
            showFloatingScore(`+${earnedScore}`, p2.r, p2.c);
            
            combo++;
            updateStats();

            // Kombo taymeri (3 soniya ichida topsa kombo oshadi)
            comboTimeout = setTimeout(() => { combo = 1; updateStats(); }, 3000);

            setTimeout(() => {
                gameState.grid[p1.r][p1.c] = null; gameState.grid[p2.r][p2.c] = null;
                const t1 = document.getElementById(`t-${p1.r}-${p1.c}`); const t2 = document.getElementById(`t-${p2.r}-${p2.c}`);
                t1.classList.remove('selected'); t2.classList.remove('selected');
                t1.classList.add('matched'); t2.classList.add('matched');
                
                saveGame();
                setTimeout(() => { els.svg.innerHTML = ''; }, 150);
                gameState.selected = null; isProcessing = false; checkWin();
            }, 150);
        }

        function showFloatingScore(text, r, c) {
            const tile = document.getElementById(`t-${r}-${c}`);
            if(!tile) return;
            const rect = tile.getBoundingClientRect();
            const wrapperRect = els.boardWrap.getBoundingClientRect();
            
            const pop = document.createElement('div');
            pop.className = 'floating-score';
            pop.innerText = text;
            pop.style.left = `${rect.left - wrapperRect.left + (rect.width/4)}px`;
            pop.style.top = `${rect.top - wrapperRect.top}px`;
            
            els.boardWrap.appendChild(pop);
            setTimeout(() => pop.remove(), 800);
        }

        function drawPath(path) {
            const wrapperRect = els.svg.getBoundingClientRect();
            const gridRect = els.grid.getBoundingClientRect();
            const cellW = gridRect.width / gameState.cols; const cellH = gridRect.height / gameState.rows;
            const offsetX = gridRect.left - wrapperRect.left; const offsetY = gridRect.top - wrapperRect.top;
            const points = path.map(p => `${offsetX + (p[1] - 0.5) * cellW},${offsetY + (p[0] - 0.5) * cellH}`).join(' ');
            const polyline = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
            polyline.setAttribute("points", points); polyline.setAttribute("class", "connection-line");
            els.svg.appendChild(polyline);
        }

        function checkWin() {
            if (!gameState.grid.flat().some(cell => cell !== null)) {
                isPlaying = false;
                gameState.level++; 
                currentTime = Math.min(maxTime, currentTime + 20); // Bonus vaqt
                saveGame(); 
                
                document.getElementById('msg-title').innerText = "LEVEL UP";
                document.getElementById('msg-sub').innerText = "TIZIM YANGILANDI";
                els.overlay.classList.add('show');
                
                setTimeout(() => { 
                    els.overlay.classList.remove('show'); 
                    startGameLoop(); 
                }, 1500);
            }
        }

        window.handleShuffle = function() {
            if(isProcessing || !isPlaying) return;
            let active = [];
            for(let r=1; r<=gameState.rows; r++) {
                for(let c=1; c<=gameState.cols; c++) {
                    if(gameState.grid[r][c] !== null) active.push(gameState.grid[r][c]);
                }
            }
            active.sort(() => Math.random() - 0.5);
            let idx = 0;
            for(let r=1; r<=gameState.rows; r++) {
                for(let c=1; c<=gameState.cols; c++) {
                    if(gameState.grid[r][c] !== null) gameState.grid[r][c] = active[idx++];
                }
            }
            
            // Jarima: Vaqt va Ball qirqiladi
            currentTime -= 5;
            gameState.score = Math.max(0, gameState.score - 100);
            combo = 1;
            
            updateStats(); saveGame(); renderGrid(); gameState.selected = null;
        };
    </script>
